<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>🎤 Reken Popsterren</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#7b2ff7">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Fredoka", "Comic Sans MS", "Segoe UI", "Trebuchet MS", sans-serif;
    background:
      radial-gradient(circle at 18% 12%, rgba(255,120,220,.35), transparent 45%),
      radial-gradient(circle at 82% 88%, rgba(80,200,255,.28), transparent 48%),
      linear-gradient(160deg, #3d0a58 0%, #7b2ff7 48%, #f107a3 100%);
    background-attachment: fixed;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }
  #app { height: 100%; display: flex; flex-direction: column; }

  /* schermen scrollen nooit zijwaarts: horizontaal scrollen gebeurt alleen
     ín de reisroute en de tabbladen zelf */
  .screen { display: none; flex: 1; flex-direction: column; align-items: center; padding: 12px; overflow-y: auto; overflow-x: hidden; }
  .screen.active { display: flex; }

  h1.title {
    font-size: clamp(28px, 5.4vw, 46px);
    font-weight: 700; letter-spacing: .5px;
    text-shadow: 0 2px 0 rgba(0,0,0,.18), 0 4px 12px rgba(0,0,0,.28);
    margin: 10px 0 4px;
    text-align: center;
  }
  .subtitle { opacity: .92; margin-bottom: 18px; text-align: center; font-size: 17px; font-weight: 500; }

  .btn {
    font-family: inherit; font-size: 20px; font-weight: 600; color: #fff;
    background: linear-gradient(180deg, #ffc23d, #ff8f00);
    border: none; border-radius: 18px; padding: 14px 26px; cursor: pointer;
    box-shadow: 0 5px 0 #b36200, 0 8px 14px rgba(0,0,0,.3);
    transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #b36200; }
  .btn.big { font-size: 26px; padding: 18px 40px; white-space: nowrap; }
  .btn.purple { background: linear-gradient(180deg, #ab47bc, #8e24aa); box-shadow: 0 5px 0 #4a148c, 0 8px 14px rgba(0,0,0,.3); }
  .btn.purple:active { box-shadow: 0 1px 0 #4a148c; }
  .btn.green { background: linear-gradient(180deg, #66bb6a, #43a047); box-shadow: 0 5px 0 #1b5e20, 0 8px 14px rgba(0,0,0,.3); }
  .btn.green:active { box-shadow: 0 1px 0 #1b5e20; }
  .btn.small { font-size: 16px; padding: 8px 16px; border-radius: 12px; box-shadow: 0 3px 0 #b36200; }
  .btn.ghost { background: rgba(255,255,255,.15); box-shadow: none; }
  /* icoon-only, rustige terugknop naar profielkeuze */
  .btn.switch-star { padding: 8px 12px; border-radius: 12px; opacity: .6; background: rgba(255,255,255,.1); }
  .btn.switch-star:hover { opacity: .85; }
  .btn.switch-star:active { opacity: 1; }
  /* secundaire knoppen: rustig, maar met een vleugje kleur (lichter dan de gouden hoofdknop) */
  .btn.soft {
    font-size: 17px; padding: 12px 18px; border-radius: 16px; color: #fff;
    border: 1.5px solid rgba(255,255,255,.28);
    background: linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.07));
    box-shadow: 0 3px 0 rgba(0,0,0,.28);
  }
  .btn.soft:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.28); }
  .btn.soft.shop { background: linear-gradient(180deg, rgba(171,71,188,.55), rgba(142,36,170,.38)); border-color: rgba(206,147,216,.6); box-shadow: 0 3px 0 rgba(74,20,140,.55); }
  .btn.soft.shop:active { box-shadow: 0 1px 0 rgba(74,20,140,.55); }
  .btn.soft.tro { background: linear-gradient(180deg, rgba(102,187,106,.55), rgba(56,142,60,.38)); border-color: rgba(165,214,167,.6); box-shadow: 0 3px 0 rgba(27,94,32,.55); }
  .btn.soft.tro:active { box-shadow: 0 1px 0 rgba(27,94,32,.55); }
  .btn:disabled { filter: grayscale(.8); opacity: .6; cursor: default; }

  /* ---- Profielkeuze (podium-stijl kaarten) ----
     Twee sterren altijd náást elkaar in beeld, ook op 320px: geen scrollen om
     jezelf te vinden. De kaart vertelt het verhaal (waar op de tournee) i.p.v.
     een scorebord — geen kale tellers om zusjes mee te vergelijken. */
  /* verticaal gecentreerd via auto-marges: veilig bij overloop (justify-content:
     center zou op lage/liggende schermen de bovenkant onbereikbaar knippen) */
  #screen-profile { position: relative; padding-bottom: 30px; }
  #screen-profile .title { margin-top: auto; padding: 0 54px; font-size: clamp(23px, 6vw, 40px); }
  .profile-row {
    display: flex; gap: 14px; justify-content: center; align-items: stretch;
    width: 100%; max-width: 560px; margin: 16px 0 auto; z-index: 1;
  }
  .profile-card {
    position: relative; flex: 1 1 0; min-width: 0; max-width: 250px;
    cursor: pointer; text-align: center; font-family: inherit; color: #fff;
    background: linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.08));
    border: 3px solid rgba(255,255,255,.45); border-radius: 26px;
    padding: 11px 10px 16px; transition: transform .18s, box-shadow .18s;
    box-shadow: 0 10px 26px rgba(0,0,0,.32);
  }
  .profile-card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 16px 34px rgba(0,0,0,.4); }
  .profile-card:active { transform: translateY(-2px) scale(1.01); }
  /* het podium schaalt mee met de kaartbreedte; de scène blijft schoon (geen zwevende teller) */
  .profile-card .stage { width: 100%; aspect-ratio: 10 / 11; margin: 0 auto; }
  .profile-card .deco { font-size: 18px; }
  .profile-card .pname { font-size: 22px; font-weight: bold; margin-top: 8px; text-shadow: 0 2px 0 rgba(0,0,0,.25); }
  /* waar op de wereldtournee ben ik? — verhaal i.p.v. scorebord */
  .tour-chip {
    display: inline-block; max-width: calc(100% - 4px);
    background: rgba(0,0,0,.30); border-radius: 999px; padding: 5px 11px;
    font-size: 13px; font-weight: 700; margin: 6px 0 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* sappige "Speel!"-knop — goud, net als op de kaart: goud = spelen */
  .play-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 12px; padding: 10px 22px; border-radius: 999px;
    font-size: 18px; font-weight: 700; color: #fff; letter-spacing: .3px; position: relative;
    background: linear-gradient(180deg, #ffc23d, #ff8f00);
    box-shadow: 0 5px 0 #b36200, 0 8px 13px rgba(0,0,0,.35);
    transition: transform .1s, box-shadow .1s;
    animation: playGlow 1.7s ease-in-out infinite;
  }
  .play-btn::before {
    content: ""; position: absolute; left: 10px; right: 10px; top: 4px; height: 40%;
    border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,.55), transparent);
    pointer-events: none;
  }
  .play-btn .play-ico {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%; font-size: 12px; flex-shrink: 0;
    background: rgba(255,255,255,.92); color: #b36200; box-shadow: inset 0 -1px 2px rgba(0,0,0,.15);
  }
  @keyframes playGlow { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.14); } }
  .profile-card:hover .play-btn { transform: translateY(-2px); box-shadow: 0 7px 0 #b36200, 0 11px 16px rgba(0,0,0,.42); }
  .profile-card:active .play-btn { transform: translateY(3px); box-shadow: 0 2px 0 #b36200, 0 4px 8px rgba(0,0,0,.3); }
  /* op telefoons alleen de stad (het verhaal); het shownummer erbij op brede schermen */
  @media (max-width: 480px) { .chip-shownr { display: none; } }
  /* heel smalle toestellen: kaartinhoud een maat kleiner, allebei blijven passen */
  @media (max-width: 380px) {
    .profile-row { gap: 10px; }
    .profile-card .pname { font-size: 18px; }
    .tour-chip { font-size: 11.5px; padding: 4px 9px; }
    .play-btn { font-size: 15px; padding: 8px 15px; }
    .play-btn .play-ico { width: 20px; height: 20px; font-size: 10px; }
  }

  .corner-btns { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 50; }
  .icon-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
    font-size: 22px; background: rgba(255,255,255,.2); color: #fff;
    transition: transform .12s, background .12s;
  }
  .icon-btn:hover { background: rgba(255,255,255,.35); }
  .icon-btn:active { transform: scale(.9); }
  .icon-btn.on { background: rgba(255,255,255,.42); transform: rotate(35deg); }

  /* ---- Instellingen-menu (popover onder het tandwiel) ---- */
  .gear-menu {
    position: absolute; top: 54px; right: 0; min-width: 216px;
    background: #fff; color: #333; border-radius: 16px; padding: 6px;
    box-shadow: 0 14px 34px rgba(30,0,50,.42); display: none; flex-direction: column;
    transform-origin: top right;
  }
  .gear-menu.open { display: flex; animation: gearPop .16s ease; }
  @keyframes gearPop { from { opacity: 0; transform: scale(.9) translateY(-6px); } to { opacity: 1; transform: none; } }
  .gear-item {
    font-family: inherit; font-size: 16px; font-weight: 600; color: #3a0f56;
    background: transparent; border: none; cursor: pointer; text-align: left; width: 100%;
    display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 11px;
  }
  .gear-item:hover { background: #faf6ff; }
  .gear-item:active { transform: scale(.98); }
  .gear-item .gi-ico { font-size: 20px; width: 24px; text-align: center; flex-shrink: 0; }
  .gear-item .gi-label { flex: 1; }
  .gear-item .gi-state {
    font-size: 13px; font-weight: 700; padding: 3px 11px; border-radius: 999px;
    background: #e3f7e7; color: #2e7d32;
  }
  .gear-item .gi-state.off { background: #eceaef; color: #9a90a6; }
  .gear-item .gi-chev { font-size: 22px; color: #ab47bc; line-height: 1; }
  .gear-item.parents { color: #8e24aa; }
  .gear-sep { height: 1px; background: #ecdcf6; margin: 5px 8px; }

  /* ---- Podium / avatar ---- */
  .stage {
    position: relative; border-radius: 24px; overflow: hidden; flex-shrink: 0;
    border: 4px solid rgba(255,255,255,.5); box-shadow: 0 10px 24px rgba(0,0,0,.35);
    display: flex; align-items: flex-end; justify-content: center;
  }
  /* avatar schaalt altijd mee met de podiumhoogte (fix voor afgesneden avatar op mobiel) */
  .stage .avatar-holder { height: 92%; }
  .stage .avatar-holder svg { height: 100%; width: auto; display: block; }
  .stage::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(circle 60px at 20% 15%, rgba(255,255,120,.35), transparent 70%),
      radial-gradient(circle 60px at 80% 20%, rgba(120,220,255,.35), transparent 70%),
      radial-gradient(circle 70px at 55% 8%, rgba(255,120,220,.30), transparent 70%);
    animation: lights 3.5s ease-in-out infinite alternate;
  }
  @keyframes lights {
    from { filter: hue-rotate(0deg); opacity: .8; }
    to   { filter: hue-rotate(120deg); opacity: 1; }
  }
  .stage .deco { position: absolute; font-size: 26px; text-shadow: 0 2px 4px rgba(0,0,0,.3); }
  .stage.tappable { cursor: pointer; }
  .stage.tappable:active { transform: scale(.98); }
  .avatar-holder { line-height: 0; }
  .avatar-holder.idle { animation: sway 2.6s ease-in-out infinite; transform-origin: 50% 95%; }
  @keyframes sway {
    0%,100% { transform: rotate(-2.5deg); }
    50%     { transform: rotate(2.5deg); }
  }
  /* ---- Danspasjes: elke juiste som = een pasje in de show ---- */
  .avatar-holder.dancing { transform-origin: 50% 95%; }
  .avatar-holder.move-jump   { animation: mvJump .9s ease-in-out; }
  .avatar-holder.move-spin   { animation: mvSpin .9s ease-in-out; }
  .avatar-holder.move-sway   { animation: mvSway .9s ease-in-out; }
  .avatar-holder.move-kick   { animation: mvKick .9s ease-in-out; }
  .avatar-holder.move-wave   { animation: mvWave .9s ease-in-out; }
  .avatar-holder.move-bounce { animation: mvBounce .9s ease-in-out; }
  @keyframes mvJump {
    0%,100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-38px) scale(1.06); }
    55% { transform: translateY(0) scale(.96); }
    75% { transform: translateY(-14px); }
  }
  @keyframes mvSpin {
    0% { transform: rotateY(0) scale(1); }
    50% { transform: rotateY(360deg) scale(1.08) translateY(-10px); }
    100% { transform: rotateY(720deg) scale(1); }
  }
  @keyframes mvSway {
    0%,100% { transform: rotate(0); }
    20% { transform: rotate(-16deg) translateX(-8px); }
    50% { transform: rotate(16deg) translateX(8px); }
    80% { transform: rotate(-10deg) translateX(-4px); }
  }
  @keyframes mvKick {
    0%,100% { transform: rotate(0) translateX(0); }
    25% { transform: rotate(-10deg) translateX(-10px) scale(1.03); }
    50% { transform: rotate(12deg) translateX(12px); }
    70% { transform: rotate(-6deg) translateX(-6px); }
  }
  @keyframes mvWave {
    0%,100% { transform: translateY(0) rotate(0); }
    20% { transform: translateY(-8px) rotate(6deg); }
    40% { transform: translateY(0) rotate(-6deg); }
    60% { transform: translateY(-8px) rotate(6deg); }
    80% { transform: translateY(0) rotate(-4deg); }
  }
  @keyframes mvBounce {
    0%,100% { transform: translateY(0) scaleY(1); }
    20% { transform: translateY(0) scaleY(.82) scaleX(1.1); }
    45% { transform: translateY(-30px) scaleY(1.12) scaleX(.92); }
    70% { transform: translateY(0) scaleY(.9) scaleX(1.06); }
  }

  /* ---- Home ---- */
  .screen-header {
    display: grid; grid-template-columns: minmax(108px, 1fr) auto minmax(108px, 1fr);
    align-items: center; gap: 12px; width: 100%; max-width: 700px; margin-bottom: 8px;
  }
  .screen-header .header-title {
    font-size: 24px; font-weight: 700; text-align: center; white-space: nowrap;
    text-shadow: 0 2px 0 rgba(0,0,0,.18);
  }
  .screen-header .header-left { justify-self: start; }
  .screen-header .header-right { justify-self: end; }
  /* één teller-pil, in twee maten: groot (schermkoppen) en klein (kaart-topbalk, spelbalk) */
  .diamond-badge, .chip-badge {
    background: rgba(0,0,0,.32); border-radius: 999px; font-weight: bold;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .diamond-badge { padding: 8px 18px; font-size: 22px; }
  .diamond-badge.compact { font-size: 18px; padding: 6px 14px; }
  .chip-badge { padding: 6px 13px; font-size: 16px; gap: 5px; }
  @keyframes pulseBtn { 0%,100% { transform: scale(1); } 50% { transform: scale(1.09); } }

  /* ---- Kaart (hoofdscherm): topbalk, wolkjes en vaste navigatie onderaan ---- */
  #screen-map { position: relative; padding: 10px 0 100px; }
  .map-topbar { display: flex; align-items: center; gap: 9px; width: 100%; max-width: 760px; padding: 2px 12px; z-index: 2; }
  /* mini-portret = deurtje naar de kleedkamer (het 👗-plakkertje maakt dat duidelijk) */
  .map-portrait {
    position: relative; width: 47px; height: 47px; flex-shrink: 0;
    border: none; padding: 0; background: none; cursor: pointer; font-family: inherit;
    transition: transform .12s;
  }
  .map-portrait:hover { transform: scale(1.07); }
  .map-portrait:active { transform: scale(.93); }
  .map-portrait .pframe {
    position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
    background: rgba(0,0,0,.3); border: 2px solid rgba(255,255,255,.65);
    box-shadow: 0 2px 7px rgba(0,0,0,.35);
  }
  .map-portrait .pframe svg { position: absolute; left: 50%; top: -7px; transform: translateX(-50%); }
  .map-portrait .dressdot {
    position: absolute; right: -4px; bottom: -4px; width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(180deg, #ffca28, #ffa000); border: 1.5px solid #fff;
    font-size: 11px; display: grid; place-items: center; box-shadow: 0 1px 4px rgba(0,0,0,.35);
  }
  .map-name {
    font-size: 20px; font-weight: 700; flex: 1; min-width: 0; text-align: left;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    text-shadow: 0 2px 0 rgba(0,0,0,.2);
  }
  .map-chips { display: flex; gap: 6px; }
  .map-flex {
    flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
    width: 100%; min-height: 0; z-index: 1;
  }
  .map-sky { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .map-sky > span { position: absolute; left: 0; opacity: .28; animation: drift linear infinite; }
  @keyframes drift { from { transform: translateX(-80px); } to { transform: translateX(calc(100vw + 80px)); } }
  /* poster-compositie: een grote schuine microfoon half óver de linkerrand,
     nootjes rechts — de diagonaal breekt de gestapelde middenas en de mic
     rendert op elk toestel goed (stad-emoji werden soms onherkenbare vlekken) */
  .brand-sky span { position: absolute; opacity: .15; }
  .brand-sky .mic { left: -58px; top: 26%; font-size: 175px; opacity: .13; animation: floatyMic 7s ease-in-out infinite alternate; }
  .brand-sky .n1 { right: 9%; top: 19%; font-size: 32px; animation: floaty 6s ease-in-out infinite alternate; animation-delay: -2s; }
  .brand-sky .n2 { right: 17%; bottom: 19%; font-size: 26px; animation: floaty 8s ease-in-out infinite alternate; animation-delay: -4.5s; }
  @keyframes floaty { from { transform: translateY(0); } to { transform: translateY(-14px); } }
  @keyframes floatyMic { from { transform: rotate(-24deg) translateY(0); } to { transform: rotate(-24deg) translateY(-14px); } }
  @media (max-height: 700px) { .brand-sky { display: none; } }   /* op lage schermen is er geen lucht over */

  .main-nav {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 10px; z-index: 40;
    display: none; gap: 5px; padding: 7px; border-radius: 26px; width: min(94vw, 430px);
    background: rgba(30, 4, 52, .78); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1.5px solid rgba(255,255,255,.22); box-shadow: 0 10px 26px rgba(0,0,0,.4);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-family: inherit; font-size: 12.5px; font-weight: 700; color: #fff; opacity: .75;
    background: transparent; border: none; border-radius: 19px; padding: 7px 4px 6px; cursor: pointer;
    transition: transform .1s, background .15s, opacity .15s;
  }
  .nav-item .nav-ico { font-size: 25px; line-height: 1.1; }
  .nav-item:active { transform: scale(.94); }
  .nav-item.active { opacity: 1; background: rgba(255,193,7,.26); box-shadow: inset 0 0 0 2px rgba(255,213,79,.55); }
  /* schermen met de vaste navigatie eronder krijgen ruimte zodat niets erachter verdwijnt */
  .screen.hub { padding-bottom: 100px; }

  /* ---- Spel ---- */
  #screen-game { padding: 8px; justify-content: flex-start; }
  /* bovenbalk als één donker lint (zelfde familie als navigatie/actiebalk):
     terug · stad · hartjes · 💎 — alles op één regel, ook op smalle schermen */
  .game-top {
    display: flex; align-items: center; width: 100%; max-width: 820px; gap: 8px;
    padding: 6px 9px; border-radius: 18px;
    background: rgba(30, 4, 52, .5); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border: 1.5px solid rgba(255,255,255,.16);
  }
  .game-city {
    flex: 1; min-width: 0; text-align: center; font-size: 16.5px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 1px 0 rgba(0,0,0,.25);
  }
  .notes-left { font-size: 19px; letter-spacing: 1px; white-space: nowrap; display: inline-block; flex-shrink: 0; }
  .qprogress { display: flex; gap: 5px; justify-content: center; margin-top: 8px; }
  .qdot { width: 13px; height: 13px; border-radius: 50%; background: rgba(255,255,255,.3); }
  .qdot.done { background: #ffd740; box-shadow: 0 0 6px #ffd740; }
  .qdot.now { background: #fff; transform: scale(1.25); }
  @media (max-width: 430px) {
    .game-city .lvl-pre { display: none; }   /* "Optreden in " valt weg, de stad blijft */
    .notes-left { font-size: 17px; letter-spacing: 0; }
    .game-top .diamond-badge.compact { font-size: 15px; padding: 5px 10px; }
  }

  /* arena: linkerpaneel = de show (avatar + fanmeter), rechts = het rekenen (focus);
     space-evenly verdeelt de resthoogte gelijkmatig i.p.v. één groot gat bovenaan */
  .game-arena {
    display: flex; gap: 22px; align-items: center; align-content: space-evenly; justify-content: center;
    width: 100%; max-width: 860px; margin-top: 6px; flex-wrap: wrap; flex: 1 1 auto;
  }
  .show-panel { display: flex; flex-direction: column; align-items: center; }
  .show-inner { display: flex; align-items: flex-end; gap: 12px; }
  .fan-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .fan-icon { font-size: 20px; line-height: 1; }
  .fan-track {
    width: 28px; height: 200px; border-radius: 999px; overflow: hidden;
    background: rgba(0,0,0,.32); border: 2px solid rgba(255,255,255,.4);
    display: flex; align-items: flex-end;
  }
  .fan-fill {
    width: 100%; height: 0%; border-radius: 999px;
    background: linear-gradient(0deg, #ff80ab, #ff4081, #f50057); transition: height .5s ease;
  }
  .fan-fill.full { animation: fanPulse .5s ease infinite alternate; }
  @keyframes fanPulse { from { filter: brightness(1); } to { filter: brightness(1.45); } }
  .show-stage { width: 188px; height: 218px; }

  .math-panel { display: flex; flex-direction: column; align-items: center; }
  .question-card {
    position: relative; overflow: hidden;
    background: linear-gradient(180deg, #ffffff, #f3e9ff); color: #4a148c; border-radius: 26px;
    padding: 18px 32px 26px; margin: 0 0 8px; text-align: center;
    font-size: clamp(42px, 8.5vw, 62px); font-weight: 700; min-width: min(88vw, 400px);
    box-shadow: 0 10px 24px rgba(0,0,0,.32); border: 3px solid rgba(255,255,255,.7);
  }
  /* de spotlight-bonus leeft ín de somkaart: een gouden randje dat langzaam dooft —
     geen aparte tijdbalk-rij die als "haast je!" leest */
  .spot-rail {
    position: absolute; left: 16px; right: 16px; bottom: 9px; height: 7px;
    border-radius: 999px; background: rgba(74, 20, 140, .10);
  }
  .spotlight-bar { height: 100%; width: 100%; border-radius: 999px; background: linear-gradient(90deg, #ffee58, #ffb300); transition: width .1s linear; }
  /* gouden vraag: gele balk op gele kaart is onzichtbaar → donkere baan + paarse balk */
  .question-card.golden .spot-rail { background: rgba(74, 20, 140, .28); }
  .question-card.golden .spotlight-bar { background: linear-gradient(90deg, #ab47bc, #6a1b9a); }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: min(88vw, 400px); margin-top: 4px; }
  .choice-btn {
    font-family: inherit; font-size: 34px; font-weight: 700; color: #fff; border: none; cursor: pointer;
    padding: 18px 8px; border-radius: 20px;
    background: linear-gradient(180deg, #8e5fd6, #5e35b1); box-shadow: 0 5px 0 #311b92;
    transition: transform .07s, box-shadow .07s;
  }
  .choice-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #311b92; }
  .choice-btn.good { background: linear-gradient(180deg, #66bb6a, #388e3c); box-shadow: 0 5px 0 #1b5e20; }
  .choice-btn.bad { background: linear-gradient(180deg, #ef5350, #d32f2f); box-shadow: 0 5px 0 #8e0000; }

  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: min(78vw, 300px); margin-top: 4px; }
  .num-btn {
    font-family: inherit; font-size: 28px; font-weight: 700; color: #fff; border: none; cursor: pointer;
    padding: 13px 0; border-radius: 16px;
    background: linear-gradient(180deg, #8e5fd6, #5e35b1); box-shadow: 0 4px 0 #311b92;
  }
  .num-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #311b92; }
  .num-btn.ok { background: linear-gradient(180deg, #66bb6a, #388e3c); box-shadow: 0 4px 0 #1b5e20; }
  /* wissen is neutraal (grijs), niet rood: rood = fout antwoord, dat verwarren we niet */
  .num-btn.del { background: linear-gradient(180deg, #90a4ae, #607d8b); box-shadow: 0 4px 0 #37474f; font-size: 22px; }

  /* op smalle schermen: show compacter zodat het rekenen prominent blijft */
  @media (max-width: 720px) {
    .game-arena { gap: 12px; }
    .show-stage { width: 128px; height: 150px; }
    .fan-track { height: 132px; width: 24px; }
    .question-card { font-size: clamp(38px, 12vw, 56px); padding: 14px 22px 24px; }
  }
  /* op lage schermen alles compacter: som + alle antwoorden moeten ALTIJD
     zonder scrollen in beeld staan */
  @media (max-height: 700px) {
    .show-stage { width: 106px; height: 124px; }
    .fan-track { height: 104px; width: 20px; }
    .fan-icon { font-size: 16px; }
    .game-arena { gap: 8px; margin-top: 2px; }
    .question-card { font-size: clamp(30px, 9vw, 44px); padding: 11px 18px 21px; margin-bottom: 5px; }
    .gold-banner { height: 18px; font-size: 14.5px; margin-top: 2px; }
    .choice-btn { padding: 12px 8px; font-size: 27px; }
    .choices { gap: 10px; }
    .num-btn { padding: 9px 0; font-size: 23px; }
    .numpad { gap: 8px; }
    .qprogress { margin-top: 5px; }
  }
  /* ruime schermen: de show mag wat groter schitteren */
  @media (min-width: 900px) and (min-height: 760px) {
    .show-stage { width: 224px; height: 258px; }
    .fan-track { height: 232px; }
  }

  .praise {
    position: fixed; left: 50%; top: 38%; transform: translate(-50%,-50%) scale(.3);
    font-size: clamp(34px, 7.4vw, 58px); font-weight: bold; color: #ffee58;
    line-height: 1.12; text-align: center; text-wrap: balance;
    max-width: min(92vw, 640px);
    text-shadow: 0 0 18px #ff6f00, 0 3px 0 rgba(0,0,0,.4);
    pointer-events: none; opacity: 0; z-index: 60;
  }
  .praise.pop { animation: praisePop 1s ease forwards; }
  @keyframes praisePop {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(.3); }
    30% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
    70% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-70%) scale(1); }
  }
  .toast {
    position: fixed; left: 50%; top: 12%; transform: translateX(-50%);
    background: rgba(0,0,0,.8); color: #fff;
    font-size: clamp(16px, 4.6vw, 20px); line-height: 1.35;
    padding: 11px 20px; border-radius: 16px; z-index: 60; display: none;
    max-width: min(94vw, 560px); text-align: center; text-wrap: balance;
    pointer-events: none;
  }
  .shake { animation: shake .4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); } 20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); } 60% { transform: translateX(-7px); } 80% { transform: translateX(7px); }
  }
  /* zachte "foute noot" animatie */
  .wobble { animation: wobble .7s ease; }
  @keyframes wobble {
    0%,100% { transform: rotate(0) scale(1); }
    20% { transform: rotate(-3deg) scale(.98); }
    45% { transform: rotate(2.5deg) scale(.99); }
    70% { transform: rotate(-1.5deg); }
  }
  .slip-note {
    position: fixed; left: 50%; top: 34%; transform: translateX(-50%);
    font-size: 52px; z-index: 60; pointer-events: none; opacity: 0;
  }
  .slip-note.go { animation: slipNote 1.6s ease forwards; }
  @keyframes slipNote {
    0% { opacity: 0; transform: translate(-50%, 0) rotate(0); }
    20% { opacity: 1; transform: translate(-50%, 6px) rotate(-8deg); }
    100% { opacity: 0; transform: translate(-50%, 90px) rotate(30deg); }
  }

  /* ---- Gouden vraag ---- */
  .question-card.golden {
    background: linear-gradient(135deg, #fff9c4, #ffd54f, #ffca28);
    color: #7a4f00; box-shadow: 0 0 26px rgba(255,193,7,.9), 0 8px 20px rgba(0,0,0,.3);
    animation: goldGlow 1s ease-in-out infinite alternate;
  }
  @keyframes goldGlow { from { box-shadow: 0 0 18px rgba(255,193,7,.7), 0 8px 20px rgba(0,0,0,.3); } to { box-shadow: 0 0 34px rgba(255,193,7,1), 0 8px 20px rgba(0,0,0,.3); } }
  .gold-banner { font-size: 18px; font-weight: bold; color: #ffe082; text-shadow: 0 0 10px #ff6f00; margin-top: 6px; height: 22px; }

  /* ---- Wereldtournee: de horizontale reisroute is het hart van het hoofdscherm ---- */
  .tour-map { position: relative; overflow-x: auto; width: 100%; max-width: 760px;
    -webkit-overflow-scrolling: touch; cursor: grab;
    scrollbar-width: none; -ms-overflow-style: none; }
  .tour-map::-webkit-scrollbar { display: none; }
  .tour-map.dragging, .tour-map.dragging * { cursor: grabbing; }
  /* zachte fade-randen op horizontale scrollers (reisroute, tabbladen):
     verschijnen alleen aan de kant waar nog meer te scrollen valt */
  .hscroll-fade.can-right { -webkit-mask-image: linear-gradient(90deg, #000 calc(100% - 34px), transparent 100%);
    mask-image: linear-gradient(90deg, #000 calc(100% - 34px), transparent 100%); }
  .hscroll-fade.can-left { -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 34px);
    mask-image: linear-gradient(90deg, transparent 0, #000 34px); }
  .hscroll-fade.can-left.can-right { -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 34px, #000 calc(100% - 34px), transparent 100%);
    mask-image: linear-gradient(90deg, transparent 0, #000 34px, #000 calc(100% - 34px), transparent 100%); }
  /* ruimte boven de haltes voor de avatar, eronder voor de Speel-knop */
  .tour-track { display: flex; align-items: flex-start; width: max-content; position: relative; padding: 132px 26px 88px; }
  /* de reisweg loopt dóór het midden van de haltes; het afgelegde deel licht
     warm op (::after, breedte gezet door updateTraveled), de weg vooruit is dof */
  .tour-track::before { content: ""; position: absolute; top: 166px; left: 80px; right: 80px; height: 6px; border-radius: 999px;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,.35) 0 10px, transparent 10px 20px); }
  .tour-track::after { content: ""; position: absolute; top: var(--line-top, 166px); left: var(--line-left, 80px);
    width: var(--traveled, 0px); height: 6px; border-radius: 999px;
    background: repeating-linear-gradient(90deg, rgba(255,215,64,.85) 0 10px, transparent 10px 20px); }
  .tour-stop { width: 108px; flex: 0 0 auto; border: none; cursor: pointer; font-family: inherit; color: #fff;
    background: transparent; padding: 0; text-align: center; position: relative; z-index: 1; }
  .tour-stop .dot { width: 74px; height: 74px; margin: 0 auto; border-radius: 21px; display: flex; align-items: center; justify-content: center;
    font-size: 36px; background: linear-gradient(180deg, #29b6f6, #0288d1); box-shadow: 0 5px 0 #01579b; border: 2px solid rgba(255,255,255,.35); }
  .tour-stop:active .dot { transform: translateY(2px); box-shadow: 0 2px 0 #01579b; }
  .tour-stop.locked { cursor: default; }
  /* op slot: dekkend (geen doorschijnende reisweg door de tegel) en een maatje
     kleiner — hiërarchie: goud (nu) > groen (gedaan) > grijs (nog niet) */
  .tour-stop.locked .dot { background: linear-gradient(180deg, #7e8d95, #57666e); box-shadow: 0 4px 0 #37474f;
    border-color: rgba(255,255,255,.22); transform: scale(.85); }
  .tour-stop.done .dot { background: linear-gradient(180deg, #66bb6a, #43a047); box-shadow: 0 5px 0 #1b5e20; }
  .tour-stop.next .dot { background: linear-gradient(180deg, #ffca28, #ffa000); box-shadow: 0 5px 0 #b36200; border-color: #fff; animation: pulseBtn 1.2s ease-in-out infinite; }
  .tour-stop .cname { font-size: 14.5px; font-weight: bold; margin-top: 8px; }
  .tour-stop.next .cname { color: #ffe082; }
  .tour-stop.locked .cname { opacity: .6; }
  .tour-stop .lvlnr { font-size: 12px; opacity: .82; }
  .tour-stop.locked .lvlnr { opacity: .5; }
  .tour-stop .stars { font-size: 12px; letter-spacing: -1px; height: 15px; }
  /* nog te verdienen sterren op een gespeelde stad: dof — nodigt uit tot overspelen */
  .tour-stop .stars .star-miss { opacity: .3; filter: grayscale(1); }
  /* de eigen ster staat óp de kaart, bij haar volgende show — zij is de "je bent hier"-pin */
  .tour-hero { position: absolute; left: 50%; bottom: calc(100% - 10px); transform: translateX(-50%);
    width: 96px; pointer-events: none; z-index: 2; }
  .tour-hero svg { width: 100%; height: auto; display: block; }
  /* dé speelknop van het spel: zit vast aan de huidige halte */
  .tour-speel { position: absolute; top: calc(100% + 15px); left: 50%; transform: translateX(-50%);
    font-size: 20px; font-weight: 700; color: #fff; letter-spacing: .3px; white-space: nowrap;
    background: linear-gradient(180deg, #ffc23d, #ff8f00); border-radius: 999px; padding: 13px 26px;
    box-shadow: 0 5px 0 #b36200, 0 9px 18px rgba(0,0,0,.35); animation: playGlow 1.7s ease-in-out infinite; }
  .tour-speel::before { content: ""; position: absolute; top: -8px; left: 50%; margin-left: -8px;
    border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 9px solid #ffc23d; }
  /* compacter op lage schermen, zodat route + knop samen in beeld blijven */
  @media (max-height: 700px) {
    .tour-track { padding: 112px 22px 80px; }
    .tour-track::before { top: 140px; left: 70px; right: 70px; }
    .tour-stop { width: 96px; }
    .tour-stop .dot { width: 62px; height: 62px; font-size: 31px; border-radius: 18px; }
    .tour-hero { width: 82px; }
    .tour-speel { font-size: 18px; padding: 11px 22px; }
  }
  /* hoge schermen: de kaart mag juist groter schitteren — grotere haltes,
     ster en speelknop claimen de ruimte die anders leeg blijft */
  @media (min-height: 800px) {
    .tour-track { padding: 154px 30px 102px; }
    .tour-track::before { top: 196px; left: 92px; right: 92px; }
    .tour-stop { width: 124px; }
    .tour-stop .dot { width: 90px; height: 90px; font-size: 44px; border-radius: 25px; }
    .tour-stop .cname { font-size: 16px; }
    .tour-stop .lvlnr { font-size: 13px; }
    .tour-stop .stars { font-size: 13px; height: 16px; }
    .tour-hero { width: 118px; bottom: calc(100% - 12px); }
    .tour-speel { font-size: 22px; padding: 15px 30px; }
  }
  /* heel smalle toestellen: topbalk compacter zodat naam + tellers samen passen */
  @media (max-width: 390px) {
    .map-name { font-size: 17px; }
    .chip-badge { font-size: 14px; padding: 5px 10px; }
    .map-portrait { width: 42px; height: 42px; }
    .map-portrait .pframe svg { top: -6px; width: 72px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .map-sky span, .tour-speel, .tour-stop.next .dot, .avatar-holder.idle { animation: none; }
  }

  /* ---- Trofeeën ---- */
  /* kast-voortgang in de plakkende kop: hoeveel van de kast is gevuld */
  .kast-progress { width: min(100%, 340px); margin-top: 3px; }
  .kast-progress-text { font-size: 13.5px; font-weight: 600; opacity: .92; text-align: center; margin-bottom: 4px; }
  .kast-bar { height: 10px; border-radius: 999px; overflow: hidden; background: rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.28); }
  .kast-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #ffd740, #ff80ab); transition: width .6s ease; }
  /* de kast heeft planken: kleine themakopjes met een teller per plank */
  #trophy-shelves { width: 100%; max-width: 680px; }
  /* elke categorie zit in een eigen paneel: duidelijke visuele groepering */
  .shelf { background: rgba(0,0,0,.18); border: 1px solid rgba(255,255,255,.12); border-radius: 18px; padding: 6px 12px 13px; margin: 14px 0; }
  .shelf-title { margin: 4px 2px 9px; text-shadow: 0 1px 0 rgba(0,0,0,.25); border-bottom: 1px solid rgba(255,255,255,.13); padding-bottom: 7px; }
  .shelf-head-row { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; font-size: 16px; font-weight: 800; }
  .shelf-title .shelf-count { font-size: 12.5px; font-weight: 700; opacity: .95; background: rgba(0,0,0,.3); border-radius: 999px; padding: 3px 11px; white-space: nowrap; }
  .trophy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(124px, 1fr)); gap: 9px; width: 100%; align-items: stretch; }
  .trophy-card {
    position: relative; background: rgba(255,255,255,.13); border: 2px solid rgba(255,255,255,.3);
    border-radius: 14px; padding: 10px 8px 9px; text-align: center; cursor: pointer;
    display: flex; flex-direction: column; align-items: stretch;
  }
  .trophy-card:active { transform: scale(.97); }
  .trophy-card .temoji { font-size: 32px; line-height: 1; height: 36px; }
  .trophy-card .tname { font-size: 13.5px; font-weight: bold; margin-top: 3px; line-height: 1.15; }
  .trophy-card .tdesc { font-size: 11.5px; opacity: .85; margin-top: 2px; line-height: 1.2; }
  /* 'Kast vol!' (eindtrofee) over de volle breedte */
  .trophy-card.wide { grid-column: 1 / -1; }
  /* ===== staten ===== */
  /* NIET GESTART: normale paarse kaart, icoon licht gedimd, lege dunne balk */
  .trophy-card.fresh .temoji { opacity: .78; }
  /* BEZIG: normale kaart, icoon vol, dunne balk met duidelijke vulling (geen glow) */
  /* (geen aparte regels nodig; basiskaart + progressbalk volstaan) */
  /* BIJNA BEHAALD: sterke balkvulling + subtiele gouden glow (glow via inline style) */
  .trophy-card.almost .trophy-progress-fill { background: linear-gradient(90deg, #ffd54f, #ffb300); }
  /* LOCKED: donkerder, icoon sterk gedimd, klein slotje (voorlopig sluimerend) */
  .trophy-card.locked { background: rgba(0,0,0,.26); border-color: rgba(255,255,255,.1); }
  .trophy-card.locked .temoji { filter: grayscale(1); opacity: .5; }
  .trophy-card.locked .tname { opacity: .6; }
  .trophy-card.locked .tdesc { opacity: .45; }
  .trophy-lock {
    position: absolute; top: -8px; right: -8px; width: 26px; height: 26px; border-radius: 50%;
    display: grid; place-items: center; font-size: 13px; z-index: 3;
    background: rgba(30,15,55,.95); border: 2px solid rgba(255,255,255,.4);
    box-shadow: 0 2px 6px rgba(0,0,0,.35);
  }
  /* BEHAALD: warm goud met een gouden vinkje rechtsboven (rustig, geen sterke glow) */
  .trophy-card.done { background: rgba(255,215,64,.13); border-color: #ffd740; box-shadow: 0 0 8px rgba(255,215,64,.22), inset 0 0 0 1px rgba(255,215,64,.28); }
  .trophy-card.done .temoji { filter: drop-shadow(0 0 4px rgba(255,215,64,.6)); }
  .trophy-check {
    position: absolute; top: -8px; right: -8px; width: 28px; height: 28px; border-radius: 50%;
    display: grid; place-items: center; font-size: 15px; font-weight: bold; z-index: 3;
    background: linear-gradient(180deg, #ffd54f, #ffb300); color: #4a148c; border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.35);
  }
  /* onderste blok (status/voortgang) zakt netjes naar de kaartbodem */
  .trophy-bottom { margin-top: auto; padding-top: 8px; display: flex; flex-direction: column; gap: 5px; }
  .trophy-progress-text { font-size: 12px; font-weight: 700; color: #fff59d; min-height: 16px; line-height: 1.2; }
  .trophy-progress-text.sub { color: #cfc6df; font-weight: 600; opacity: .75; }
  .trophy-card.fresh .trophy-progress-text { color: #d8d0ea; opacity: .82; }
  /* dunne progressbalk onderaan de kaart */
  .trophy-progress { height: 6px; border-radius: 999px; overflow: hidden; background: rgba(0,0,0,.32); border: 1px solid rgba(255,255,255,.16); }
  .trophy-progress-fill { height: 100%; border-radius: 999px; transition: width .5s ease; background: linear-gradient(90deg, #ce93d8, #f48fb1); }
  /* ===== KLAAR: dit kaartje wordt zélf de 'Open trofee'-knop (zelfde formaat) ===== */
  .trophy-card.ready {
    justify-content: center; gap: 3px; color: #5d2a00; border: 3px solid #fff3c4;
    background: linear-gradient(135deg, #ffe27a, #ffb300);
    box-shadow: 0 4px 15px rgba(255,170,0,.5); animation: readyPulse 1.4s ease-in-out infinite;
  }
  .trophy-card.ready .temoji { filter: drop-shadow(0 1px 2px rgba(0,0,0,.2)); }
  .ready-big { font-size: 14px; font-weight: 900; line-height: 1.1; }
  .ready-name { font-size: 11.5px; font-weight: 700; opacity: .82; line-height: 1.15; }
  @keyframes readyPulse { 0%,100% { transform: scale(1); box-shadow: 0 4px 13px rgba(255,170,0,.45); } 50% { transform: scale(1.03); box-shadow: 0 6px 22px rgba(255,170,0,.75); } }
  /* ---- Thema-looks: brede outfit-challenge-kaarten met een strakke checklist ---- */
  .trophy-card.theme { grid-column: 1 / -1; text-align: left; padding: 12px 14px; background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.16); box-shadow: none; }
  .trophy-card.theme.done { background: rgba(255,215,64,.13); border-color: #ffd740; }
  .theme-top { display: flex; align-items: center; gap: 10px; }
  .theme-emoji { font-size: 30px; line-height: 1; }
  .trophy-card.theme.fresh .theme-emoji { filter: grayscale(1); opacity: .4; }
  .trophy-card.theme .tname { margin-top: 0; font-size: 15px; opacity: 1; }
  /* korte teller 'x/y' rechtsboven, in progress-stijl */
  .theme-count { margin-left: auto; font-size: 13px; font-weight: 800; color: #8fd6ff; background: rgba(0,0,0,.3); border-radius: 999px; padding: 3px 11px; }
  .theme-list { list-style: none; margin: 10px 0 0; padding: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 6px 12px; }
  .theme-list li { font-size: 12.5px; line-height: 1.3; display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,.6); }
  .theme-list li.on { color: #8fd6ff; font-weight: 600; }
  /* moderne, ronde checks: leeg bolletje = nog nodig, blauw vinkje = aan */
  .theme-list .pc { flex: 0 0 auto; width: 17px; height: 17px; border-radius: 50%; border: 2px solid rgba(255,255,255,.35); box-sizing: border-box; position: relative; }
  .theme-list li.on .pc { background: #4fc3f7; border-color: #4fc3f7; }
  .theme-list li.on .pc::after { content: '✓'; position: absolute; inset: 0; display: grid; place-items: center; font-size: 11px; font-weight: 900; color: #06263a; }
  /* ---- Claim-feestje: klein, vrolijk, verdwijnt vanzelf ---- */
  .trophy-pop-overlay {
    position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
    background: rgba(20,4,40,.45); animation: popFade .25s ease; cursor: pointer;
  }
  .trophy-pop-overlay.closing { animation: popFade .3s ease reverse forwards; }
  .trophy-pop {
    text-align: center; padding: 22px 30px; border-radius: 24px;
    background: linear-gradient(180deg, #7b1fa2, #4a148c); border: 3px solid #ffd740;
    box-shadow: 0 10px 40px rgba(0,0,0,.5); animation: popIn .45s cubic-bezier(.2,1.3,.4,1);
  }
  .tp-head { font-size: 16px; font-weight: 800; color: #ffe082; }
  .tp-emoji { font-size: 66px; line-height: 1.1; margin: 4px 0; filter: drop-shadow(0 0 10px rgba(255,215,64,.8)); }
  .tp-name { font-size: 20px; font-weight: 800; color: #fff; }
  .tp-joepie { font-size: 15px; font-weight: 700; color: #ffd6f4; margin-top: 4px; }
  @keyframes popFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { 0% { transform: scale(.4) rotate(-6deg); opacity: 0; } 60% { transform: scale(1.1) rotate(3deg); opacity: 1; } 100% { transform: scale(1) rotate(0); } }
  @media (prefers-reduced-motion: reduce) {
    .trophy-card.ready { animation: none; }
    .trophy-pop { animation: none; }
  }
  /* rood stipje op het Trofeeën-tabblad zolang er iets nieuws in de kast ligt */
  .nav-item { position: relative; }
  .nav-item .nav-dot {
    position: absolute; top: 3px; right: calc(50% - 22px); width: 12px; height: 12px;
    border-radius: 50%; background: #ff4081; border: 2px solid #fff; display: none;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  .nav-item.has-new .nav-dot { display: block; }
  @media (max-width: 520px) {
    /* gelijke flexibele zijkolommen: de titel blijft écht in het schermmidden,
       ook nu de linkercel leeg is (met auto|1fr|auto hing hij ~47px naar links) */
    .screen-header { grid-template-columns: 1fr auto 1fr; gap: 8px; }
    .screen-header .header-title { font-size: 20px; overflow: hidden; text-overflow: ellipsis; }
  }

  /* ---- Level einde ---- */
  /* verticaal gecentreerd via veilige auto-marges (knipt nooit af bij overloop) */
  .result-card {
    background: rgba(255,255,255,.14); border: 3px solid rgba(255,255,255,.4);
    border-radius: 28px; padding: 24px 30px; text-align: center; max-width: 460px; margin: auto 0;
  }
  .result-stars { font-size: 56px; letter-spacing: 6px; margin: 10px 0; }
  .result-stars span { display: inline-block; }
  /* gemiste ster: dof én kleurloos — zelfde taal als op de reiskaart */
  .result-stars .dim { opacity: .25; filter: grayscale(1); }
  /* opbrengst als badges — zelfde taal als de teller-pillen elders in de app */
  .earn-line { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0 18px; }
  .earn-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 16px; font-weight: bold; line-height: 1;
    background: rgba(0,0,0,.3); border-radius: 999px; padding: 8px 14px; }
  .earn-chip.dia { background: rgba(41,182,246,.34); }
  .earn-chip.star { background: rgba(255,215,64,.26); }
  .earn-chip.fan { background: rgba(255,64,129,.28); }
  .end-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* ---- Kleedkamer ----
     Opbouw: vaste kop (titel + 💎 + paspop + tabbladen) blijft plakken bovenaan,
     het rek met spulletjes scrollt eronder door, en de actiebalk (passen/kopen)
     zit vast boven de navigatie. Zo is elke tik meteen zichtbaar op de paspop. */
  #screen-dress { padding-bottom: 190px; }
  .hub-sticky {
    position: sticky; top: -12px; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    width: calc(100% + 24px); margin: -12px 0 12px; padding: 12px 12px 13px;
    background: linear-gradient(180deg, rgba(43,7,71,.96), rgba(43,7,71,.82));
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 2px solid rgba(255,255,255,.14);
    border-radius: 0 0 26px 26px;
    box-shadow: 0 10px 24px rgba(20,0,40,.3);
  }
  .hub-sticky .screen-header { margin-bottom: 4px; }
  .dress-stage { width: 200px; height: 168px; }
  .dress-stage .deco { font-size: 20px; }
  @media (max-height: 700px) { .dress-stage { width: 170px; height: 132px; } }
  /* 🎲 verras me: trekt een willekeurige outfit uit wat ze al bezit */
  .stage-wrap { position: relative; }
  .shuffle-btn {
    position: absolute; right: -16px; bottom: -4px; width: 46px; height: 46px;
    border-radius: 50%; border: 2px solid rgba(255,255,255,.75); cursor: pointer;
    font-size: 22px; line-height: 1; font-family: inherit;
    background: linear-gradient(180deg, #ab47bc, #8e24aa);
    box-shadow: 0 4px 0 #4a148c, 0 6px 12px rgba(0,0,0,.35);
    transition: transform .15s;
  }
  .shuffle-btn:hover { transform: rotate(20deg) scale(1.06); }
  .shuffle-btn:active { transform: rotate(180deg) scale(.92); box-shadow: 0 1px 0 #4a148c; }
  .shop-tabs {
    display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto; max-width: 100%;
    margin-top: 10px; padding: 2px 4px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none; -ms-overflow-style: none;
  }
  .shop-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    font-family: inherit; font-size: 15px; font-weight: bold; border: none; cursor: pointer;
    padding: 8px 14px; border-radius: 999px; color: #fff; background: rgba(255,255,255,.18);
    transition: transform .07s, background .12s; white-space: nowrap; flex-shrink: 0;
  }
  .tab-btn:active { transform: scale(.95); }
  .tab-btn.active { background: #ffb300; color: #4a148c; }
  .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; width: 100%; max-width: 680px; }
  .item-card {
    position: relative; background: rgba(255,255,255,.13); border: 2px solid rgba(255,255,255,.35);
    border-radius: 16px; padding: 10px; text-align: center; cursor: pointer;
    transition: transform .07s, background .12s;
  }
  .item-card:hover { background: rgba(255,255,255,.22); }
  .item-card:active { transform: scale(.97); }
  .item-card.selected { background: rgba(255,255,255,.28); border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,.28); transform: scale(1.04); }
  .item-card.equipped { border-color: #ffd740; box-shadow: 0 0 10px rgba(255,215,64,.6); }
  .item-swatch { width: 46px; height: 46px; border-radius: 50%; margin: 0 auto 6px; border: 2px solid rgba(255,255,255,.6); font-size: 30px; line-height: 44px; }
  /* podium-bol met een herkennende emoji erin */
  .item-swatch.stage-swatch { display: grid; place-items: center; font-size: 24px; text-shadow: 0 1px 2px rgba(0,0,0,.45); }
  /* getekend item (jurk/haar/schoen/micro) i.p.v. een kleurbolletje */
  .item-thumb { height: 52px; display: flex; align-items: flex-end; justify-content: center; margin: 0 auto 6px; }
  .item-thumb svg { height: 52px; width: auto; display: block; filter: drop-shadow(0 2px 3px rgba(0,0,0,.3)); }
  .item-thumb .thumb-emo { font-size: 34px; line-height: 52px; }
  .item-name { font-size: 14px; font-weight: bold; overflow-wrap: break-word; hyphens: auto; }
  .item-price { font-size: 15px; margin-top: 4px; min-height: 19px; }
  /* prijs die (nog) niet betaalbaar is: gedimd, maar passen mag altijd */
  .item-price.dim { opacity: .5; }
  /* leesloze eigendoms-badges: dikke gouden ✔ = aan, kleine ✓ = al gekocht */
  .own-badge {
    position: absolute; top: -8px; right: -8px; width: 25px; height: 25px; border-radius: 50%;
    display: grid; place-items: center; font-size: 13px; font-weight: bold;
    background: rgba(255,255,255,.94); color: #2e7d32; border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.35);
  }
  .own-badge.on {
    width: 31px; height: 31px; font-size: 16px;
    background: linear-gradient(180deg, #ffd54f, #ffb300); color: #4a148c;
  }
  /* actiebalk: naam + prijs + dé knop, altijd in beeld boven de navigatie */
  .dress-bar {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 92px; z-index: 39;
    display: none; align-items: center; gap: 10px; width: min(94vw, 430px); min-height: 64px;
    background: rgba(30, 4, 52, .86); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1.5px solid rgba(255,255,255,.22); border-radius: 20px;
    padding: 10px 14px; box-shadow: 0 10px 26px rgba(0,0,0,.4);
  }
  .dress-bar .db-hint { width: 100%; text-align: center; font-size: 15.5px; font-weight: 600; opacity: .85; }
  .dress-bar .db-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; text-align: left; }
  .dress-bar .db-name { font-size: 16.5px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dress-bar .db-sub { font-size: 13.5px; opacity: .92; font-weight: 600; }
  .dress-bar .db-sub.warn { color: #ffd54f; opacity: 1; }
  .dress-bar .btn.small { white-space: nowrap; flex-shrink: 0; }
  /* wegvliegende diamant bij een aankoop */
  .fly-dia { position: fixed; z-index: 95; font-size: 22px; pointer-events: none; }

  /* ---- Instellingen (ouder-dashboard) ---- */
  .settings-sheet { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 14px; }
  .settings-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .settings-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; opacity: .82; }
  .settings-h1 { font-size: 30px; font-weight: 700; line-height: 1.05; text-shadow: 0 2px 0 rgba(0,0,0,.18); }

  .segmented { display: flex; gap: 4px; padding: 4px; border-radius: 16px; background: rgba(0,0,0,.26); }
  .segmented button {
    flex: 1; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; color: #fff;
    border: none; background: transparent; border-radius: 12px; padding: 10px 8px;
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    transition: background .15s, color .15s, box-shadow .15s;
  }
  .segmented button .who { font-size: 19px; }
  .segmented button.on { background: #fff; color: #8e24aa; box-shadow: 0 2px 8px rgba(0,0,0,.22); }
  .segmented.tabs button.on { background: linear-gradient(180deg, #fff, #f4e9fb); }

  .settings-panel { display: flex; flex-direction: column; gap: 14px; }
  .set-card { background: #fff; color: #333; border-radius: 20px; padding: 16px 18px; box-shadow: 0 10px 26px rgba(30,0,50,.24); }
  .set-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .set-card-head .ico { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; display: grid; place-items: center; font-size: 18px; background: #faf6ff; border: 1px solid #ecdcf6; }
  .set-card-head h2 { font-size: 18px; font-weight: 700; color: #8e24aa; }
  .set-card-head .sub { font-size: 12.5px; color: #6b5b7a; font-weight: 500; margin-top: 1px; }

  .set-field { display: flex; flex-direction: column; gap: 7px; }
  .set-field + .set-field { margin-top: 15px; }
  .set-field .lbl { font-size: 13px; font-weight: 700; color: #3a0f56; }
  .set-field .note { font-size: 12px; color: #6b5b7a; font-weight: 500; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    font-family: inherit; font-size: 15.5px; font-weight: 600; cursor: pointer; text-align: center; min-width: 44px;
    border: 2px solid #ecdcf6; background: #fff; color: #8e24aa; border-radius: 999px; padding: 7px 15px;
    transition: transform .07s, background .12s, border-color .12s, color .12s;
  }
  .chip:hover { border-color: #ab47bc; }
  .chip:active { transform: scale(.95); }
  .chip.on { background: linear-gradient(180deg, #ab47bc, #8e24aa); border-color: transparent; color: #fff; box-shadow: 0 3px 9px rgba(142,36,170,.32); }

  .settings-sheet input[type=text] {
    font-family: inherit; font-size: 17px; font-weight: 600; color: #3a0f56;
    border: 2px solid #ecdcf6; border-radius: 12px; padding: 9px 13px; width: 100%; max-width: 220px; background: #faf6ff;
  }
  .settings-sheet input[type=text]:focus-visible { outline: none; border-color: #ab47bc; background: #fff; }
  .data-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .settings-sheet :focus-visible { outline: 3px solid #ffd54f; outline-offset: 2px; }

  .danger-zone {
    background: #fff0f0; border: 1.5px dashed #f2b2b2; border-radius: 20px; padding: 15px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }
  .danger-zone .t { font-size: 14.5px; font-weight: 700; color: #b71c1c; }
  .danger-zone .d { font-size: 12.5px; color: #9a4a4a; font-weight: 500; margin-top: 2px; max-width: 42ch; }
  .danger-btn { background: linear-gradient(180deg, #ef5350, #e53935); color: #fff; border: none; border-radius: 12px; padding: 10px 16px; font-family: inherit; font-weight: 700; font-size: 14.5px; cursor: pointer; box-shadow: 0 4px 0 #a31414; white-space: nowrap; }
  .danger-btn:active { transform: translateY(3px); box-shadow: none; }

  /* ---- Ouder-statistiek (tegels + meter) ---- */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .stat-tile { position: relative; background: #faf6ff; border: 1px solid #ecdcf6; border-radius: 14px; padding: 12px 8px 10px; text-align: center; overflow: hidden; }
  .stat-tile::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--tint, #ab47bc); }
  .stat-tile .num { font-size: 26px; font-weight: 700; color: #3a0f56; line-height: 1; }
  .stat-tile .cap { font-size: 11.5px; color: #6b5b7a; margin-top: 5px; font-weight: 500; line-height: 1.2; }
  .stat-line { display: flex; align-items: baseline; justify-content: space-between; margin: 16px 2px 7px; }
  .stat-line .k { font-size: 14px; font-weight: 600; color: #3a0f56; }
  .stat-line .v { font-size: 16px; font-weight: 700; color: #8e24aa; }
  .stat-bar { height: 13px; background: #efe4f7; border-radius: 999px; overflow: hidden; }
  .stat-bar > div { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #ab47bc, #ff80ab); }
  .practice-hint { font-size: 12.5px; color: #6b5b7a; font-weight: 500; margin: 14px 2px 8px; }
  .practice-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .practice-chip { background: #fff3e0; border: 1px solid #ffd9a0; color: #b3560d; border-radius: 999px; padding: 6px 13px; font-weight: 700; font-size: 15px; }
  .stats-empty { font-size: 13.5px; color: #2e7d32; font-weight: 600; margin-top: 6px; }
  @media (max-width: 480px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } .settings-h1 { font-size: 25px; } }

  /* ---- Modal (oudervraag) ---- */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff; color: #333; border-radius: 20px; padding: 24px 28px; text-align: center; max-width: 340px;
  }
  .modal h3 { color: #7b1fa2; margin-bottom: 10px; }
  .modal input {
    font-family: inherit; font-size: 26px; text-align: center; width: 110px;
    border: 3px solid #ab47bc; border-radius: 12px; padding: 6px; margin: 10px 0;
  }

  .confetti-bit { position: fixed; top: -40px; font-size: 26px; z-index: 90; pointer-events: none; animation: fall linear forwards; }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===== Profielkeuze ===== -->
  <div class="screen active" id="screen-profile">
    <div class="map-sky" aria-hidden="true">
      <span style="top:16%;font-size:30px;animation-duration:80s;animation-delay:-25s">☁️</span>
      <span style="top:42%;font-size:24px;animation-duration:95s;animation-delay:-58s">☁️</span>
      <span style="top:82%;font-size:28px;animation-duration:85s;animation-delay:-40s">☁️</span>
    </div>
    <h1 class="title">🎤 Reken Popsterren 🎶</h1>
    <div class="subtitle">Wie gaat er vandaag schitteren op het podium?</div>
    <div class="profile-row" id="profile-row"></div>
  </div>

  <!-- ===== Kaart / wereldtournee (hoofdscherm) ===== -->
  <div class="screen hub" id="screen-map">
    <div class="map-sky" aria-hidden="true">
      <span style="top:15%;font-size:34px;animation-duration:75s;animation-delay:-20s">☁️</span>
      <span style="top:38%;font-size:26px;animation-duration:95s;animation-delay:-62s">☁️</span>
      <span style="top:78%;font-size:30px;animation-duration:85s;animation-delay:-41s">☁️</span>
      <span style="top:62%;font-size:23px;animation-duration:58s;animation-delay:-12s">✈️</span>
      <div class="brand-sky" aria-hidden="true">
        <span class="mic">🎤</span>
        <span class="n1">🎶</span>
        <span class="n2">🎵</span>
      </div>
    </div>
    <div class="map-topbar">
      <button class="btn small ghost switch-star" onclick="goProfiles()" aria-label="Wissel ster" title="Wissel ster">⬅</button>
      <button class="map-portrait" id="map-portrait" onclick="navGo('dress')" aria-label="Naar de kleedkamer" title="Kleedkamer"></button>
      <div class="map-name" id="map-name"></div>
      <div class="map-chips">
        <span class="chip-badge">💎 <span id="map-diamonds">0</span></span>
        <span class="chip-badge">⭐ <span id="map-stars">0</span></span>
      </div>
    </div>
    <div class="map-flex">
      <div class="tour-map hscroll-fade" id="tour-map"></div>
    </div>
  </div>

  <!-- ===== Spel ===== -->
  <div class="screen" id="screen-game">
    <div class="game-top">
      <button class="btn small ghost" onclick="askQuit()" aria-label="Show stoppen">⬅</button>
      <div class="game-city" id="game-lvl-label"></div>
      <div class="notes-left" id="notes-left"></div>
      <div class="diamond-badge compact">💎 <span id="game-diamonds">0</span></div>
    </div>
    <div class="qprogress" id="qprogress"></div>
    <div class="game-arena">
      <div class="show-panel">
        <div class="show-inner">
          <div class="fan-col">
            <div class="fan-icon">👏</div>
            <div class="fan-track"><div class="fan-fill" id="fanmeter-fill"></div></div>
          </div>
          <div class="stage show-stage" id="show-stage">
            <div class="avatar-holder idle" id="game-avatar-inner"></div>
          </div>
        </div>
      </div>
      <div class="math-panel">
        <div class="question-card" id="question-card">
          <div id="question-text"></div>
          <div class="spot-rail" aria-hidden="true"><div class="spotlight-bar" id="spotlight-bar"></div></div>
        </div>
        <div class="gold-banner" id="gold-banner"></div>
        <div id="answer-area"></div>
      </div>
    </div>
  </div>

  <!-- bevestiging vóór het verlaten van een show (voorkomt per-ongeluk-tikken) -->
  <div class="modal-bg" id="quit-modal" onclick="if(event.target===this)closeQuitModal()">
    <div class="modal">
      <h3>🎭 Show stoppen?</h3>
      <div style="font-size:15px;color:#6b5b7a;margin-bottom:14px">Dan stopt dit optreden en ga je terug naar de kaart.</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn green" onclick="closeQuitModal()">🎤 Doorspelen</button>
        <button class="btn small" style="background:linear-gradient(180deg,#90a4ae,#607d8b);box-shadow:0 3px 0 #37474f" onclick="quitGame()">Stoppen</button>
      </div>
    </div>
  </div>

  <!-- ===== Trofeeën ===== -->
  <div class="screen hub" id="screen-trophies">
    <div class="hub-sticky">
      <div class="screen-header">
        <div class="header-left"></div>
        <div class="header-title">🏆 Trofeeënkast</div>
        <div class="diamond-badge header-right">💎 <span id="trophy-diamonds">0</span></div>
      </div>
      <div class="kast-progress">
        <div class="kast-progress-text" id="trophy-count"></div>
        <div class="kast-bar"><div class="kast-bar-fill" id="trophy-bar"></div></div>
      </div>
    </div>
    <div id="trophy-shelves"></div>
  </div>

  <!-- ===== Level einde ===== -->
  <div class="screen" id="screen-end">
    <div class="result-card">
      <h1 class="title" id="end-title"></h1>
      <div class="stage tappable" id="end-stage" style="width:180px;height:200px;margin:6px auto 2px;" onclick="tapDance('end-avatar')">
        <div class="avatar-holder idle" id="end-avatar"></div>
      </div>
      <div class="result-stars" id="end-stars"></div>
      <div id="end-text" style="font-size:19px"></div>
      <div class="earn-line" id="end-earn"></div>
      <div class="end-actions">
        <button class="btn big" id="btn-end-next"></button>
        <button class="btn soft" id="btn-end-alt"></button>
      </div>
    </div>
  </div>

  <!-- ===== Kleedkamer (passen én kopen op één plek) ===== -->
  <div class="screen hub" id="screen-dress">
    <div class="hub-sticky">
      <div class="screen-header">

// terug die nét klaar zijn komen te liggen.
function checkTrophies(p) {
  if (!p.readyTrophies) p.readyTrophies = [];
  const nieuw = [];
  for (const t of TROPHIES) {
    if (!p.trophies.includes(t.id) && !p.readyTrophies.includes(t.id) && t.has(p)) {
      p.readyTrophies.push(t.id);
      nieuw.push(t);
    }
  }
  return nieuw;
}

// Zorgt dat oudere opgeslagen profielen de nieuwe velden krijgen.
function migrate(p) {
  if (!p.trophies) p.trophies = [];
  // Bestaande spelers: alles wat al behaald is blijft 'behaald' (staat in trophies).
  // readyTrophies begint leeg; alleen echt nog-niet-geclaimde-maar-gehaalde trofeeën
  // komen daarna 'klaar' te liggen — geen plotse muur van "Klaar!" voor oude saves.
  if (!p.readyTrophies) p.readyTrophies = [];
  if (p.goldHits == null) p.goldHits = 0;
  if (p.encores == null) p.encores = 0;
  if (p.perf == null) p.perf = 0.5;
  if (!p.weak) p.weak = {};
  if (!p.stats) p.stats = { correct: 0, wrong: 0 };
  if (!('instrument' in p.equipped)) p.equipped.instrument = null;
  // schoentjes-categorie: bestaande profielen krijgen de gratis roze schoentjes aan
  if (!('shoes' in p.equipped)) {
    p.equipped.shoes = 'shoes_roze';
    if (!p.owned.includes('shoes_roze')) p.owned.push('shoes_roze');
  }
}

// Goed = omhoog (extra beloond bij snel binnen de spotlight), fout = omlaag.
function updatePerf(p, correct, fast) {
  const target = correct ? (fast ? 1 : 0.85) : 0;
  p.perf = Math.max(0, Math.min(1, p.perf * 0.8 + target * 0.2));
}

// Werkt op mobiele browsers die de Vibration API ondersteunen (Android/Chrome).
// Staat los van geluid, zodat trillen ook aan kan met de app op stil.
function buzz(pattern) {
  if (!db.haptics) return;
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) { /* geen trilmotor */ }
}

/* ================= Geluid ================= */
let actx = null;
function beep(freq, dur, delay, type, vol) {
  if (!db.sound) return;
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime + (delay || 0);
    g.gain.setValueAtTime(vol || 0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch (e) { /* geen audio */ }
}

function renderGearMenu() {
  const setRow = (id, stateId, on, icoOn, icoOff) => {
    const item = $(id), st = $(stateId);
    if (!item || !st) return;
    st.textContent = on ? 'Aan' : 'Uit';

    item.querySelector('.gi-ico').textContent = on ? icoOn : icoOff;
  };
  setRow('gear-sound', 'gear-sound-state', db.sound, '🔊', '🔇');

function toggleGearMenu(e) {
  if (e) e.stopPropagation();
  const m = $('gear-menu'), g = $('btn-gear');
  const open = !m.classList.contains('open');
  if (open) renderGearMenu();
  m.classList.toggle('open', open);
  g.classList.toggle('on', open);
  g.setAttribute('aria-expanded', open ? 'true' : 'false');
  if (open) sndClick();
}
function closeGearMenu() {
  const m = $('gear-menu'), g = $('btn-gear');
