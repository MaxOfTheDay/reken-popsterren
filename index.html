  @keyframes rankBadgePop { 0% { transform: scale(0) rotate(-45deg); } 60% { transform: scale(1.2) rotate(8deg); } 100% { transform: scale(1) rotate(0); } }
  @keyframes rankTextRise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  @keyframes rankSpark {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(.3); }
    22% { opacity: 1; }
    100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.05); }
  }

  /* ===== Trofee-feestje, versie "dopamine" =====
     Vier momenten: (1) de klare kaart lokt met glans + wiebel, (2) de tik geeft
     een ripple, (3) het openen is een schatkist die openknalt met stralen,
     schokgolf en een confetti-kanon, (4) de behaalde kaart glimt kort na. */

  /* (1) Klare trofee: een glans-veeg glijdt over de kaart + het cadeau wiebelt */
  .trophy-card.ready { overflow: hidden; }
  .trophy-card.ready::after {
    content: ''; position: absolute; top: 0; left: -60%; width: 45%; height: 100%; z-index: 3; pointer-events: none;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,.55), transparent); transform: skewX(-18deg);
    animation: shineSweep 2.6s ease-in-out infinite;
  }
  @keyframes shineSweep { 0% { left: -60%; } 55%, 100% { left: 130%; } }
  .trophy-card.ready .temoji { animation: giftWiggle 2.2s ease-in-out infinite; transform-origin: 50% 90%; }
  @keyframes giftWiggle {
    0%, 58%, 100% { transform: rotate(0) translateY(0); }
    66% { transform: rotate(-9deg); } 74% { transform: rotate(8deg); }
    82% { transform: rotate(-5deg) translateY(-2px); } 90% { transform: rotate(3deg); }
  }

  /* (2) Tik-ripple: een lichtkringetje dat vanaf de vingerplek uitdijt */
  .tap-ripple {
    position: fixed; z-index: 93; pointer-events: none; width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,236,150,.85), rgba(255,236,150,0) 70%);
    transform: translate(-50%, -50%) scale(0); animation: tapRipple .5s ease-out forwards;
  }
  @keyframes tapRipple { 0% { transform: translate(-50%,-50%) scale(0); opacity: .9; } 100% { transform: translate(-50%,-50%) scale(9); opacity: 0; } }

  /* (3) Openen: schatkist-moment met stralen, schokgolf en emoji-inslag */
  .tp-stage { position: relative; width: 150px; height: 118px; margin: 6px auto 2px; display: flex; align-items: center; justify-content: center; }
  .tp-chest { position: absolute; z-index: 2; font-size: 74px; line-height: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.4)); animation: chestShake .5s ease-in-out infinite; }
  @keyframes chestShake { 0%,100% { transform: rotate(-5deg) translateY(0); } 25% { transform: rotate(5deg) translateY(-2px); } 50% { transform: rotate(-4deg); } 75% { transform: rotate(4deg) translateY(-2px); } }
  .tp-emoji { position: relative; z-index: 3; font-size: 66px; line-height: 1.1; filter: drop-shadow(0 0 10px rgba(255,215,64,.85)); opacity: 0; transform: scale(.2); }
  .tp-rays {
    position: absolute; width: 210px; height: 210px; z-index: 1; opacity: 0; border-radius: 50%;
    background: repeating-conic-gradient(from 0deg, rgba(255,236,150,.5) 0deg 9deg, transparent 9deg 21deg);
    -webkit-mask: radial-gradient(circle, #000 20%, transparent 68%); mask: radial-gradient(circle, #000 20%, transparent 68%);
  }
  .tp-ring { position: absolute; width: 58px; height: 58px; border-radius: 50%; border: 4px solid rgba(255,236,150,.9); z-index: 1; opacity: 0; }
  .trophy-pop .tp-name, .trophy-pop .tp-joepie { opacity: 0; }
  .trophy-pop.burst .tp-chest { animation: chestBurst .4s ease forwards; }
  @keyframes chestBurst { 0% { transform: scale(1) rotate(0); opacity: 1; } 45% { transform: scale(1.25) rotate(-4deg); } 100% { transform: scale(1.75); opacity: 0; } }
  /* Onthulling én daarna: het emoji verschijnt met een bounce en blijft dan zacht
     wiegen zolang de trofee 'open' staat (tot je sluit). */
  .trophy-pop.burst .tp-emoji { animation: emojiReveal .55s cubic-bezier(.2,1.5,.4,1) .12s forwards, emojiBob 2.6s ease-in-out .75s infinite; }
  @keyframes emojiReveal { 0% { opacity: 0; transform: scale(.2) rotate(-12deg); } 60% { opacity: 1; transform: scale(1.18) rotate(5deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
  @keyframes emojiBob { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-5px) scale(1.05); } }
  /* De lichtstralen blijven traag ronddraaien terwijl de trofee open is. */
  .trophy-pop.burst .tp-rays { animation: raysReveal .5s ease .12s forwards, raysSpin 10s linear .12s infinite; }
  @keyframes raysReveal { 0% { opacity: 0; } 100% { opacity: .5; } }
  @keyframes raysSpin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .trophy-pop.burst .tp-ring { animation: ringOut .55s ease-out .12s forwards; }
  @keyframes ringOut { 0% { opacity: .9; transform: scale(.4); } 100% { opacity: 0; transform: scale(3.4); } }
  .trophy-pop.burst .tp-name { animation: rankTextRise .45s ease .25s both; }
  .trophy-pop.burst .tp-joepie { animation: rankTextRise .45s ease .38s both; }

  /* Confetti-kanon: stukjes vliegen vanuit één punt naar buiten (met lichte zwaartekracht) */
  .burst-bit { position: fixed; z-index: 92; pointer-events: none; font-size: 24px; will-change: transform, opacity; animation: burstOut .95s cubic-bezier(.15,.6,.3,1) forwards; }
  @keyframes burstOut {
    0% { transform: translate(-50%,-50%) scale(.3); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(var(--rot)); opacity: 0; }
  }

  /* (4) Net behaald: een eenmalige gouden shimmer over de kaart. Blijft binnen de
     kaart (inset:0 + verschuivende gradient) zodat het uitstekende 🏆-badge niet
     wordt afgesneden; z-index onder het badge (dat z-index 3 heeft). */
  .trophy-card.just-claimed::after {
    content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none; border-radius: inherit;
    background: linear-gradient(105deg, transparent 38%, rgba(255,236,150,.7) 50%, transparent 62%);
    background-size: 250% 100%; background-position: 120% 0;
    animation: claimShimmer .9s ease-out forwards;
  }
  @keyframes claimShimmer { from { background-position: 120% 0; } to { background-position: -40% 0; } }

  @media (prefers-reduced-motion: reduce) {
    .trophy-card.ready { animation: none; }
    .trophy-card.ready::after, .trophy-card.ready .temoji, .trophy-card.just-claimed::after { animation: none; }
    .trophy-pop { animation: none; }
    .tp-chest, .tp-rays, .tp-ring, .burst-bit, .tap-ripple { display: none; }
    .trophy-pop .tp-name, .trophy-pop .tp-joepie, .trophy-pop.burst .tp-emoji { opacity: 1; transform: none; animation: none; }
    .end-trophy-banner { animation: none; }
    .rankup-badge, .rankup-label, .rankup-name { animation: none; }
    .rankup-spark { display: none; }
  }
  /* geel/goud stipje op het Trofeeën-tabblad zolang er iets nieuws in de kast ligt —
     zelfde kleurtaal als de rest van de trofee-elementen (banner, kast-balk, ready-kaart) */
  .nav-item { position: relative; }
  .nav-item .nav-dot {
    position: absolute; top: 3px; right: calc(50% - 22px); width: 12px; height: 12px;
    border-radius: 50%; background: var(--gold-marigold); border: 2px solid var(--c-white); display: none;
    box-shadow: 0 1px 4px var(--glass-black-40);
  }
  .nav-item.has-new .nav-dot { display: block; }
  @media (max-width: 520px) {
    /* gelijke flexibele zijkolommen: de titel blijft écht in het schermmidden,
       ook nu de linkercel leeg is (met auto|1fr|auto hing hij ~47px naar links) */
    .screen-header { grid-template-columns: 1fr auto 1fr; gap: 8px; }
    .screen-header .header-title { font-size: 20px; overflow: hidden; text-overflow: ellipsis; }
  }

  /* ---- Level einde ---- */
  /* verticaal gecentreerd via veilige auto-marges (knipt nooit af bij overloop) */
  .result-card {
    background: var(--glass-white-14); border: 3px solid var(--glass-white-40);
    border-radius: 28px; padding: 24px 30px; text-align: center; max-width: 460px; margin: auto 0;
  }
  /* eigen klasse i.p.v. de vorige losse inline width/height -- net als de andere
     paspop-scènes (.dress-stage, .show-stage) nu met eigen smalle-scherm-maat,
     zodat 'm ook op een laag/liggend toestel nooit afgesneden wordt */
  .end-stage { width: 180px; height: 200px; margin: 6px auto 2px; }
  @media (max-height: 700px) { .end-stage { width: 140px; height: 156px; } }
  .end-text { font-size: 19px; }
  .dance-subline { margin-top: 6px; font-size: 17px; }
  .result-stars { font-size: 56px; letter-spacing: 6px; margin: 10px 0; }
  .result-stars span { display: inline-block; }
  /* gemiste ster: dof én kleurloos — zelfde taal als op de reiskaart */
  .result-stars .dim { opacity: .25; filter: grayscale(1); }
  /* opbrengst als badges — zelfde taal als de teller-pillen elders in de app */
  .earn-line { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0 18px; }
  .earn-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 16px; font-weight: bold; line-height: 1;
    background: var(--glass-black-30); border-radius: var(--radius-pill); padding: 8px 14px; }
  .earn-chip.dia { background: rgba(41,182,246,.34); }
  .earn-chip.star { background: rgba(255,215,64,.26); }
  .earn-chip.fan { background: rgba(255,64,129,.28); }
  /* nieuwe carrièrerang: dé mijlpaal van de show -- gouden pil die eruit springt */
  .earn-chip.rank { background: linear-gradient(180deg, var(--gold-light), var(--gold-deep)); color: var(--ink-on-gold); box-shadow: 0 2px 10px rgba(255,179,0,.4); }
  .earn-chip.nextrank { background: rgba(255,215,64,.18); border: 1px dashed rgba(255,215,64,.5); }
  /* eigen, opvallend blokje i.p.v. een tekstregel tussen de andere zinnen — zelfde
     gouden puls als een "klaar om te openen"-trofee in de kast (via .gold-pill),
     zodat dit al vooruitwijst naar wat je zo meteen ziet. Zelf ook klikbaar
     (net als die trofeekaartjes): een gouden pulserende pil roept nu eenmaal
     om aangetikt te worden, dus de knop eronder alleen was niet genoeg.
     .result-card's text-align:center centreert 'm vanzelf, dankzij .gold-pill's
     eigen inline-flex (i.p.v. block-level flex, dat zou juist uitrekken). */
  .end-trophy-banner { margin: 0 0 14px; }
  .end-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* ---- Kleedkamer ----
     Opbouw: vaste kop (titel + 💎 + paspop + tabbladen) blijft plakken bovenaan,
     het rek met spulletjes scrollt eronder door, en de actiebalk (passen/kopen)
     zit vast boven de navigatie. Zo is elke tik meteen zichtbaar op de paspop. */
  #screen-dress { padding-bottom: 190px; }
  .hub-sticky {
    position: sticky; top: -12px; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    width: calc(100% + 24px); margin: -12px 0 12px; padding: 12px 12px 13px;
    background: linear-gradient(180deg, rgba(43,7,71,.96), rgba(43,7,71,.82));
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 2px solid var(--glass-white-14);
    border-radius: 0 0 26px 26px;
    box-shadow: 0 10px 24px rgba(20,0,40,.3);
  }
  .hub-sticky .screen-header { margin-bottom: 4px; }
  /* de rand-/gloedbehandeling zit nu in de gedeelde .stage-frame (zie .stage
     hierboven) -- hier alleen nog de eigen afmeting van de kleedkamer-scène */
  .dress-stage { width: 200px; height: 168px; }
  .dress-stage .deco { font-size: 20px; }
  @media (max-height: 700px) { .dress-stage { width: 170px; height: 132px; } }
  /* 🎲 verras me: trekt een willekeurige outfit uit wat ze al bezit.
     Zit los van .dress-stage (buiten de overflow:hidden), dus overlapt de
     afgeronde hoek fysiek -- de extra buitenste ring in dezelfde lavendel-
     tint als de tegenwoordig dunnere kadervulling laat 'm daar als bewust
     "badge op de rand" ogen i.p.v. een rand die er zomaar stopt. */
  .stage-wrap { position: relative; }
  .shuffle-btn {
    position: absolute; right: -16px; bottom: -4px; width: 46px; height: 46px;
    border-radius: 50%; border: 2px solid rgba(255,255,255,.75); cursor: pointer;
    font-size: 22px; line-height: 1; font-family: inherit;
    background: linear-gradient(180deg, var(--purple-light), var(--purple-mid));
    box-shadow: 0 var(--btn-lip-sm) 0 var(--purple-shadow), 0 6px 12px var(--glass-black-35), 0 0 0 3px var(--glass-white-18);
    transition: transform .15s;
  }
  .shuffle-btn:hover { transform: rotate(20deg) scale(1.06); }
  .shuffle-btn:active { transform: rotate(180deg) scale(.92); box-shadow: 0 1px 0 var(--purple-shadow); }
  /* alle 8 categorieën blijven altijd zichtbaar (geen scroll-carrousel meer) --
     container query i.p.v. een viewport-breakpoint: kijkt naar hoeveel ruimte
     .shop-tabs zelf heeft (via .shop-tabs-wrap), niet naar het schermformaat.
     Onder de drempel: vaste 4x2-grid (8 categorieën, geen scroll nodig).
     Erboven: 1 rij van 8, allemaal even breed. */
  .shop-tabs-wrap { width: 100%; max-width: 960px; margin-top: 10px; container-type: inline-size; }
  .shop-tabs { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; padding: 2px 4px; }
  /* 855px = de gemeten breedte die alle 8 knoppen nodig hebben op hun eigen,
     ongekrompen (content-based) breedte -- pas daarboven schakelt het naar 1
     rij, anders zou "Schoenen" (de breedste) worden afgeknot */
  @container (min-width: 855px) {
    .shop-tabs { grid-template-columns: repeat(8, minmax(0, 1fr)); }
  }
  .tab-btn {
    font-family: inherit; font-size: 14px; font-weight: bold; border: none; cursor: pointer;
    letter-spacing: -.3px; padding: 10px 2px; border-radius: var(--radius-pill); color: var(--c-white); background: var(--glass-white-18);
    transition: transform .07s, background .12s;
    display: flex; align-items: center; justify-content: center; gap: 2px; min-height: 44px;
  }
  /* text-overflow:ellipsis werkt niet betrouwbaar rechtstreeks op een flex-
     container (.tab-btn hierboven) -- de labeltekst zit daarom in een eigen
     inline kindje met min-width:0, zodat een te lang tabblad-label (bv. op de
     smalste telefoons) netjes afkapt met "…" i.p.v. hard te knippen */
  .tab-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .tab-btn:active { transform: scale(.95); }
  .tab-btn.active { background: var(--gold-deep); color: var(--purple-shadow); }
  .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; width: 100%; max-width: 680px; }
  .item-card {
    position: relative; background: var(--glass-white-13); border: 2px solid var(--glass-white-35);
    border-radius: var(--radius-md); padding: 10px; text-align: center; cursor: pointer;
    transition: transform .07s, background .12s, border-color .12s, box-shadow .12s;
  }
  .item-card:hover { background: var(--glass-white-22); }
  .item-card:active { transform: scale(.97); }
  /* kaart-staten volgen de prijzenkast: blauw = actief/preview, goud = aan/beloning */
  .item-card.selected { background: rgba(56,189,248,.16); border-color: var(--blue-text); box-shadow: 0 0 0 3px rgba(56,189,248,.22); transform: scale(1.025); }
  .item-card.equipped { border-color: var(--gold-accent); background: rgba(255,214,90,.10); box-shadow: 0 0 12px rgba(255,215,64,.48); }
  .item-card.selected.equipped { border-color: var(--gold-accent); box-shadow: 0 0 0 3px rgba(56,189,248,.20), 0 0 14px rgba(255,215,64,.55); }
  /* .owned and .selected are two plain (non-combined) classes with identical
     specificity, both setting background/border-color -- .owned happened to
     be declared later in the file, so it silently won that tie and previewing
     an owned item showed a half-gray, half-blue card (gray body, blue ring
     only, since .owned doesn't touch box-shadow/transform). Ownership is
     already communicated by the status badge below, so the card itself
     should just show the same full "you're looking at this" blue as any
     other selected item -- this combined selector's higher specificity wins
     outright, no reliance on rule order. */
  .item-card.owned.selected { background: rgba(56,189,248,.16); border-color: var(--blue-text); }
  /* zelfde tie als hierboven, maar dan voor :hover -- .owned/.equipped/.selected
     zetten allemaal hun eigen achtergrond, met dezelfde specificiteit als de
     kale .item-card:hover regel. Die verliest dus stilzwijgend de tie (bron-
     volgorde), en een owned/equipped/selected kaartje reageerde daardoor
     helemaal niet op hover terwijl een niet-bezeten kaartje wél oplichtte.
     Hier expliciet per staat een eigen, iets lichtere hover-tint (in de eigen
     kleur van die staat) zodat ieder kaartje evengoed op hover reageert. */
  .item-card.owned:hover { background: rgba(180,184,196,.18); }
  .item-card.equipped:hover { background: rgba(255,214,90,.18); }
  .item-card.selected:hover, .item-card.owned.selected:hover { background: rgba(56,189,248,.24); }
  .item-card.selected.equipped:hover { background: rgba(255,214,90,.18); }
  .item-card.just-bought { animation: boughtPop .85s ease; }
  @keyframes boughtPop { 0% { transform: scale(1); } 35% { transform: scale(1.08); box-shadow: 0 0 22px rgba(255,215,64,.75); } 100% { transform: scale(1); } }
  .item-swatch { width: 46px; height: 46px; border-radius: 50%; margin: 0 auto 6px; border: 2px solid rgba(255,255,255,.6); font-size: 30px; line-height: 44px; }
  /* podium-bol met een herkennende emoji erin */
  .item-swatch.stage-swatch { display: grid; place-items: center; font-size: 24px; text-shadow: 0 1px 2px rgba(0,0,0,.45); }
  /* getekend item (jurk/haar/schoen/micro) i.p.v. een kleurbolletje */
  .item-thumb { height: 52px; display: flex; align-items: flex-end; justify-content: center; margin: 0 auto 6px; }
  .item-thumb svg { height: 52px; width: auto; display: block; filter: drop-shadow(0 2px 3px var(--glass-black-30)); }
  .item-thumb .thumb-emo { font-size: 34px; line-height: 52px; }
  .item-name { font-size: 14px; font-weight: bold; overflow-wrap: break-word; hyphens: auto; }
  .item-status {
    display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    min-height: 21px; margin-top: 5px; padding: 3px 9px; border-radius: var(--radius-pill);
    font-size: 12px; font-weight: 800; line-height: 1; white-space: nowrap;
    background: var(--glass-black-24); color: var(--muted-text-2);
  }
  .item-status.price { color: var(--gold-light); background: rgba(255,179,0,.16); }
  .item-status.need { color: var(--gold-warm); background: var(--glass-black-30); opacity: .88; }
  .item-status.owned { color: var(--muted-text-3); background: rgba(180,184,196,.25); }
  .item-status.on { color: var(--ink-on-gold); background: linear-gradient(180deg, var(--gold-light), var(--gold-deep)); box-shadow: 0 1px 5px rgba(255,179,0,.35); }
  .item-status.preview { color: var(--blue-text); background: rgba(56,189,248,.16); box-shadow: 0 0 0 1px var(--blue-ring); }
  .item-status.new { color: var(--ink-on-gold); background: linear-gradient(180deg, var(--gold-flash), var(--gold-marigold)); animation: readyPulse 1.4s ease-in-out 2; }

  /* ---- Looks-modus: complete outfits als spaardoel, dwars door de categorieën
     heen. Elk stukje is een mini-versie van de gewone kleren-kaart (zelfde
     miniatuur + dezelfde rand-taal: geen rand/dof = ontbreekt, grijs = bezit,
     goud+gloed = nu aan) i.p.v. een tekstregel -- zo oogt de looks-pagina als
     een natuurlijke uitbreiding van de Kleren-pagina, niet als iets aparts. */
  .item-grid.looks-view { grid-template-columns: 1fr; max-width: 560px; gap: 10px; }
  /* kaart houdt altijd dezelfde vorm/structuur/hoogte aan, ongeacht status of
     hoeveel stukjes een look heeft -- positie in de lijst verandert nooit (zie
     renderLookGoals). De hele kaart is zelf de "trek aan wat ik heb"-actie
     (geen apart knopje/teller meer nodig: de stukjes-rand toont de voortgang
     al goud-op-goud zodra alles aan staat), dus de kop blijft kaal: alleen
     icoon + naam, geen teller of voortgangsbalk. */
  .look-goal {
    height: 136px; display: flex; flex-direction: column; overflow: hidden;
    background: var(--glass-white-10); border: 1.5px solid var(--glass-white-14);
    border-radius: var(--radius-md); padding: 10px 12px; text-align: left; cursor: pointer;
    transition: transform .07s;
  }
  .look-goal:active { transform: scale(.98); }
  .look-goal.flash { animation: lookFlash 1.4s ease; }
  @keyframes lookFlash { 0%, 100% { box-shadow: none; } 25%, 60% { box-shadow: 0 0 0 2px var(--gold-accent), 0 0 16px rgba(255,214,90,.55); } }
  .look-goal-head { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; }
  .look-goal-head .lemoji { font-size: 22px; line-height: 1; }
  .look-goal-head .lname { font-size: 15px; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* stukjes-rij: mini-kaartjes, dezelfde miniaturen + rand-kleurtaal als .item-card.
     Gelijke flex-breedte (i.p.v. wrap) zodat de rij altijd op één regel staat,
     hoe je ook telt (meestal 4 stukjes, regenboogster heeft er 5). */
  .look-pieces { flex: 1; display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .look-piece {
    flex: 1 1 0; min-width: 0; height: 72px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer; text-align: center;
    border-radius: var(--radius-sm); padding: 3px 2px; transition: transform .07s, background .12s;
  }
  .look-piece:active { transform: scale(.94); }
  /* vaste, compacte icoon-zone: elk stukje staat zo op dezelfde basislijn, strak
     om het icoon heen, ongeacht of het een svg-tekening, emoji of kleurbolletje is. */
  .look-piece .item-thumb { height: 30px; width: 100%; display: flex; align-items: center; justify-content: center; margin: 0 0 3px; }
  .look-piece .item-thumb svg { height: 24px; width: auto; }
  /* icoon-gewicht in balans: kleine/smalle vormen (schoenen, micro, bril e.d.
     via emoji) iets groter, van nature grote vormen (jurk) juist iets kleiner --
     anders oogt de rij ongelijk terwijl de stukjes zelf gelijk belangrijk zijn. */
  .look-piece[data-cat="dress"] .item-thumb svg { height: 21px; }
  .look-piece[data-cat="shoes"] .item-thumb svg { height: 29px; }
  .look-piece[data-cat="mic"] .item-thumb svg { height: 27px; }
  .look-piece .item-thumb .thumb-emo { font-size: 22px; line-height: 1; }
  .look-piece .item-swatch { width: 22px; height: 22px; margin: 0 0 3px; border-width: 1.5px; }
  .look-piece .item-swatch.stage-swatch { font-size: 13px; }
  .look-piece .lp-name {
    font-size: 10px; font-weight: 700; line-height: 1.15; color: var(--muted-lavender-text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; word-break: break-word;
  }
  /* precies dezelfde staten als .item-card: ontbreekt = dof/grijswaarden,
     bezit = zachtgrijs, nu aan = goud + gloed */
  .look-piece.miss { opacity: .45; }
  .look-piece.miss .item-thumb, .look-piece.miss .item-swatch { filter: grayscale(1); }
  .look-piece.have { background: rgba(180,184,196,.16); }
  .look-piece.have .lp-name { color: var(--muted-text-3); }
  .look-piece.on { background: rgba(255,214,90,.16); box-shadow: 0 0 0 1.5px var(--gold-accent); }
  .look-piece.on .lp-name { color: var(--gold-light); }
  .shop-mode { margin-top: 12px; max-width: 300px; }
  /* bezit/aan staat op het kaartje via rustige kaartkleur: grijs = hebben, goud = aan. */
  .item-card.owned { border-color: rgba(180,184,196,.64); background: rgba(180,184,196,.10); }
  /* actiebalk: naam + prijs + dé knop, altijd in beeld boven de navigatie */
  .dress-bar {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 92px; z-index: 39;
    display: none; align-items: center; gap: 10px; width: min(94vw, 430px); min-height: 52px;
    background: rgba(30, 4, 52, .86); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1.5px solid var(--glass-white-22); border-radius: var(--radius-lg);
    padding: 10px 14px; box-shadow: 0 10px 26px var(--glass-black-40);
  }
  .dress-bar .db-info { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 6px; text-align: left; white-space: nowrap; overflow: hidden; }
  .dress-bar .db-name { font-size: 16.5px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dress-bar .db-sub { flex: 0 1 auto; min-width: 0; font-size: 13.5px; opacity: .92; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dress-bar .db-highlight { color: var(--gold-warm); font-weight: 700; }
  .dress-bar .btn.small { white-space: nowrap; flex-shrink: 0; }
  /* wegvliegende diamant bij een aankoop */
  .fly-dia { position: fixed; z-index: 95; font-size: 22px; pointer-events: none; }

  /* ---- Instellingen (ouder-dashboard) ---- */
  .settings-sheet { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 14px; }

  /* zelfde donkerpaarse .hub-sticky-kop als de rest van de app: ← terug ·
     Instellingen · (opgeslagen-bevestiging), met de profielkiezer en de
     Voortgang|Instellen-navigatie er direct onder, ook altijd in beeld */
  /* max-width: zonder dit rekt de balk op brede (desktop) schermen uit tot de
     volle breedte van .hub-sticky -- dan wordt de geselecteerde knop een groot
     leeg goud blok en zweeft de tekst van de andere knop eenzaam ver weg aan
     de andere kant. Blijft op smalle schermen gewoon 100% breed. */
  .segmented { display: flex; gap: 4px; padding: 4px; border-radius: var(--radius-md); background: var(--glass-black-26); width: 100%; max-width: 460px; }
  .segmented button {
    flex: 1; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--c-white);
    border: none; background: transparent; border-radius: var(--radius-sm); padding: 10px 8px;
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    transition: background .15s, color .15s, box-shadow .15s;
  }
  .segmented button .who { font-size: 19px; }
  /* geel = actieve navigatie/focus (zelfde taal als .tab-btn.active in de
     kleedkamer en .nav-item.active in de vaste navigatie), i.p.v. het vorige
     losse wit -- paars blijft gereserveerd voor gewone (niet-navigatie) keuzes */
  .segmented button.on { background: var(--gold-deep); color: var(--purple-shadow); box-shadow: 0 2px 8px rgba(0,0,0,.22); }
  /* korte, subtiele bevestiging na elke automatische opslag -- verschijnt even
     in de anders lege rechterkop-cel, geen aparte "Opslaan"-knop nodig */
  .saved-pill {
    font-size: 12.5px; font-weight: 700; color: var(--green-deep); background: var(--green-badge-bg);
    border-radius: var(--radius-pill); padding: 5px 12px; white-space: nowrap;
    opacity: 0; transform: translateY(-4px); transition: opacity .25s, transform .25s; pointer-events: none;
  }
  .saved-pill.show { opacity: 1; transform: translateY(0); }

  .settings-panel { display: flex; flex-direction: column; gap: 14px; }
  .set-card { background: var(--c-white); color: var(--c-ink); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: 0 10px 26px rgba(30,0,50,.24); }
  .set-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .set-card-head .ico { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; display: grid; place-items: center; font-size: 18px; background: var(--paper-tint); border: 1px solid var(--paper-border); }
  .set-card-head h2 { font-size: 18px; font-weight: 700; color: var(--purple-mid); }
  .set-card-head .sub { font-size: 12.5px; color: var(--paper-ink-muted); font-weight: 500; margin-top: 1px; }
  /* "Wat oefenen" en "Hoe spelen" zijn de kern van dit scherm -- een paarse
     (structuur-kleur) icoonvulling + iets steviger kop zet ze visueel voorop
     t.o.v. de secundaire kaarten (Profiel, Gegevens beheren) eronder */
  .set-card.primary { border: 1.5px solid var(--purple-light); }
  .set-card.primary .set-card-head .ico { background: linear-gradient(180deg, var(--purple-light), var(--purple-mid)); color: var(--c-white); border-color: transparent; }
  .set-card.primary .set-card-head h2 { font-size: 19.5px; }
  /* wissen blijft een aparte, duidelijk gemarkeerde stap binnen de kaart
     "Gegevens beheren" i.p.v. een losse sectie los van de back-up-knoppen */
  .set-card .danger-zone { margin-top: 14px; }

  .set-field { display: flex; flex-direction: column; gap: 7px; }
  .set-field + .set-field { margin-top: 15px; }
  .set-field .lbl { font-size: 13px; font-weight: 700; color: var(--paper-ink); }
  .set-field .note { font-size: 12px; color: var(--paper-ink-muted); font-weight: 500; }
  /* "Tafels van" only matters once Maal/Delen is on -- dimmed (not disabled: still
     tappable, so a parent can pre-select tables before turning the operation on) */
  .set-field.inactive { opacity: .5; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
  /* Bewerkingen (+ - x :) as a fixed 2x2 grid: +/- (optellen/aftrekken) and x/:
     (vermenigvuldigen/delen) are natural pairs, and the natural flex-wrap on
     narrow screens gave an unbalanced 3-then-1 instead. max-content columns
     keep each chip its own width -- no stretching to fill the grid cell. */
  #set-ops { display: grid; grid-template-columns: repeat(2, max-content); }
  /* telmodus: fase-chips (1..6) en een klein legendablokje eronder */
  .stage-chips .chip { min-width: 38px; padding: 7px 12px; }
  .stage-legend { display: flex; flex-wrap: wrap; gap: 4px 12px; margin: 8px 2px 2px; font-size: 12.5px; opacity: .8; }
  .stage-legend b { color: var(--purple-mid); }
  .chip {
    font-family: inherit; font-size: 15.5px; font-weight: 600; cursor: pointer; text-align: center; min-width: 44px;
    border: 2px solid var(--paper-border); background: var(--c-white); color: var(--purple-mid); border-radius: var(--radius-pill); padding: 7px 15px;
    transition: transform .07s, background .12s, border-color .12s, color .12s;
  }
  .chip:hover { border-color: var(--purple-light); }
  .chip:active { transform: scale(.95); }
  .chip.on { background: linear-gradient(180deg, var(--purple-light), var(--purple-mid)); border-color: transparent; color: var(--c-white); box-shadow: 0 3px 9px rgba(var(--purple-mid-rgb), .32); }

  /* de naam is het enige tekstveld in de hele app -- zonder duidelijk signaal
     ziet het eruit als platte tekst i.p.v. iets aantikbaars, dus een potloodje
     maakt "dit kun je wijzigen" expliciet i.p.v. impliciet aan de rand */
  .name-edit-wrap { position: relative; max-width: 220px; }
  .name-edit-wrap .name-edit-ico {
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    font-size: 15px; opacity: .5; pointer-events: none;
  }
  .settings-sheet input[type=text] {
    font-family: inherit; font-size: 17px; font-weight: 600; color: var(--paper-ink);
    border: 2px solid var(--paper-border); border-radius: var(--radius-sm); padding: 9px 34px 9px 13px; width: 100%; background: var(--paper-tint);
  }
  .settings-sheet input[type=text]:focus-visible { outline: none; border-color: var(--purple-light); background: var(--c-white); }
  .data-btns { display: flex; gap: 10px; flex-wrap: wrap; }

  .danger-zone {
    background: var(--danger-bg); border: 1.5px dashed var(--danger-border); border-radius: var(--radius-lg); padding: 15px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }
  .danger-zone .t { font-size: 14.5px; font-weight: 700; color: var(--danger-title); }
  .danger-zone .d { font-size: 12.5px; color: var(--danger-desc); font-weight: 500; margin-top: 2px; max-width: 42ch; }
  .danger-btn { background: linear-gradient(180deg, var(--red-danger-500), var(--red-danger-shadow)); color: var(--c-white); border: none; border-radius: var(--radius-sm); padding: 10px 16px; font-family: inherit; font-weight: 700; font-size: 14.5px; cursor: pointer; box-shadow: 0 var(--btn-lip-sm) 0 var(--red-danger-shadow); white-space: nowrap; }
  .danger-btn:active { transform: translateY(3px); box-shadow: none; }

  /* ---- Ouder-statistiek (tegels + meter) ---- */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .stat-tile { position: relative; background: var(--paper-tint); border: 1px solid var(--paper-border); border-radius: var(--radius-card-sm); padding: 12px 8px 10px; text-align: center; overflow: hidden; }
  .stat-tile::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--tint, var(--purple-light)); }
  .stat-tile .num { font-size: 26px; font-weight: 700; color: var(--paper-ink); line-height: 1; }
  .stat-tile .cap { font-size: 11.5px; color: var(--paper-ink-muted); margin-top: 5px; font-weight: 500; line-height: 1.2; }
  .stat-line { display: flex; align-items: baseline; justify-content: space-between; margin: 16px 2px 7px; }
  .stat-line .k { font-size: 14px; font-weight: 600; color: var(--paper-ink); }
  .stat-line .v { font-size: 16px; font-weight: 700; color: var(--purple-mid); }
  .stat-bar { height: 13px; background: var(--lavender-wash-3); border-radius: var(--radius-pill); overflow: hidden; }
  .stat-bar > div { height: 100%; border-radius: var(--radius-pill); background: linear-gradient(90deg, var(--purple-light), var(--pink-accent)); }
  .practice-hint { font-size: 12.5px; color: var(--paper-ink-muted); font-weight: 500; margin: 14px 2px 8px; }
  .practice-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .practice-chip { background: var(--practice-bg); border: 1px solid var(--gold-pale); color: var(--practice-text); border-radius: var(--radius-pill); padding: 6px 13px; font-weight: 700; font-size: 15px; }
  .stats-empty { font-size: 13.5px; color: var(--green-deep); font-weight: 600; margin-top: 6px; }
  @media (max-width: 480px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }

  /* ---- Modal (oudervraag) ---- */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--c-white); color: var(--c-ink); border-radius: var(--radius-lg); padding: 24px 28px; text-align: center; max-width: 340px;
  }
  .modal h3 { color: var(--purple-deep); margin-bottom: 10px; }
  /* zelfde twee blokjes stonden tweemaal identiek als losse inline style op
     de bevestigingsmodals (stoppen / algemene bevestiging) -- nu één plek */
  .modal-body { font-size: 15px; color: var(--paper-ink-muted); margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .modal input {
    font-family: inherit; font-size: 26px; text-align: center; width: 110px;
    border: 3px solid var(--purple-light); border-radius: var(--radius-sm); padding: 6px; margin: 10px 0;
  }

  .confetti-bit { position: fixed; top: -40px; font-size: 26px; z-index: 90; pointer-events: none; animation: fall linear forwards; }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===== Profielkeuze ===== -->
  <div class="screen active" id="screen-profile">
    <div class="map-sky" aria-hidden="true">
      <div class="map-sky-inner">
        <span style="top:14%;font-size:28px;animation-duration:85s;animation-delay:-20s;opacity:.24">☁️</span>
        <span style="top:36%;font-size:22px;animation-duration:95s;animation-delay:-55s;opacity:.18">☁️</span>
        <span style="top:60%;font-size:32px;animation-duration:75s;animation-delay:-10s;opacity:.3">☁️</span>
        <span style="top:84%;font-size:26px;animation-duration:88s;animation-delay:-42s;opacity:.22">☁️</span>
      </div>
    </div>
    <h1 class="title">🎤 Reken Popsterren 🎶</h1>
    <div class="subtitle">Wie gaat er vandaag schitteren op het podium?</div>
    <div class="profile-row" id="profile-row"></div>
  </div>

  <!-- ===== Kaart / wereldtournee (hoofdscherm) ===== -->
  <div class="screen hub" id="screen-map">
    <div class="map-sky" aria-hidden="true">
      <!-- elk element drift't lineair van -80px naar 100vw+80px; het negatieve
           animation-delay bepaalt waar het bij het ínladen al in die reis zit
           (delay/duration = hoe ver "over" het scherm). Die fracties zijn hier
           bewust over ~0.06 .. 0.90 gespreid (i.p.v. toevallig gekozen getallen
           die tot een clustertje links + een leeg gat rechts leidden) zodat de
           lucht meteen bij het openen al over de hele breedte gevuld oogt. -->
      <div class="map-sky-inner">
        <span style="top:8%;font-size:26px;animation-duration:88s;animation-delay:-16s;opacity:.22">☁️</span>
        <span style="top:24%;font-size:34px;animation-duration:70s;animation-delay:-20s;opacity:.3">☁️</span>
        <span style="top:40%;font-size:22px;animation-duration:100s;animation-delay:-39s;opacity:.18">☁️</span>
        <span style="top:58%;font-size:30px;animation-duration:80s;animation-delay:-39s;opacity:.26">☁️</span>
        <span style="top:80%;font-size:36px;animation-duration:65s;animation-delay:-38s;opacity:.32">☁️</span>
        <span style="top:33%;font-size:24px;animation-duration:58s;animation-delay:-40s;opacity:.3">✈️</span>
        <span class="rev" style="top:68%;font-size:20px;animation-duration:72s;animation-delay:-15s;opacity:.2">✈️</span>
      </div>
    </div>
    <div class="hub-sticky">
      <div class="screen-header">
        <button class="map-id-btn header-left" onclick="goProfiles()" aria-label="Terug naar spelerskeuze" title="Terug naar spelerskeuze">
          <span class="map-portrait" id="map-portrait"></span>
          <span class="map-name" id="map-name"></span>
        </button>
        <div class="header-title" id="map-tournee-label"></div>
        <div class="diamond-badge header-right">💎 <span id="map-diamonds">0</span></div>
      </div>
      <div class="career-strip" id="career-strip" role="button" tabindex="0" onclick="openCareer()" aria-label="Bekijk je ster-status"></div>
    </div>
    <div class="map-flex">
      <div class="tour-map-wrap">
        <div class="tour-map hscroll-fade" id="tour-map"></div>
      </div>
    </div>
    <!-- Memory-spel: alleen zichtbaar voor een telmodus-ster met memory aan -->
    <button class="mem-fab" id="mem-fab" onclick="startMemory()" style="display:none" aria-label="Memory-spel">🎴<span>Memory</span></button>
  </div>

  <!-- ===== Memory-spel (lees-vrij: zoek de gelijke hoeveelheden) ===== -->
  <div class="screen" id="screen-memory">
    <div class="hub-sticky">
      <div class="screen-header">
        <button class="btn icon-btn header-left" onclick="exitMemory()" aria-label="Terug naar de kaart" title="Terug naar de kaart">✕</button>
        <div class="header-title">🎴 Memory</div>
        <div class="diamond-badge header-right">💎 <span id="mem-diamonds">0</span></div>
      </div>
    </div>
    <div class="mem-arena">
      <div class="mem-grid" id="mem-grid"></div>
    </div>
    <div class="mem-done" id="mem-done" style="display:none">
      <div class="mem-done-card">
        <div class="mem-done-title">🎉</div>
        <div class="mem-done-earn earn-chip dia" id="mem-done-earn"></div>
        <div class="mem-done-btns">
          <button class="btn" onclick="startMemory()">🎴 Nog een keer</button>
          <button class="btn gray" onclick="exitMemory()">🗺️ Kaart</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Spel ===== -->
  <div class="screen" id="screen-game">
    <div class="hub-sticky">
      <div class="screen-header">
        <button class="btn icon-btn header-left" onclick="askQuit()" aria-label="Show stoppen" title="Show stoppen">✕</button>
        <div class="header-title" id="game-lvl-label"></div>
        <div class="diamond-badge header-right">💎 <span id="game-diamonds">0</span></div>
      </div>
      <div class="game-progress-row">
        <span class="notes-left" id="notes-left"></span>
        <div class="qprogress" id="qprogress"></div>
      </div>
    </div>
    <div class="game-arena">
      <div class="show-panel">
        <div class="show-inner">
          <div class="fan-col" id="fan-col">
            <div class="fan-icon" id="fan-icon">👏</div>
            <div class="fan-track"><div class="fan-fill" id="fanmeter-fill"></div></div>
          </div>
          <div class="stage stage-frame show-stage" id="show-stage">
            <div class="avatar-holder idle" id="game-avatar-inner"></div>
          </div>
        </div>
      </div>
      <div class="math-panel">
        <div class="question-card" id="question-card">
          <div id="question-text"></div>
          <div class="spot-rail" aria-hidden="true"><div class="spotlight-bar" id="spotlight-bar"></div></div>
        </div>
        <div class="gold-banner" id="gold-banner"></div>
        <div id="answer-area"></div>
      </div>
    </div>
  </div>

  <!-- bevestiging vóór het verlaten van een show (voorkomt per-ongeluk-tikken) -->
  <div class="modal-bg" id="quit-modal" onclick="if(event.target===this)closeQuitModal()">
    <div class="modal">
      <h3>🎭 Show stoppen?</h3>
      <div class="modal-body">Dan stopt dit optreden en ga je terug naar de kaart.</div>
      <div class="modal-actions">
        <button class="btn" onclick="closeQuitModal()">🎤 Doorspelen</button>
        <button class="btn gray" onclick="quitGame()">Stoppen</button>
      </div>
    </div>
  </div>

  <!-- generieke mededeling/bevestiging in de eigen stijl van de app (i.p.v. de
       systeem-confirm/alert die overal elders in de app afwijkt) -->
  <div class="modal-bg" id="confirm-modal" onclick="if(event.target===this)closeConfirmModal()">
    <div class="modal">
      <h3 id="confirm-title"></h3>
      <div class="modal-body" id="confirm-body"></div>
      <div class="modal-actions" id="confirm-actions"></div>
    </div>
  </div>

  <!-- ===== Trofeeën ===== -->
  <div class="screen hub" id="screen-trophies">
    <div class="hub-sticky">
      <div class="screen-header">
        <div class="header-left"></div>
        <div class="header-title">🏆 Trofeeënkast</div>
        <div class="diamond-badge header-right">💎 <span id="trophy-diamonds">0</span></div>
      </div>
      <div class="kast-progress">
        <div class="kast-progress-text" id="trophy-count"></div>
        <div class="kast-bar"><div class="kast-bar-fill" id="trophy-bar"></div></div>
      </div>
    </div>
    <div id="trophy-shelves"></div>
  </div>

  <!-- ===== Level einde ===== -->
  <div class="screen" id="screen-end">
    <div class="hub-sticky">
      <div class="screen-header">
        <button class="btn icon-btn header-left" onclick="goMap()" aria-label="Terug naar kaart" title="Terug naar kaart">✕</button>
        <div class="header-title" id="end-lvl-label"></div>
        <div class="diamond-badge header-right">💎 <span id="end-diamonds">0</span></div>
      </div>
    </div>
    <div class="result-card">
      <h1 class="title" id="end-title"></h1>
      <div class="stage tappable stage-frame end-stage" id="end-stage" onclick="tapDance('end-avatar')">
        <div class="avatar-holder idle" id="end-avatar"></div>
      </div>
      <div class="result-stars" id="end-stars"></div>
      <div class="end-text" id="end-text"></div>
      <div class="earn-line" id="end-earn"></div>
      <button class="end-trophy-banner gold-pill" id="end-trophy" style="display:none"></button>
      <div class="end-actions">
        <button class="btn big" id="btn-end-next"></button>
        <button class="btn soft" id="btn-end-alt"></button>
      </div>
    </div>
  </div>

  <!-- ===== Kleedkamer (passen én kopen op één plek) ===== -->
  <div class="screen hub" id="screen-dress">
    <div class="hub-sticky">
      <div class="screen-header">
        <div class="header-left"></div>
        <div class="header-title">👗 Kleedkamer</div>
        <div class="diamond-badge header-right">💎 <span id="shop-diamonds">0</span></div>
      </div>
      <div class="stage-wrap">
        <div class="stage tappable stage-frame dress-stage" id="shop-stage" onclick="tapDance('shop-avatar')">
          <div class="avatar-holder idle" id="shop-avatar"></div>
        </div>
        <button class="shuffle-btn" onclick="surpriseOutfit()" aria-label="Verras me met een outfit" title="Verras me!">🎲</button>
      </div>
      <div class="segmented shop-mode" id="shop-mode"></div>
      <div class="shop-tabs-wrap" id="shop-tabs-wrap">
        <div class="shop-tabs" id="shop-tabs"></div>
      </div>
    </div>
    <div class="item-grid" id="item-grid"></div>
  </div>

  <!-- ===== Instellingen (ouders) ===== -->
  <div class="screen" id="screen-settings">
    <div class="hub-sticky">
      <div class="screen-header">
        <button class="btn icon-btn header-left" onclick="closeSettings()" aria-label="Terug" title="Terug">←</button>
        <div class="header-title">⚙️ Instellingen</div>
        <div class="header-right"><span class="saved-pill" id="settings-saved">✓ Opgeslagen</span></div>
      </div>
      <div class="segmented" id="settings-profiles"></div>
      <div class="segmented tabs" id="settings-subtabs"></div>
    </div>
    <div class="settings-sheet">
      <div id="settings-body"></div>
    </div>
  </div>
</div>

<!-- actiebalk van de kleedkamer: passen/kopen, altijd in beeld boven de navigatie -->
<div class="dress-bar" id="dress-bar"></div>

<!-- vaste navigatie op de drie rustpunten: kaart (spelen), kleedkamer (passen/kopen), trofeeën -->
<div class="main-nav" id="main-nav">
  <button class="nav-item" id="nav-map" onclick="navGo('map')"><span class="nav-ico">🗺️</span>Kaart</button>
  <button class="nav-item" id="nav-dress" onclick="navGo('dress')"><span class="nav-ico">👗</span>Kleedkamer</button>
  <button class="nav-item" id="nav-tro" onclick="navGo('tro')"><span class="nav-ico">🏆</span>Trofeeën<span class="nav-dot"></span></button>
</div>

<div class="corner-btns" id="corner-btns">
  <button class="btn icon-btn" id="btn-gear" onclick="toggleGearMenu(event)" aria-haspopup="true" aria-expanded="false" title="Instellingen"><span class="gear-ico">⚙️</span></button>
  <div class="gear-menu" id="gear-menu" role="menu">
    <button class="gear-item" id="gear-sound" onclick="toggleSound()" role="menuitemcheckbox">
      <span class="gi-ico">🔊</span><span class="gi-label">Geluid</span><span class="gi-state" id="gear-sound-state">Aan</span>
    </button>
    <button class="gear-item" id="gear-haptics" onclick="toggleHaptics()" role="menuitemcheckbox">
      <span class="gi-ico">📳</span><span class="gi-label">Trillen</span><span class="gi-state" id="gear-haptics-state">Aan</span>
    </button>
    <div class="gear-sep"></div>
    <button class="gear-item parents" onclick="openSettings()" role="menuitem">
      <span class="gi-ico">👨‍👩‍👧</span><span class="gi-label">Voor ouders</span><span class="gi-chev">›</span>
    </button>
  </div>
</div>

<div class="praise" id="praise"></div>
<div class="slip-note" id="slip-note">🎵</div>
<!-- vangt een tik overal op het scherm op tijdens "tik om verder te gaan" i.p.v.
     alleen op de kleine toast-bubbel zelf -- zit onder de toast (lagere z-index)
     zodat die zelf nog leesbaar bovenop blijft, maar tikken erop valt gewoon door
     naar deze laag (de toast zelf heeft pointer-events:none) -->
<div class="tap-veil" id="tap-veil"></div>
<div class="toast" id="toast"></div>

// Eén doorlopende carrièreladder op basis van álle verdiende sterren (over alle
// tournees heen). Elke show geeft sterren, dus de rang-balk beweegt altíjd —
// hét lange-termijndoel dat nooit "op" is. Elke rang omhoog geeft een diamant-
// bonus, zodat het lange sparen óók de kleedkamer blijft voeden. Hergebruikt het
// bestaande sterren-systeem volledig: geen nieuwe munt, verzameling of scherm.
const RANK_TIERS = [
  { min: 0,   name: 'Straatartiest', emoji: '🎤', bonus: 0 },
  { min: 12,  name: 'Lokale ster',   emoji: '⭐', bonus: 10 },
  { min: 30,  name: 'Clubster',      emoji: '🎶', bonus: 15 },
  { min: 60,  name: 'Stadsster',     emoji: '🏙️', bonus: 20 },
  { min: 100, name: 'Radioster',     emoji: '📻', bonus: 30 },
  { min: 150, name: 'Toursensatie',  emoji: '✈️', bonus: 40 },
  { min: 220, name: 'Platinaster',   emoji: '💿', bonus: 50 },
  { min: 300, name: 'Wereldlegende', emoji: '👑', bonus: 60 },
];
const RANK_STEP = 100;   // na Wereldlegende: elke +100 sterren een nieuwe ⭐-tier
// Rang-beschrijving voor een bepaald sterrentotaal, inclusief de open-einde
// "Wereldlegende ⭐×N"-tiers voorbij de laatste vaste rang. idx is doorlopend
// (0,1,2,…) zodat we een rang-stijging betrouwbaar kunnen herkennen.
function starRank(total) {
  let i = 0;
  for (let k = 0; k < RANK_TIERS.length; k++) if (total >= RANK_TIERS[k].min) i = k;
  const base = RANK_TIERS[i];
  const last = RANK_TIERS.length - 1;
  if (i < last) {
    const nxt = RANK_TIERS[i + 1];
    return { idx: i, name: base.name, emoji: base.emoji, curMin: base.min, nextMin: nxt.min, nextName: nxt.name };
  }
  // open einde: Wereldlegende ⭐2, ⭐3, …
  const over = Math.floor((total - base.min) / RANK_STEP);
  const curMin = base.min + over * RANK_STEP;
  const stars = over + 1;
  return {
    idx: last + over, emoji: base.emoji,
    name: over === 0 ? base.name : `${base.name} ⭐${stars}`,
    curMin, nextMin: curMin + RANK_STEP, nextName: `${base.name} ⭐${stars + 1}`,
  };
}
function rankBonusFor(idx) { return RANK_TIERS[Math.min(idx, RANK_TIERS.length - 1)].bonus; }
// Na het verdienen van sterren: is de speler een rang gestegen? Zo ja, keer de
// bonus(sen) uit (één keer — p.rankSeen onthoudt de hoogst bereikte rang) en
// geef terug wat er gehaald is voor een feestje op het eindscherm.
function checkRankUp(p) {
  const r = starRank(totalStarCount(p));
  if (p.rankSeen == null) p.rankSeen = r.idx;
  if (r.idx > p.rankSeen) {
    let bonus = 0;
    for (let k = p.rankSeen + 1; k <= r.idx; k++) bonus += rankBonusFor(k);
    p.rankSeen = r.idx;
    p.diamonds += bonus;
    return { rank: r, bonus };
  }
  return null;
}
function trophyProgress(value, target, label) {
  const now = Math.max(0, Math.min(value, target));
  return { now, target, label, pct: Math.round((now / target) * 100) };
}
// Kent nieuwe trofeeën toe; geeft de namen van nieuw behaalde terug.
// Legt trofeeën die de voorwaarde net halen 'klaar' (readyTrophies) zodat het
// kind ze zelf mag openen. Behaalde (geclaimde) blijven staan. Geeft de trofeeën
// terug die nét klaar zijn komen te liggen.
function checkTrophies(p) {
  if (!p.readyTrophies) p.readyTrophies = [];
  const nieuw = [];
  for (const t of TROPHIES) {
    if (!p.trophies.includes(t.id) && !p.readyTrophies.includes(t.id) && t.has(p)) {
      p.readyTrophies.push(t.id);
      nieuw.push(t);
    }
  }
  return nieuw;
}

// Zorgt dat oudere opgeslagen profielen de nieuwe velden krijgen.
function migrate(p) {
  if (!p.trophies) p.trophies = [];
  // Bestaande spelers: alles wat al behaald is blijft 'behaald' (staat in trophies).
  // readyTrophies begint leeg; alleen echt nog-niet-geclaimde-maar-gehaalde trofeeën
  // komen daarna 'klaar' te liggen — geen plotse muur van "Klaar!" voor oude saves.
  if (!p.readyTrophies) p.readyTrophies = [];
  if (p.goldHits == null) p.goldHits = 0;
  if (p.encores == null) p.encores = 0;
  // bestaande spelers beginnen op hun huidige rang (geen bonus met terugwerkende
  // kracht voor sterren die ze al hadden); nieuwe rangen daarna betalen wél uit
  if (p.rankSeen == null) p.rankSeen = starRank(totalStarCount(p)).idx;
  if (p.perf == null) p.perf = 0.5;
  if (!p.weak) p.weak = {};
  // oude zwakke-sleutels ("3 + 4") naar het nieuwe sjabloonformaat ("3 + 4 = @")
  else {
    const nw = {};
    for (const [k, e] of Object.entries(p.weak)) nw[k.includes('@') ? k : `${k} = @`] = e;
    p.weak = nw;
  }
  // extra uitdagingen: standaard aan (verschijnen toch pas na voldoende beheersing)
  if (!p.settings) p.settings = { ops: ['+', '-'], max: 20, tables: [2, 5, 10], mode: 'kies', perLevel: 8 };
  if (p.settings.missNum == null) p.settings.missNum = true;
  if (p.settings.chain3 == null) p.settings.chain3 = true;
  if (!p.opTrack) p.opTrack = {};
  if (!p.missRamp) p.missRamp = { rung: 1, hot: 0 };
  if (!p.chainTrack) p.chainTrack = { seen: 0, acc: 0.5, paused: false, rung: 1, hot: 0 };
  // telmodus (lees-vrij): standaard uit (track 'math') voor bestaande profielen
  if (p.settings.track == null) p.settings.track = 'math';
  if (p.settings.stage == null) p.settings.stage = 1;
  if (p.settings.stageMax == null) p.settings.stageMax = COUNT_STAGE_MAX;
  // bestaande telprofielen mochten tot fase 6; til hun plafond op naar de nieuwe fases
  if (p.settings.track === 'count' && (p.settings.stageMax === 6 || p.settings.stageMax === 8)) p.settings.stageMax = COUNT_STAGE_MAX;

function updatePerf(p, correct, fast) {

// Werkt op mobiele browsers die de Vibration API ondersteunen (Android/Chrome).
// Staat los van geluid, zodat trillen ook aan kan met de app op stil.
function buzz(pattern) {
  if (!db.haptics) return;

/* ================= Geluid ================= */
let actx = null;
function beep(freq, dur, delay, type, vol) {
  if (!db.sound) return;
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime + (delay || 0);
    g.gain.setValueAtTime(vol || 0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch (e) { /* geen audio */ }
}

/* ================= Gesproken opdrachten (telmodus) =================
   Kleuters kunnen nog niet lezen, dus in de telmodus wordt élke opdracht
   hardop voorgelezen met de ingebouwde spraak van het toestel (SpeechSynthesis,
   nl-NL). Niet elk toestel heeft een Nederlandse stem -- daarom is spraak nooit
   de énige drager: de vraag staat altijd óók volledig in beeld (objecten/stippen),
   en een 🔊-knop leest de opdracht op verzoek opnieuw voor. Ontbreekt een stem,
   dan blijft alles gewoon speelbaar, enkel zonder stemgeluid. */
const NUM_NL = ['nul', 'een', 'twee', 'drie', 'vier', 'vijf', 'zes', 'zeven', 'acht', 'negen', 'tien'];
function numWord(n) { return NUM_NL[n] != null ? NUM_NL[n] : String(n); }
let _voices = [];
function refreshVoices() { try { _voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; } catch (e) { _voices = []; } }
function nlVoice() {
  if (!_voices.length) refreshVoices();
  return _voices.find(v => /^nl(\b|[-_])/i.test(v.lang)) || null;
}
function hasSpeech() { return 'speechSynthesis' in window; }
function cancelSpeech() { try { if (window.speechSynthesis) speechSynthesis.cancel(); } catch (e) {} }
// Leest een zin voor. Volgt bewust de geluid-aan/uit-knop (stil = ook geen stem).
function speak(text, opts) {
  opts = opts || {};
  if (!db.sound || !hasSpeech() || !text) { if (opts.onEnd) opts.onEnd(); return; }
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = nlVoice();
    if (v) u.voice = v;
    u.lang = 'nl-NL';
    u.rate = opts.rate || 0.85;   // rustig tempo voor jonge kinderen
    u.pitch = opts.pitch || 1.15; // iets hoger/vrolijker
    if (opts.onEnd) u.onend = opts.onEnd;
    speechSynthesis.speak(u);
  } catch (e) { if (opts.onEnd) opts.onEnd(); }
}
if (typeof window !== 'undefined' && window.speechSynthesis) {
  refreshVoices();
  speechSynthesis.onvoiceschanged = refreshVoices;
}
