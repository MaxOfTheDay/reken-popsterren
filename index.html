<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>🎤 Reken Popsterren</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#7b2ff7">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* ---- Backdrop / brand gradient ---- */
    --bg-1: #3d0a58; --bg-2: #7b2ff7; --bg-3: #f107a3;
    --bg-glow-pink: rgba(255,120,220,.35); --bg-glow-blue: rgba(80,200,255,.28);

    /* ---- Neutrals ---- */
    --c-white: #fff; --c-ink: #333;

    /* ---- Gold: primary CTA gradient (play/main button) ---- */
    --gold-cta-top: #ffc23d; --gold-cta-bottom: #ff8f00; --gold-cta-shadow: #b36200;
    /* ---- Gold: accent / reward tones (distinct roles, not merged) ---- */
    --gold-accent: #ffd740; --gold-warm: #ffd54f; --gold-deep: #ffb300; --gold-light: #ffe082;
    --gold-cream: #fff9c4; --gold-bright: #ffee58; --gold-flame: #ff6f00;
    --gold-pale: #ffd9a0; --gold-flash: #fff176; --gold-ready-border: #fff3c4;
    --gold-marigold: #ffca28; --ink-on-gold: #5d2a00; --ink-on-gold-card: #7a4f00;

    /* ---- Purple: brand / secondary actions ---- */
    --purple-light: #ab47bc; --purple-mid: #8e24aa; --purple-mid-rgb: 142,36,170; --purple-shadow: #4a148c;
    /* ---- Purple: answer-input controls (choice-btn / num-btn), kept distinct ---- */
    --purple-input-top: #8e5fd6; --purple-input-bottom: #5e35b1; --purple-input-shadow: #311b92;
    /* ---- Purple: misc singles, kept distinct ---- */
    --purple-deep: #7b1fa2; --purple-golden-accent: #6a1b9a; --purple-ink: #32115f;

    /* ---- Green: success / done. The original #66bb6a/#43a047 gradient only
       reached 2.36-3.3:1 contrast for the white text/glyphs on top of it --
       well under WCAG AA's 4.5:1. --green-top/--green-deep is a darker two-stop
       gradient that clears AA at both ends (4.79:1 / 5.13:1); --green-shadow
       stays a genuinely separate, darker shadow-lip color (not reused as the
       gradient's own bottom stop -- doing that once collapsed the visible
       "edge" between the button face and its shadow, flattening the 3D look). ---- */
    --green-top: #457f48; --green-deep: #2e7d32; --green-shadow: #1b5e20;
    --green-badge-bg: #e3f7e7;

    /* ---- Red: kept as two distinct pairs (wrong-answer vs. parent danger-zone).
       red-danger-500 is a darkened red-500 (not a plain reuse) so white button
       text clears WCAG AA contrast (4.5:1) at every point of the gradient --
       the original #ef5350/#e53935 pair only reached 3.49-4.23:1. ---- */
    --red-500: #ef5350;
    --red-answer-600: #d32f2f; --red-answer-shadow: #8e0000;
    --red-danger-500: #cb4744; --red-danger-shadow: #a31414;

    /* ---- Gray: neutral / locked / unavailable ---- */
    --gray-top: #90a4ae; --gray-bottom: #607d8b; --gray-shadow: #37474f;

    /* ---- Blue: active / selected / info ---- */
    --blue-fill-top: #38bdf8; --blue-fill-bottom: #6ad3ff; --blue-text: #8fd6ff;
    --blue-ring: rgba(143,214,255,.2);

    /* ---- Pink accents (fan meter / kast bar / stat bar / trophy pop) ---- */
    --pink-accent: #ff80ab; --pink-hot: #ff4081; --pink-deep: #f50057; --pink-light: #ffd6f4;

    /* ---- "Paper" theme: parent-facing screens (settings / modal / gear-menu) ---- */
    --paper-ink: #3a0f56; --paper-ink-muted: #6b5b7a; --paper-border: #ecdcf6; --paper-tint: #faf6ff;
    --paper-muted-bg: #eceaef; --paper-muted-text: #9a90a6;
    --lavender-wash: #f3e9ff; --lavender-wash-2: #f4e9fb; --lavender-wash-3: #efe4f7;
    --muted-lavender-text: #cfc6df; --muted-text-2: #d8d0e4; --muted-text-3: #e1e5ea; --lavender-text: #e6d6ff;

    /* ---- Danger zone / practice chips (parent settings) ---- */
    --danger-bg: #fff0f0; --danger-border: #f2b2b2; --danger-title: #b71c1c; --danger-desc: #9a4a4a;
    --practice-bg: #fff3e0; --practice-text: #b3560d;
    /* stat-tile accent tints (Voortgang tab): distinct from the reused brand
       colors below, kept as their own tokens rather than inline literals */
    --stat-violet: #7e57c2; --stat-green: #2e9e4f;

    /* ---- Glass / overlay surfaces (exact-duplicate alpha values only; true one-offs stay inline) ---- */
    --glass-black-30: rgba(0,0,0,.3); --glass-black-35: rgba(0,0,0,.35); --glass-black-40: rgba(0,0,0,.4);
    --glass-black-18: rgba(0,0,0,.18); --glass-black-32: rgba(0,0,0,.32); --glass-black-28: rgba(0,0,0,.28);
    --glass-black-25: rgba(0,0,0,.25); --glass-black-20: rgba(0,0,0,.2); --glass-black-26: rgba(0,0,0,.26);
    --glass-black-50: rgba(0,0,0,.5); --glass-black-24: rgba(0,0,0,.24);
    --glass-white-22: rgba(255,255,255,.22); --glass-white-30: rgba(255,255,255,.3); --glass-white-40: rgba(255,255,255,.4);
    --glass-white-13: rgba(255,255,255,.13); --glass-white-10: rgba(255,255,255,.1); --glass-white-28: rgba(255,255,255,.28);
    --glass-white-20: rgba(255,255,255,.2); --glass-white-16: rgba(255,255,255,.16); --glass-white-35: rgba(255,255,255,.35);
    --glass-white-18: rgba(255,255,255,.18); --glass-white-14: rgba(255,255,255,.14);

    /* ---- Border radii ---- */
    --radius-pill: 999px; --radius-md: 16px; --radius-sm: 12px; --radius-lg: 20px;
    --radius-button: 18px; --radius-2xl: 26px; --radius-xl: 24px; --radius-card-sm: 14px;

    /* ---- Button "press-lip" depth (see .btn / .choice-btn / .num-btn convention) ---- */
    --btn-lip: 5px; --btn-lip-sm: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Fredoka", "Comic Sans MS", "Segoe UI", "Trebuchet MS", sans-serif;
    background:
      radial-gradient(circle at 18% 12%, var(--bg-glow-pink), transparent 45%),
      radial-gradient(circle at 82% 88%, var(--bg-glow-blue), transparent 48%),
      linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
    background-attachment: fixed;
    color: var(--c-white);
    overflow: hidden;
    user-select: none;
  }
  #app { height: 100%; display: flex; flex-direction: column; }

  /* schermen scrollen nooit zijwaarts: horizontaal scrollen gebeurt alleen
     ín de reisroute en de tabbladen zelf */
  .screen { display: none; flex: 1; flex-direction: column; align-items: center; padding: 12px; overflow-y: auto; overflow-x: hidden; }
  .screen.active { display: flex; }

  h1.title {
    font-size: clamp(28px, 5.4vw, 46px);
    font-weight: 700; letter-spacing: .5px;
    text-shadow: 0 2px 0 var(--glass-black-18), 0 4px 12px var(--glass-black-28);
    margin: 10px 0 4px;
    text-align: center;
  }
  .subtitle { opacity: .92; margin-bottom: 18px; text-align: center; font-size: 17px; font-weight: 500; }

  .btn {
    font-family: inherit; font-size: 20px; font-weight: 600; color: var(--purple-shadow);
    background: linear-gradient(180deg, var(--gold-cta-top), var(--gold-cta-bottom));
    border: none; border-radius: var(--radius-button); padding: 14px 26px; cursor: pointer;
    box-shadow: 0 var(--btn-lip) 0 var(--gold-cta-shadow), 0 8px 14px var(--glass-black-30);
    transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--gold-cta-shadow); }
  .btn.big { font-size: 26px; padding: 18px 40px; white-space: nowrap; }
  /* .purple/.green/.gray zetten hun eigen achtergrond, dus ook expliciet hun
     eigen (witte) tekstkleur -- anders erven ze de paarse tekst van de
     gouden basisknop, wat op deze achtergronden nauwelijks leesbaar is */
  .btn.purple { color: var(--c-white); background: linear-gradient(180deg, var(--purple-light), var(--purple-mid)); box-shadow: 0 var(--btn-lip) 0 var(--purple-shadow), 0 8px 14px var(--glass-black-30); }
  .btn.purple:active { box-shadow: 0 1px 0 var(--purple-shadow); }
  .btn.green { color: var(--c-white); background: linear-gradient(180deg, var(--green-top), var(--green-deep)); box-shadow: 0 var(--btn-lip) 0 var(--green-shadow), 0 8px 14px var(--glass-black-30); }
  .btn.green:active { box-shadow: 0 1px 0 var(--green-shadow); }
  /* neutraal, niet alarmerend — zelfde taal als het grijze "wissen"-knopje op het numpad */
  .btn.gray { color: var(--c-white); background: linear-gradient(180deg, var(--gray-top), var(--gray-bottom)); box-shadow: 0 var(--btn-lip) 0 var(--gray-shadow), 0 8px 14px var(--glass-black-30); }
  .btn.gray:active { box-shadow: 0 1px 0 var(--gray-shadow); }
  .btn.small { font-size: 16px; padding: 8px 16px; border-radius: var(--radius-sm); box-shadow: 0 3px 0 var(--gold-cta-shadow); }
  .btn.ghost { background: rgba(255,255,255,.15); box-shadow: none; }
  /* secundaire knoppen: rustig, maar met een vleugje kleur (lichter dan de gouden hoofdknop) */
  .btn.soft {
    font-size: 17px; padding: 12px 18px; border-radius: var(--radius-md); color: var(--c-white);
    border: 1.5px solid var(--glass-white-28);
    background: linear-gradient(180deg, var(--glass-white-20), rgba(255,255,255,.07));
    box-shadow: 0 3px 0 var(--glass-black-28);
  }
  .btn.soft:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--glass-black-28); }
  .btn:disabled { filter: grayscale(.8); opacity: .6; cursor: default; }

  /* ---- Profielkeuze (podium-stijl kaarten) ----
     Twee sterren altijd náást elkaar in beeld, ook op 320px: geen scrollen om
     jezelf te vinden. De kaart vertelt het verhaal (waar op de tournee) i.p.v.
     een scorebord — geen kale tellers om zusjes mee te vergelijken. */
  /* verticaal gecentreerd via auto-marges: veilig bij overloop (justify-content:
     center zou op lage/liggende schermen de bovenkant onbereikbaar knippen) */
  #screen-profile { position: relative; padding-bottom: 30px; }
  #screen-profile .title { margin-top: auto; padding: 0 54px; font-size: clamp(23px, 6vw, 40px); }
  .profile-row {
    display: flex; gap: 14px; justify-content: center; align-items: stretch;
    width: 100%; max-width: 560px; margin: 16px 0 auto; z-index: 1;
  }
  /* rustige, middenpaarse kaart met één subtiele rand -- de avatar (.stage-frame,
     zie hierboven) mag de sterkste visuele structuur zijn, dus hier bewust geen
     dikke/felle tweede rand ernaast (geen "dubbele rand"-gevoel meer). */
  .profile-card {
    position: relative; flex: 1 1 0; min-width: 0; max-width: 250px;
    cursor: pointer; text-align: center; font-family: inherit; color: var(--c-white);
    background: linear-gradient(180deg, rgba(142,36,170,.24), rgba(74,20,140,.22));
    border: 1.5px solid var(--glass-white-22); border-radius: var(--radius-2xl);
    padding: 11px 10px 16px; transition: transform .18s, box-shadow .18s;
    box-shadow: 0 10px 26px var(--glass-black-32);
  }
  .profile-card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 16px 34px var(--glass-black-40); }
  .profile-card:active { transform: translateY(-2px) scale(1.01); }
  /* het podium schaalt mee met de kaartbreedte; de scène blijft schoon (geen zwevende teller) */
  .profile-card .stage { width: 100%; aspect-ratio: 10 / 11; margin: 0 auto; }
  .profile-card .deco { font-size: 18px; }
  .profile-card .pname { font-size: 22px; font-weight: bold; margin-top: 8px; text-shadow: 0 2px 0 var(--glass-black-25); }
  /* alleen het totaal aantal sterren -- geen stad/tournee-details nodig om te
     kiezen wie er gaat spelen; hergebruikt de kleine pil (zie .chip-badge) */
  .profile-card .chip-badge { margin: 6px 0 2px; }
  /* heel smalle toestellen: kaartinhoud een maat kleiner, allebei blijven passen */
  @media (max-width: 380px) {
    .profile-row { gap: 10px; }
    .profile-card .pname { font-size: 18px; }
    .profile-card .speel-pill { font-size: 15px; padding: 8px 15px; }
  }

  .corner-btns { position: fixed; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 50; }
  /* zelfde plek als voorheen, maar nu de vertrouwde .btn.small.ghost-taal die de
     rest van de app ook gebruikt voor kleine icoon-knoppen (bv. de ⬅ terugknoppen),
     i.p.v. een losse, nergens anders herhaalde cirkelstijl */
  #btn-gear.on { background: rgba(255,255,255,.32); }
  /* alleen het tandwiel zélf draait — niet de hele (nu rechthoekige) knop eromheen */
  #btn-gear .gear-ico { display: inline-block; transition: transform .12s; }
  #btn-gear.on .gear-ico { transform: rotate(35deg); }

  /* ---- Instellingen-menu (popover onder het tandwiel) ---- */
  .gear-menu {
    position: absolute; top: 54px; right: 0; min-width: 216px;
    background: var(--c-white); color: var(--c-ink); border-radius: var(--radius-md); padding: 6px;
    box-shadow: 0 14px 34px rgba(30,0,50,.42); display: none; flex-direction: column;
    transform-origin: top right;
  }
  .gear-menu.open { display: flex; animation: gearPop .16s ease; }
  @keyframes gearPop { from { opacity: 0; transform: scale(.9) translateY(-6px); } to { opacity: 1; transform: none; } }
  .gear-item {
    font-family: inherit; font-size: 16px; font-weight: 600; color: var(--paper-ink);
    background: transparent; border: none; cursor: pointer; text-align: left; width: 100%;
    display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 11px;
  }
  .gear-item:hover { background: var(--paper-tint); }
  .gear-item:active { transform: scale(.98); }
  .gear-item .gi-ico { font-size: 20px; width: 24px; text-align: center; flex-shrink: 0; }
  .gear-item .gi-label { flex: 1; }
  .gear-item .gi-state {
    font-size: 13px; font-weight: 700; padding: 3px 11px; border-radius: var(--radius-pill);
    background: var(--green-badge-bg); color: var(--green-deep);
  }
  .gear-item .gi-state.off { background: var(--paper-muted-bg); color: var(--paper-muted-text); }
  .gear-item .gi-chev { font-size: 22px; color: var(--purple-light); line-height: 1; }
  .gear-item.parents { color: var(--purple-mid); }
  .gear-sep { height: 1px; background: var(--paper-border); margin: 5px 8px; }

  /* ---- Podium / avatar ---- */
  .stage {
    position: relative; border-radius: var(--radius-xl); overflow: hidden; flex-shrink: 0;
    border: 4px solid rgba(255,255,255,.5); box-shadow: 0 10px 24px var(--glass-black-35);
    display: flex; align-items: flex-end; justify-content: center;
  }
  /* verfijnde randbehandeling, gedeeld door elke plek waar de avatar het
     hoofdelement is (kleedkamer, profielkeuze): dunner en minder grijs dan de
     kale .stage hierboven, dezelfde lichte lavendel/wit-rand als een
     item-card (var(--glass-white-35)), met een zachte paarse gloed erbij
     i.p.v. alleen de kale slagschaduw. Bewust géén goud -- dat blijft
     voorbehouden aan geselecteerd/primaire acties. */
  .stage-frame {
    border-width: 2px; border-color: var(--glass-white-35);
    box-shadow: 0 10px 24px var(--glass-black-35), 0 0 20px rgba(123,47,247,.28);
  }
  /* avatar schaalt altijd mee met de podiumhoogte (fix voor afgesneden avatar op mobiel) */
  .stage .avatar-holder { height: 92%; }
  .stage .avatar-holder svg { height: 100%; width: auto; display: block; }
  .stage::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(circle 60px at 20% 15%, rgba(255,255,120,.35), transparent 70%),
      radial-gradient(circle 60px at 80% 20%, rgba(120,220,255,.35), transparent 70%),
      radial-gradient(circle 70px at 55% 8%, rgba(255,120,220,.30), transparent 70%);
    animation: lights 3.5s ease-in-out infinite alternate;
  }
  @keyframes lights {
    from { filter: hue-rotate(0deg); opacity: .8; }
    to   { filter: hue-rotate(120deg); opacity: 1; }
  }
  .stage .deco { position: absolute; font-size: 26px; text-shadow: 0 2px 4px var(--glass-black-30); }
  .stage.tappable { cursor: pointer; }
  .stage.tappable:active { transform: scale(.98); }
  .avatar-holder { line-height: 0; }
  .avatar-holder.idle { animation: sway 2.6s ease-in-out infinite; transform-origin: 50% 95%; }
  @keyframes sway {
    0%,100% { transform: rotate(-2.5deg); }
    50%     { transform: rotate(2.5deg); }
  }
  /* ---- Danspasjes: elke juiste som = een pasje in de show ---- */
  .avatar-holder.dancing { transform-origin: 50% 95%; }
  .avatar-holder.move-jump   { animation: mvJump .9s ease-in-out; }
  .avatar-holder.move-spin   { animation: mvSpin .9s ease-in-out; }
  .avatar-holder.move-sway   { animation: mvSway .9s ease-in-out; }
  .avatar-holder.move-kick   { animation: mvKick .9s ease-in-out; }
  .avatar-holder.move-wave   { animation: mvWave .9s ease-in-out; }
  .avatar-holder.move-bounce { animation: mvBounce .9s ease-in-out; }
  @keyframes mvJump {
    0%,100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-38px) scale(1.06); }
    55% { transform: translateY(0) scale(.96); }
    75% { transform: translateY(-14px); }
  }
  @keyframes mvSpin {
    0% { transform: rotateY(0) scale(1); }
    50% { transform: rotateY(360deg) scale(1.08) translateY(-10px); }
    100% { transform: rotateY(720deg) scale(1); }
  }
  @keyframes mvSway {
    0%,100% { transform: rotate(0); }
    20% { transform: rotate(-16deg) translateX(-8px); }
    50% { transform: rotate(16deg) translateX(8px); }
    80% { transform: rotate(-10deg) translateX(-4px); }
  }
  @keyframes mvKick {
    0%,100% { transform: rotate(0) translateX(0); }
    25% { transform: rotate(-10deg) translateX(-10px) scale(1.03); }
    50% { transform: rotate(12deg) translateX(12px); }
    70% { transform: rotate(-6deg) translateX(-6px); }
  }
  @keyframes mvWave {
    0%,100% { transform: translateY(0) rotate(0); }
    20% { transform: translateY(-8px) rotate(6deg); }
    40% { transform: translateY(0) rotate(-6deg); }
    60% { transform: translateY(-8px) rotate(6deg); }
    80% { transform: translateY(0) rotate(-4deg); }
  }
  @keyframes mvBounce {
    0%,100% { transform: translateY(0) scaleY(1); }
    20% { transform: translateY(0) scaleY(.82) scaleX(1.1); }
    45% { transform: translateY(-30px) scaleY(1.12) scaleX(.92); }
    70% { transform: translateY(0) scaleY(.9) scaleX(1.06); }
  }

  /* ---- Home ---- */
  .screen-header {
    display: grid; grid-template-columns: minmax(108px, 1fr) auto minmax(108px, 1fr);
    align-items: center; gap: 12px; width: 100%; max-width: 700px; margin-bottom: 8px;
  }
  .screen-header .header-title {
    font-size: 24px; font-weight: 700; text-align: center; white-space: nowrap;
    text-shadow: 0 2px 0 var(--glass-black-18);
  }
  .screen-header .header-left { justify-self: start; }
  .screen-header .header-right { justify-self: end; }
  /* één teller-pil, in twee maten: groot (schermkoppen) en klein (kaart-topbalk, spelbalk) */
  .diamond-badge, .chip-badge {
    background: var(--glass-black-32); border-radius: var(--radius-pill); font-weight: bold;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .diamond-badge { padding: 8px 18px; font-size: 22px; }
  .diamond-badge.compact { font-size: 18px; padding: 6px 14px; }
  .chip-badge { padding: 6px 13px; font-size: 16px; gap: 5px; }
  @keyframes pulseBtn { 0%,100% { transform: scale(1); } 50% { transform: scale(1.09); } }

  /* ---- Kaart (hoofdscherm): topbalk, wolkjes en vaste navigatie onderaan ---- */
  /* #screen-map heeft (net als de andere hub-schermen) 12px padding, behalve
     links/rechts (0, de route mag edge-to-edge scrollen) en boven (10px i.p.v.
     12px) -- vandaar de losse -10px/top:-10px hieronder i.p.v. de standaard
     -12px die .hub-sticky's basisregel gebruikt. */
  #screen-map { position: relative; padding: 10px 0 100px; }
  #screen-map .hub-sticky { width: 100%; margin: -10px 0 12px; top: -10px; }
  /* avatar + naam = de link terug naar spelerskeuze i.p.v. naar de kleedkamer
     (die zit al in de vaste ondernavigatie); zit in de .header-left cel van
     .screen-header, zodat "🗺️ Kaart" gewoon als .header-title mee-centreert
     zoals bij de andere schermen, ongeacht hoe breed avatar+naam vs. de
     diamant-pil rechts zijn. .header-left staat elders altijd leeg, dus
     justify-self:start (krimpt de cel naar zijn inhoud) was daar nooit een
     probleem -- met een lange naam erin duwde dat 'm dwars door de
     gecentreerde titel heen. Hier dus stretch: de knop vult de kolom, en de
     naam kan daarbinnen normaal afkappen (min-width:0 + ellipsis). */
  #screen-map .header-left { justify-self: stretch; }
  .map-id-btn {
    display: flex; align-items: center; gap: 9px; min-width: 0;
    border: none; background: none; padding: 0; cursor: pointer; font-family: inherit;
    color: inherit; text-align: left; transition: transform .12s;
  }
  .map-id-btn:hover { transform: scale(1.02); }
  .map-id-btn:active { transform: scale(.96); }
  .map-portrait {
    position: relative; width: 42px; height: 42px; flex-shrink: 0; border-radius: 50%; overflow: hidden;
    background: var(--glass-black-30); border: 2px solid rgba(255,255,255,.65);
    box-shadow: 0 2px 7px var(--glass-black-35);
  }
  .map-portrait svg { position: absolute; left: 50%; top: -6px; transform: translateX(-50%); }
  .map-name {
    font-size: 19px; font-weight: 700; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    text-shadow: 0 2px 0 var(--glass-black-20);
  }
  .map-flex {
    flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
    width: 100%; min-height: 0; z-index: 1;
  }
  /* compacte, enkele regel onder de kop: sterren + welke tournee (set van 12
     steden) + waar daarbinnen, alles in één oogopslag */
  .tour-line { font-size: 13.5px; font-weight: 600; opacity: .92; text-align: center; margin-top: 3px; text-shadow: 0 1px 0 var(--glass-black-18); }
  /* .map-sky (buiten) doet alleen het knippen en blijft zelf altijd op zijn
     plek t.o.v. het scherm; .map-sky-inner (binnen) krijgt de scroll-
     parallax-transform (zie updateParallax). Ooit zat de transform op
     .map-sky zelf -- dan verschuift de knip-grens mee met de parallax, en
     ontstaat er een onzichtbare strook aan de kant van het scherm waar
     nooit meer een wolk kan verschijnen (zelfde reden dat .tour-map-wrap
     hieronder ook een eigen, niet-transformerende omhulling heeft). */
  .map-sky { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .map-sky-inner { position: absolute; inset: 0; }
  .map-sky-inner > span { position: absolute; left: 0; opacity: .28; animation: drift linear infinite; }
  @keyframes drift { from { transform: translateX(-80px); } to { transform: translateX(calc(100vw + 80px)); } }
  /* een enkel vliegtuig de andere kant op, voor wat diepte -- gespiegeld
     zodat de neus ook echt de reisrichting op wijst */
  .map-sky-inner > span.rev { animation-name: driftReverse; }
  @keyframes driftReverse {
    from { transform: translateX(calc(100vw + 80px)) scaleX(-1); }
    to { transform: translateX(-80px) scaleX(-1); }
  }

  .main-nav {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 10px; z-index: 40;
    display: none; gap: 5px; padding: 7px; border-radius: var(--radius-2xl); width: min(94vw, 430px);
    background: rgba(30, 4, 52, .78); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1.5px solid var(--glass-white-22); box-shadow: 0 10px 26px var(--glass-black-40);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-family: inherit; font-size: 12.5px; font-weight: 700; color: var(--c-white); opacity: .75;
    background: transparent; border: none; border-radius: 19px; padding: 7px 4px 6px; cursor: pointer;
    transition: transform .1s, background .15s, opacity .15s;
  }
  .nav-item .nav-ico { font-size: 25px; line-height: 1.1; }
  .nav-item:active { transform: scale(.94); }
  .nav-item.active { opacity: 1; background: rgba(255,193,7,.26); box-shadow: inset 0 0 0 2px rgba(255,213,79,.55); }
  /* schermen met de vaste navigatie eronder krijgen ruimte zodat niets erachter verdwijnt */
  .screen.hub { padding-bottom: 100px; }

  /* ---- Spel ---- */
  #screen-game { padding: 8px; justify-content: flex-start; }
  /* bovenbalk als één donker lint (zelfde familie als navigatie/actiebalk):
     terug · stad · hartjes · 💎 — alles op één regel, ook op smalle schermen */
  .game-top {
    display: flex; align-items: center; width: 100%; max-width: 820px; gap: 8px;
    padding: 6px 9px; border-radius: var(--radius-button);
    background: rgba(30, 4, 52, .5); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border: 1.5px solid var(--glass-white-16);
  }
  .game-city {
    flex: 1; min-width: 0; text-align: center; font-size: 16.5px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 1px 0 var(--glass-black-25);
  }
  .notes-left { font-size: 19px; letter-spacing: 1px; white-space: nowrap; display: inline-block; flex-shrink: 0; }
  .qprogress { display: flex; gap: 5px; justify-content: center; margin-top: 8px; }
  .qdot { width: 13px; height: 13px; border-radius: 50%; background: var(--glass-white-30); }
  .qdot.done { background: var(--gold-accent); box-shadow: 0 0 6px var(--gold-accent); }
  .qdot.now { background: var(--c-white); transform: scale(1.25); }
  @media (max-width: 430px) {
    .game-city .lvl-pre { display: none; }   /* "Optreden in " valt weg, de stad blijft */
    .notes-left { font-size: 17px; letter-spacing: 0; }
    .game-top .diamond-badge.compact { font-size: 15px; padding: 5px 10px; }
  }

  /* arena: linkerpaneel = de show (avatar + fanmeter), rechts = het rekenen (focus);
     space-evenly verdeelt de resthoogte gelijkmatig i.p.v. één groot gat bovenaan */
  .game-arena {
    display: flex; gap: 22px; align-items: center; align-content: space-evenly; justify-content: center;
    width: 100%; max-width: 860px; margin-top: 6px; flex-wrap: wrap; flex: 1 1 auto;
  }
  .show-panel { display: flex; flex-direction: column; align-items: center; }
  .show-inner { display: flex; align-items: flex-end; gap: 12px; }
  .fan-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .fan-icon { font-size: 20px; line-height: 1; }
  .fan-track {
    width: 28px; height: 200px; border-radius: var(--radius-pill); overflow: hidden;
    background: var(--glass-black-32); border: 2px solid var(--glass-white-40);
    display: flex; align-items: flex-end;
  }
  .fan-fill {
    width: 100%; height: 0%; border-radius: var(--radius-pill);
    background: linear-gradient(0deg, var(--pink-accent), var(--pink-hot), var(--pink-deep)); transition: height .5s ease;
  }
  .fan-fill.full { animation: fanPulse .5s ease infinite alternate; }
  @keyframes fanPulse { from { filter: brightness(1); } to { filter: brightness(1.45); } }
  .show-stage { width: 188px; height: 218px; }

  .math-panel { display: flex; flex-direction: column; align-items: center; }
  .question-card {
    position: relative; overflow: hidden;
    background: linear-gradient(180deg, var(--c-white), var(--lavender-wash)); color: var(--purple-shadow); border-radius: var(--radius-2xl);
    padding: 18px 32px 26px; margin: 0 0 8px; text-align: center;
    font-size: clamp(42px, 8.5vw, 62px); font-weight: 700; min-width: min(88vw, 400px);
    box-shadow: 0 10px 24px var(--glass-black-32); border: 3px solid rgba(255,255,255,.7);
  }
  /* de spotlight-bonus leeft ín de somkaart: een gouden randje dat langzaam dooft —
     geen aparte tijdbalk-rij die als "haast je!" leest */
  .spot-rail {
    position: absolute; left: 16px; right: 16px; bottom: 9px; height: 7px;
    border-radius: var(--radius-pill); background: rgba(74, 20, 140, .10);
  }
  .spotlight-bar { height: 100%; width: 100%; border-radius: var(--radius-pill); background: linear-gradient(90deg, var(--gold-bright), var(--gold-deep)); transition: width .1s linear; }
  /* gouden vraag: gele balk op gele kaart is onzichtbaar → donkere baan + paarse balk */
  .question-card.golden .spot-rail { background: rgba(74, 20, 140, .28); }
  .question-card.golden .spotlight-bar { background: linear-gradient(90deg, var(--purple-light), var(--purple-golden-accent)); }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: min(88vw, 400px); margin-top: 4px; }
  .choice-btn {
    font-family: inherit; font-size: 34px; font-weight: 700; color: var(--c-white); border: none; cursor: pointer;
    padding: 18px 8px; border-radius: var(--radius-lg);
    background: linear-gradient(180deg, var(--purple-input-top), var(--purple-input-bottom)); box-shadow: 0 var(--btn-lip) 0 var(--purple-input-shadow);
    transition: transform .07s, box-shadow .07s;
  }
  .choice-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--purple-input-shadow); }
  .choice-btn.good { background: linear-gradient(180deg, var(--green-top), var(--green-deep)); box-shadow: 0 var(--btn-lip) 0 var(--green-shadow); }
  .choice-btn.bad { background: linear-gradient(180deg, var(--red-500), var(--red-answer-600)); box-shadow: 0 var(--btn-lip) 0 var(--red-answer-shadow); }

  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: min(78vw, 300px); margin-top: 4px; }
  .num-btn {
    font-family: inherit; font-size: 28px; font-weight: 700; color: var(--c-white); border: none; cursor: pointer;
    padding: 13px 0; border-radius: var(--radius-md);
    background: linear-gradient(180deg, var(--purple-input-top), var(--purple-input-bottom)); box-shadow: 0 var(--btn-lip) 0 var(--purple-input-shadow);
  }
  .num-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--purple-input-shadow); }
  .num-btn.ok { background: linear-gradient(180deg, var(--green-top), var(--green-deep)); box-shadow: 0 var(--btn-lip) 0 var(--green-shadow); }
  /* wissen is neutraal (grijs), niet rood: rood = fout antwoord, dat verwarren we niet */
  .num-btn.del { background: linear-gradient(180deg, var(--gray-top), var(--gray-bottom)); box-shadow: 0 var(--btn-lip) 0 var(--gray-shadow); font-size: 22px; }

  /* op smalle schermen: show compacter zodat het rekenen prominent blijft */
  @media (max-width: 720px) {
    .game-arena { gap: 12px; }
    .show-stage { width: 128px; height: 150px; }
    .fan-track { height: 132px; width: 24px; }
    .question-card { font-size: clamp(38px, 12vw, 56px); padding: 14px 22px 24px; }
  }
  /* op lage schermen alles compacter: som + alle antwoorden moeten ALTIJD
     zonder scrollen in beeld staan */
  @media (max-height: 700px) {
    .show-stage { width: 106px; height: 124px; }
    .fan-track { height: 104px; width: 20px; }
    .fan-icon { font-size: 16px; }
    .game-arena { gap: 8px; margin-top: 2px; }
    .question-card { font-size: clamp(30px, 9vw, 44px); padding: 11px 18px 21px; margin-bottom: 5px; }
    .gold-banner { height: 18px; font-size: 14.5px; margin-top: 2px; }
    .choice-btn { padding: 12px 8px; font-size: 27px; }
    .choices { gap: 10px; }
    .num-btn { padding: 9px 0; font-size: 23px; }
    .numpad { gap: 8px; }
    .qprogress { margin-top: 5px; }
  }
  /* ruime schermen: de show mag wat groter schitteren */
  @media (min-width: 900px) and (min-height: 760px) {
    .show-stage { width: 224px; height: 258px; }
    .fan-track { height: 232px; }
  }

  .praise {
    position: fixed; left: 50%; top: 38%; transform: translate(-50%,-50%) scale(.3);
    font-size: clamp(34px, 7.4vw, 58px); font-weight: bold; color: var(--gold-bright);
    line-height: 1.12; text-align: center; text-wrap: balance;
    max-width: min(92vw, 640px);
    text-shadow: 0 0 18px var(--gold-flame), 0 3px 0 var(--glass-black-40);
    pointer-events: none; opacity: 0; z-index: 60;
  }
  .praise.pop { animation: praisePop 1s ease forwards; }
  @keyframes praisePop {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(.3); }
    30% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
    70% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-70%) scale(1); }
  }
  .toast {
    position: fixed; left: 50%; top: 12%; transform: translateX(-50%);
    background: rgba(0,0,0,.8); color: var(--c-white);
    font-size: clamp(16px, 4.6vw, 20px); line-height: 1.35;
    padding: 11px 20px; border-radius: var(--radius-md); z-index: 60; display: none;
    max-width: min(94vw, 560px); text-align: center; text-wrap: balance;
    pointer-events: none;
  }
  /* "tik om verder te gaan": een onzichtbare, schermvullende laag ónder de
     toast (die zelf pointer-events:none heeft, dus een tik daarop valt door
     naar deze laag) zodat een kind overal mag tikken, niet precies op de
     kleine bubbel zelf moet mikken. */
  .tap-veil { position: fixed; inset: 0; z-index: 59; display: none; }
  .shake { animation: shake .4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); } 20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); } 60% { transform: translateX(-7px); } 80% { transform: translateX(7px); }
  }
  /* zachte "foute noot" animatie */
  .wobble { animation: wobble .7s ease; }
  @keyframes wobble {
    0%,100% { transform: rotate(0) scale(1); }
    20% { transform: rotate(-3deg) scale(.98); }
    45% { transform: rotate(2.5deg) scale(.99); }
    70% { transform: rotate(-1.5deg); }
  }
  .slip-note {
    position: fixed; left: 50%; top: 34%; transform: translateX(-50%);
    font-size: 52px; z-index: 60; pointer-events: none; opacity: 0;
  }
  .slip-note.go { animation: slipNote 1.6s ease forwards; }
  @keyframes slipNote {
    0% { opacity: 0; transform: translate(-50%, 0) rotate(0); }
    20% { opacity: 1; transform: translate(-50%, 6px) rotate(-8deg); }
    100% { opacity: 0; transform: translate(-50%, 90px) rotate(30deg); }
  }

  /* ---- Gouden vraag ---- */
  .question-card.golden {
    background: linear-gradient(135deg, var(--gold-cream), var(--gold-warm), var(--gold-marigold));
    color: var(--ink-on-gold-card); box-shadow: 0 0 26px rgba(255,193,7,.9), 0 8px 20px var(--glass-black-30);
    animation: goldGlow 1s ease-in-out infinite alternate;
  }
  @keyframes goldGlow { from { box-shadow: 0 0 18px rgba(255,193,7,.7), 0 8px 20px var(--glass-black-30); } to { box-shadow: 0 0 34px rgba(255,193,7,1), 0 8px 20px var(--glass-black-30); } }
  .gold-banner { font-size: 18px; font-weight: bold; color: var(--gold-light); text-shadow: 0 0 10px var(--gold-flame); margin-top: 6px; height: 22px; }

  /* ---- Wereldtournee: de horizontale reisroute is het hart van het hoofdscherm ---- */
  .tour-map { position: relative; overflow-x: auto; width: 100%; max-width: 760px;
    -webkit-overflow-scrolling: touch; cursor: grab;
    scrollbar-width: none; -ms-overflow-style: none; }
  .tour-map::-webkit-scrollbar { display: none; }
  .tour-map.dragging, .tour-map.dragging * { cursor: grabbing; }
  /* zachte fade-randen op horizontale scrollers (reisroute, tabbladen):
     verschijnen alleen aan de kant waar nog meer te scrollen valt */
  .hscroll-fade.can-right { -webkit-mask-image: linear-gradient(90deg, #000 calc(100% - 34px), transparent 100%);
    mask-image: linear-gradient(90deg, #000 calc(100% - 34px), transparent 100%); }
  .hscroll-fade.can-left { -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 34px);
    mask-image: linear-gradient(90deg, transparent 0, #000 34px); }
  .hscroll-fade.can-left.can-right { -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 34px, #000 calc(100% - 34px), transparent 100%);
    mask-image: linear-gradient(90deg, transparent 0, #000 34px, #000 calc(100% - 34px), transparent 100%); }
  /* ruimte boven de haltes voor de avatar, eronder voor de Speel-knop, plus wat
     extra lucht boven/onder voor de golvende weg (haltes zwaaien op/neer).
     De onderkant heeft ook nog 10px extra bovenop de knop zelf: .tour-map's
     overflow-x:auto dwingt overflow-y ook naar auto (CSS-spec-gedrag, niet
     bewust gekozen), dus alles voorbij deze padding wordt geknipt -- zonder
     die 10px viel de zachte slagschaduw van de Speel-knop er net buiten bij
     haltes die door de golvende route wat lager uitkomen. */
  .tour-track { display: flex; align-items: flex-start; width: max-content; position: relative; padding: 154px 26px 114px; }
  /* de reisweg is één rechte, volle lijn dóór het midden van elke halte
     (punten gezet door updateRoad/renderTourMap), gewoon dóór de tegels heen
     -- die zijn ondoorzichtig, dus dekt vanzelf af. Twee lagen: het hele pad
     dof ("nog te ontdekken"), het afgelegde stuk daar bovenop vol goud
     ("al gehaald"), zelfde taal als de gelijknamige tegel-staten. */
  .tour-road-svg { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; z-index: 0; }
  .tour-road-bg, .tour-road-fg, .tour-road-fade { fill: none; stroke-linecap: round; }
  .tour-road-bg { stroke: var(--glass-white-35); stroke-width: 6; }
  .tour-road-fg { stroke: var(--gold-accent); stroke-width: 6; }
  /* alleen de allerlaatste staart van de weg (ná de laatst getoonde halte)
     dooft uit -- de rest van het pad blijft gewoon even dof-vast */
  .tour-road-fade { stroke: url(#roadFadeGrad); stroke-width: 6; }
  .tour-map-wrap { position: relative; width: 100%; max-width: 760px; }
  .tour-stop { width: 108px; flex: 0 0 auto; border: none; cursor: pointer; font-family: inherit; color: var(--c-white);
    background: transparent; padding: 0; text-align: center; position: relative; z-index: 1; }
  /* Minimale medaillon-stijl i.p.v. een 3D-knop: plat rondje, dunne rand,
     geen drop-shadow-lip. Een halte is een plek op een kaart, geen knop --
     de "tik me in" actie zit al in de losse Speel!-knop hieronder.
     Alle tegels zelfde maat, ongeacht staat -- alleen kleur/opaciteit
     vertelt het verhaal. "Gedaan" en "nu speelbaar" delen bewust dezelfde
     goud-tint (beide zijn gewoon tikbaar); alleen de huidige halte krijgt
     er een puls + gloed + de Speel-knop bovenop. Op slot = ontkleurd. */
  /* Volledig ondoorzichtige vulling (geen glass-tint meer) -- anders schijnt
     de reisweg erdoorheen. */
  .tour-stop .dot { position: relative; width: 70px; height: 70px; margin: 0 auto; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 33px; border: 2px solid var(--glass-white-30); background: var(--purple-shadow); }
  .tour-stop:active .dot { transform: scale(.92); }
  .tour-stop.locked { cursor: default; }
  /* een grayscale(1) filter over de paarse basiskleur oogde bijna zwart --
     gewoon de bestaande "uitgeschakeld/nog niet beschikbaar"-grijstint
     hergebruiken (dezelfde tokens als vroeger de knop-variant .btn.gray) */
  .tour-stop.locked .dot { background: linear-gradient(180deg, var(--gray-top), var(--gray-bottom)); }
  .tour-stop.done .dot, .tour-stop.next .dot { border-color: var(--gold-accent); background: linear-gradient(180deg, var(--gold-cta-top), var(--gold-cta-bottom)); }
  /* pulseBtn animeert zelf al transform (scale) -- een :active transform
     zou dat gewoon overschrijven zolang de animatie loopt, dus tikfeedback
     op "next" gaat via filter (dat de animatie niet aanraakt) i.p.v. transform.
     Zelfde aanpak voor "done" erbij, voor identieke tikrespons in beide staten. */
  .tour-stop.done:active .dot, .tour-stop.next:active .dot { filter: brightness(.85); }
  .tour-stop.next .dot { box-shadow: 0 0 0 5px rgba(255,213,79,.22); animation: pulseBtn 1.2s ease-in-out infinite; }
  .tour-stop .cname { font-size: 14px; font-weight: bold; margin-top: 7px; }
  .tour-stop.next .cname { color: var(--gold-light); }
  .tour-stop.locked .cname { opacity: .6; }
  /* sterren als gewone tekstregel onder de naam i.p.v. een badge óp de tegel --
     geen aparte positionering/overlap meer nodig, past vanzelf altijd netjes */
  .tour-stop .cstars { font-size: 11.5px; letter-spacing: -1px; opacity: .92; margin-top: 1px; }
  .tour-stop .cstars .star-miss { opacity: .4; filter: grayscale(1); }
  /* de eigen ster staat vol in beeld, boven op de huidige halte (voeten net
     over de rand van de tegel) i.p.v. ín een uitsnede -- die tegel toont dan
     ook geen stadsicoon: je "verdient" dat nog door de show te spelen, je
     ziet het pas op het volgende scherm. Zelfde element voor de reisanimatie
     (zie runTravel): tijdens het huppelen staat ze op de vorige halte. */
  .tour-hero { position: absolute; left: 50%; bottom: calc(100% - 30px); transform: translateX(-50%);
    width: 92px; pointer-events: none; z-index: 2; }
  .tour-hero svg { width: 100%; height: auto; display: block; }
  /* contactschaduw bij de voeten -- verkoopt het "staat ÓP de tegel" effect,
     zonder dit oogt ze net zo goed los zwevend erboven */
  .tour-hero::after { content: ""; position: absolute; left: 50%; bottom: 2px; transform: translateX(-50%);
    width: 34px; height: 9px; border-radius: 50%; background: var(--glass-black-40); filter: blur(2px); }
  /* .speel-pill: het gedeelde "Speel!"-knop-uiterlijk -- zelfde maat,
     verloop, schaduw en paarse tekst op de kaart én bij profielkeuze. Puls +
     gloed geïnspireerd op .trophy-card.ready (de "open trofee"-knop) i.p.v.
     de stillere brightness-only playGlow -- dit is de belangrijkste tik op
     elk van die schermen, mag zich ook zo aanvoelen. */
  .speel-pill {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 20px; font-weight: 700; color: var(--purple-shadow); letter-spacing: .3px; white-space: nowrap;
    background: linear-gradient(180deg, var(--gold-cta-top), var(--gold-cta-bottom)); border-radius: var(--radius-pill); padding: 13px 26px;
    box-shadow: 0 var(--btn-lip) 0 var(--gold-cta-shadow), 0 9px 18px var(--glass-black-35);
  }
  /* dé speelknop van het spel: zit vast aan de huidige halte. translateX(-50%)
     zit ín de eigen keyframes gebakken (i.p.v. los op het element), anders
     overschrijft de animatie 'm elk frame en springt de knop uit het midden. */
  .tour-speel { position: absolute; top: calc(100% + 15px); left: 50%; animation: speelPulse 1.2s ease-in-out infinite; }
  /* zelfde duur/easing/schaal als pulseBtn (de gouden "next"-tegel) zodat
     beide echt gelijk lopen i.p.v. losjes uit de pas -- alleen translateX(-50%)
     zit erbij gebakken (zie hierboven), de rest is bewust identiek. Geen
     box-shadow-animatie meer erbovenop: dat maakte 'm ook nog eens "voller"
     ogend dan de tegel, terwijl ze juist hetzelfde moment moeten voelen. */
  @keyframes speelPulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.09); }
  }
  /* profielkeuze: zelfde puls, maar zonder de translateX-truc -- deze knop
     staat gewoon in de normale flow, niet absoluut gepositioneerd */
  .profile-card .speel-pill { margin-top: 12px; animation: speelPulseFlow 1.2s ease-in-out infinite; }
  @keyframes speelPulseFlow {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.09); }
  }
  /* tikfeedback via filter i.p.v. transform -- de puls-animatie hierboven
     bezet transform al elk frame, dus een :active transform zou meteen weer
     overschreven worden (zelfde patroon als bij .tour-stop.next .dot) */
  .tour-stop:active .tour-speel, .profile-card:active .speel-pill { filter: brightness(.85); }
  .tour-speel::before { content: ""; position: absolute; top: -8px; left: 50%; margin-left: -8px;
    border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 9px solid var(--gold-cta-top); }
  /* compacter op lage schermen, zodat route + knop samen in beeld blijven */
  @media (max-height: 700px) {
    .tour-track { padding: 124px 22px 100px; }
    .tour-stop { width: 96px; }
    .tour-stop .dot { width: 58px; height: 58px; font-size: 27px; }
    .tour-hero { width: 82px; }
    .speel-pill { font-size: 18px; padding: 11px 22px; }
  }
  /* hoge schermen: de kaart mag juist groter schitteren — grotere haltes,
     ster en speelknop claimen de ruimte die anders leeg blijft */
  @media (min-height: 800px) {
    .tour-track { padding: 178px 30px 128px; }
    .tour-stop { width: 124px; }
    .tour-stop .dot { width: 84px; height: 84px; font-size: 40px; }
    .tour-stop .cname { font-size: 16px; }
    .tour-stop .cstars { font-size: 13px; }
    .tour-hero { width: 118px; bottom: calc(100% - 28px); }
    .speel-pill { font-size: 22px; padding: 15px 30px; }
  }
  /* heel smalle toestellen: topbalk compacter zodat naam + tellers samen passen */
  @media (max-width: 390px) {
    .map-name { font-size: 17px; }
    .chip-badge { font-size: 14px; padding: 5px 10px; }
    #screen-map .diamond-badge { font-size: 17px; padding: 6px 13px; }
    .map-portrait { width: 38px; height: 38px; }
    .map-portrait svg { top: -5px; width: 65px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .map-sky span, .speel-pill, .tour-stop.next .dot, .avatar-holder.idle { animation: none; }
  }

  /* ---- Trofeeën ---- */
  /* kast-voortgang in de plakkende kop: hoeveel van de kast is gevuld */
  .kast-progress { width: min(100%, 340px); margin-top: 3px; }
  .kast-progress-text { font-size: 13.5px; font-weight: 600; opacity: .92; text-align: center; margin-bottom: 4px; }
  .kast-bar { height: 10px; border-radius: var(--radius-pill); overflow: hidden; background: var(--glass-black-35); border: 1px solid var(--glass-white-28); }
  .kast-bar-fill { height: 100%; border-radius: var(--radius-pill); background: linear-gradient(90deg, var(--gold-accent), var(--pink-accent)); transition: width .6s ease; }
  /* de kast heeft planken: kleine themakopjes met een teller per plank */
  #trophy-shelves { width: 100%; max-width: 680px; }
  /* elke categorie zit in een eigen paneel: duidelijke visuele groepering */
  .shelf { background: var(--glass-black-18); border: 1px solid rgba(255,255,255,.12); border-radius: var(--radius-button); padding: 6px 12px 13px; margin: 14px 0; }
  .shelf-title { margin: 4px 2px 9px; text-shadow: 0 1px 0 var(--glass-black-25); border-bottom: 1px solid var(--glass-white-13); padding-bottom: 7px; }
  .shelf-head-row { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; font-size: 16px; font-weight: 800; }
  .shelf-title .shelf-count { font-size: 12.5px; font-weight: 700; opacity: .95; background: var(--glass-black-30); border-radius: var(--radius-pill); padding: 3px 11px; white-space: nowrap; }
  /* hele categorie compleet: zelfde goud-signaal als een behaalde trofee */
  .shelf-title .shelf-count.full { color: var(--gold-light); background: rgba(255,206,77,.25); opacity: 1; }
  .trophy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(124px, 1fr)); gap: 9px; width: 100%; align-items: stretch; }
  .trophy-card {
    position: relative; background: var(--glass-white-13); border: 2px solid var(--glass-white-30);
    border-radius: var(--radius-card-sm); padding: 12px 8px 11px; text-align: center; cursor: pointer;
    display: flex; flex-direction: column; align-items: stretch;
  }
  .trophy-card:active { transform: scale(.97); }
  .trophy-card .temoji { font-size: 36px; line-height: 1; height: 40px; }
  .trophy-card .tname { font-size: 15px; font-weight: bold; margin-top: 4px; line-height: 1.12; }
  .trophy-card .tdesc { font-size: 12.5px; opacity: .85; margin-top: 2px; line-height: 1.15; }
  /* 'Kast vol!' (eindtrofee) over de volle breedte */
  .trophy-card.wide { grid-column: 1 / -1; }
  /* ===== staten ===== */
  /* NIET GESTART: normale paarse kaart, icoon licht gedimd, lege dunne balk */
  .trophy-card.fresh .temoji { opacity: .78; }
  /* BEZIG: normale kaart, icoon vol, dunne balk met duidelijke vulling (geen glow).
     Dunne, gedempte blauwe rand — rustiger dan bijna/open, maar wél meteen
     te onderscheiden van 'niet gestart' zonder de tekst te moeten lezen. */
  .trophy-card.busy { border-color: rgba(90,190,245,.55); }
  /* BIJNA BEHAALD: sterke balkvulling + subtiele gouden glow (glow via inline style) */
  .trophy-card.almost .trophy-progress-fill { background: linear-gradient(90deg, var(--gold-warm), var(--gold-deep)); }
  /* LOCKED: donkerder, icoon sterk gedimd, klein slotje (voorlopig sluimerend) */
  .trophy-card.locked { background: var(--glass-black-26); border-color: var(--glass-white-10); }
  .trophy-card.locked .temoji { filter: grayscale(1); opacity: .5; }
  .trophy-card.locked .tname { opacity: .6; }
  .trophy-card.locked .tdesc { opacity: .45; }
  .trophy-lock {
    position: absolute; top: -8px; right: -8px; width: 26px; height: 26px; border-radius: 50%;
    display: grid; place-items: center; font-size: 13px; z-index: 3;
    background: rgba(30,15,55,.95); border: 2px solid var(--glass-white-40);
    box-shadow: 0 2px 6px var(--glass-black-35);
  }
  /* BEHAALD: rustig, verzameld. Zacht goud, volle-kleur icoon, klein sterretje.
     Zakt licht naar de achtergrond zodat de actieve doelen opvallen. */
  .trophy-card.done { background: rgba(255,214,90,.07); border-color: rgba(255,214,90,.38); opacity: .9; }
  .trophy-card.done .temoji { filter: none; }
  .trophy-won {
    position: absolute; top: -8px; right: -6px; font-size: 20px; z-index: 3;
    filter: drop-shadow(0 1px 2px var(--glass-black-50));
  }
  /* onderste blok (status/voortgang) zakt netjes naar de kaartbodem */
  .trophy-bottom { margin-top: auto; padding-top: 8px; display: flex; flex-direction: column; gap: 5px; }
  /* tekstkleur volgt de balk: blauw = bezig (default), goud = bijna, neutraal = niet gestart/locked */
  .trophy-progress-text { font-size: 13px; font-weight: 700; color: var(--blue-text); min-height: 17px; line-height: 1.15; }
  .trophy-progress-text.sub { color: var(--muted-lavender-text); font-weight: 600; opacity: .75; }
  .trophy-card.fresh .trophy-progress-text { color: var(--muted-lavender-text); opacity: .82; }
  .trophy-card.almost .trophy-progress-text { color: var(--gold-warm); }
  /* dunne progressbalk onderaan de kaart */
  .trophy-progress { height: 7px; border-radius: var(--radius-pill); overflow: hidden; background: rgba(0,0,0,.34); border: 1px solid var(--glass-white-18); }
  /* BLAUW = bezig/actief (zelfde taal als 'nu aan' bij thema-looks en de diamant) */
  .trophy-progress-fill { height: 100%; border-radius: var(--radius-pill); transition: width .5s ease; background: linear-gradient(90deg, var(--blue-fill-top), var(--blue-fill-bottom)); }
  /* korte uitleg onder een categoriekop (bv. bij thema-looks) */
  .shelf-note { font-size: 12px; font-weight: 600; color: var(--lavender-text); opacity: .82; margin: -3px 2px 9px; }
  /* ===== KLAAR: dit kaartje wordt zélf de 'Open trofee'-knop (zelfde formaat) ===== */
  .trophy-card.ready {
    justify-content: center; gap: 3px; color: var(--ink-on-gold); border: 3px solid var(--gold-ready-border);
    background: linear-gradient(135deg, var(--gold-light), var(--gold-deep));
    box-shadow: 0 4px 15px rgba(255,170,0,.5); animation: readyPulse 1.4s ease-in-out infinite;
  }
  .trophy-card.ready .temoji { filter: drop-shadow(0 1px 2px var(--glass-black-20)); }
  .ready-big { font-size: 16px; font-weight: 900; line-height: 1.08; }
  .ready-name { font-size: 13px; font-weight: 700; opacity: .82; line-height: 1.12; }
  @keyframes readyPulse { 0%,100% { transform: scale(1); box-shadow: 0 4px 13px rgba(255,170,0,.45); } 50% { transform: scale(1.03); box-shadow: 0 6px 22px rgba(255,170,0,.75); } }
  /* ---- Thema-looks: brede outfit-challenge-kaarten met een strakke checklist ---- */
  .trophy-card.theme { grid-column: 1 / -1; text-align: left; padding: 14px 14px; background: rgba(255,255,255,.06); border-color: var(--glass-white-16); box-shadow: none; }
  .trophy-card.theme.busy, .trophy-card.theme.almost { border-color: rgba(90,190,245,.55); }
  .trophy-card.theme.done { background: rgba(255,214,90,.07); border-color: rgba(255,214,90,.38); opacity: .92; }
  .theme-top { display: flex; align-items: center; gap: 10px; }
  .theme-emoji { font-size: 36px; line-height: 1; }
  .trophy-card.theme.fresh .theme-emoji { filter: grayscale(1); opacity: .4; }
  .trophy-card.theme .tname { margin-top: 0; font-size: 15px; opacity: 1; }
  .trophy-card.theme.fresh .tname { opacity: .6; }
  /* Eén rustige Aan-teller rechtsboven: 0 blijft inactief, voortgang kleurt blauw. */
  .theme-count { margin-left: auto; font-size: 12px; font-weight: 800; }
  .theme-count span { color: var(--muted-lavender-text); background: var(--glass-black-24); border-radius: var(--radius-pill); padding: 3px 9px; white-space: nowrap; opacity: .72; }
  .theme-count .worn.some { color: var(--blue-text); background: rgba(56,189,248,.15); box-shadow: 0 0 0 1px var(--blue-ring); opacity: 1; }
  .theme-count .worn.full { color: var(--blue-text); background: rgba(56,189,248,.18); box-shadow: 0 0 0 1px rgba(143,214,255,.24); opacity: 1; }
  .theme-list { list-style: none; margin: 10px 0 0; padding: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 6px 12px; }
  .theme-list li { font-size: 13px; line-height: 1.25; display: flex; align-items: center; gap: 8px; }
  .theme-list .pc { flex: 0 0 auto; width: 17px; height: 17px; border-radius: 50%; border: 2px solid var(--glass-white-30); box-sizing: border-box; position: relative; }
  /* 3 per-stuk-staten: niet in kleerkast (leeg/dim), in kleerkast (grijs vinkje), nu aan (blauw actief). */
  .theme-list li.miss { color: rgba(255,255,255,.42); }
  .theme-list li.miss .pc { border-color: rgba(255,255,255,.24); background: transparent; }
  .theme-list li.have { color: rgba(255,255,255,.74); }
  .theme-list li.have .pc { background: rgba(180,184,196,.62); border-color: rgba(180,184,196,.72); }
  .theme-list li.have .pc::after { content: '✓'; position: absolute; inset: 0; display: grid; place-items: center; font-size: 9px; font-weight: 900; color: rgba(255,255,255,.94); }
  .theme-list li.on { color: var(--blue-text); font-weight: 700; }
  .theme-list li.on .pc { background: var(--blue-fill-top); border-color: var(--blue-fill-top); box-shadow: 0 0 0 2px rgba(56,189,248,.16); }
  .theme-list li.on .pc::after { content: '✓'; position: absolute; inset: 0; display: grid; place-items: center; font-size: 11px; font-weight: 900; color: var(--purple-ink); }
  /* laatste-stap-duwtje: alles in bezit, nog samen aandoen */
  .look-hint { margin-top: 10px; font-size: 12.5px; font-weight: 800; color: var(--gold-warm); }
  .look-hint.action { display: inline-flex; align-items: center; gap: 6px; border: 0; cursor: pointer; padding: 8px 16px; border-radius: var(--radius-pill); color: var(--ink-on-gold); background: linear-gradient(180deg, var(--gold-light), var(--gold-deep)); box-shadow: 0 3px 10px rgba(255,179,0,.35); animation: readyPulse 1.4s ease-in-out infinite; }
  .look-hint.action:active { transform: scale(.96); }
  /* actie op een behaalde look: kort label, in de kop op de plek van de Aan-teller */
  .look-action {
    margin-left: auto; flex: 0 0 auto; border: 0; cursor: pointer;
    padding: 5px 12px; border-radius: var(--radius-pill); font-size: 11.5px; font-weight: 800; color: var(--ink-on-gold);
    background: linear-gradient(180deg, rgba(255,224,130,.95), rgba(255,179,0,.92)); box-shadow: 0 2px 5px var(--glass-black-20);
  }
  .look-action:active { transform: scale(.96); }
  /* ---- Claim-feestje: klein, vrolijk, verdwijnt vanzelf ---- */
  .trophy-pop-overlay {
    position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
    background: rgba(20,4,40,.45); animation: popFade .25s ease; cursor: pointer;
  }
  .trophy-pop-overlay.closing { animation: popFade .3s ease reverse forwards; }
  .trophy-pop {
    text-align: center; padding: 22px 30px; border-radius: var(--radius-xl);
    background: linear-gradient(180deg, var(--purple-deep), var(--purple-shadow)); border: 3px solid var(--gold-accent);
    box-shadow: 0 10px 40px var(--glass-black-50); animation: popIn .45s cubic-bezier(.2,1.3,.4,1);
  }
  .tp-head { font-size: 16px; font-weight: 800; color: var(--gold-light); }
  .tp-emoji { font-size: 66px; line-height: 1.1; margin: 4px 0; filter: drop-shadow(0 0 10px rgba(255,215,64,.8)); }
  .tp-name { font-size: 20px; font-weight: 800; color: var(--c-white); }
  .tp-joepie { font-size: 15px; font-weight: 700; color: var(--pink-light); margin-top: 4px; }
  @keyframes popFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { 0% { transform: scale(.4) rotate(-6deg); opacity: 0; } 60% { transform: scale(1.1) rotate(3deg); opacity: 1; } 100% { transform: scale(1) rotate(0); } }
  @media (prefers-reduced-motion: reduce) {
    .trophy-card.ready { animation: none; }
    .trophy-pop { animation: none; }
    .end-trophy-banner { animation: none; }
  }
  /* geel/goud stipje op het Trofeeën-tabblad zolang er iets nieuws in de kast ligt —
     zelfde kleurtaal als de rest van de trofee-elementen (banner, kast-balk, ready-kaart) */
  .nav-item { position: relative; }
  .nav-item .nav-dot {
    position: absolute; top: 3px; right: calc(50% - 22px); width: 12px; height: 12px;
    border-radius: 50%; background: var(--gold-marigold); border: 2px solid var(--c-white); display: none;
    box-shadow: 0 1px 4px var(--glass-black-40);
  }
  .nav-item.has-new .nav-dot { display: block; }
  @media (max-width: 520px) {
    /* gelijke flexibele zijkolommen: de titel blijft écht in het schermmidden,
       ook nu de linkercel leeg is (met auto|1fr|auto hing hij ~47px naar links) */
    .screen-header { grid-template-columns: 1fr auto 1fr; gap: 8px; }
    .screen-header .header-title { font-size: 20px; overflow: hidden; text-overflow: ellipsis; }
  }

  /* ---- Level einde ---- */
  /* verticaal gecentreerd via veilige auto-marges (knipt nooit af bij overloop) */
  .result-card {
    background: var(--glass-white-14); border: 3px solid var(--glass-white-40);
    border-radius: 28px; padding: 24px 30px; text-align: center; max-width: 460px; margin: auto 0;
  }
  .result-stars { font-size: 56px; letter-spacing: 6px; margin: 10px 0; }
  .result-stars span { display: inline-block; }
  /* gemiste ster: dof én kleurloos — zelfde taal als op de reiskaart */
  .result-stars .dim { opacity: .25; filter: grayscale(1); }
  /* opbrengst als badges — zelfde taal als de teller-pillen elders in de app */
  .earn-line { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0 18px; }
  .earn-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 16px; font-weight: bold; line-height: 1;
    background: var(--glass-black-30); border-radius: var(--radius-pill); padding: 8px 14px; }
  .earn-chip.dia { background: rgba(41,182,246,.34); }
  .earn-chip.star { background: rgba(255,215,64,.26); }
  .earn-chip.fan { background: rgba(255,64,129,.28); }
  /* eigen, opvallend blokje i.p.v. een tekstregel tussen de andere zinnen — zelfde
     gouden puls als een "klaar om te openen"-trofee in de kast, zodat dit al
     vooruitwijst naar wat je zo meteen ziet. Zelf ook klikbaar (net als die
     trofeekaartjes): een gouden pulserende pil roept nu eenmaal om aangetikt
     te worden, dus de knop eronder alleen was niet genoeg. */
  .end-trophy-banner {
    /* inline-flex (niet flex): flex nog altijd voor het eigen emoji+tekst-gedrag,
       maar block-level flex rekt vanzelf uit tot de volle kaartbreedte i.p.v. een
       pil op maat van zijn eigen inhoud -- inline-flex laat .result-card's
       text-align:center 'm juist wél als vanzelf centreren. */
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--ink-on-gold); font-weight: 800; font-size: 16.5px; font-family: inherit;
    background: linear-gradient(180deg, var(--gold-light), var(--gold-deep)); border: none; border-radius: var(--radius-pill);
    padding: 10px 18px; margin: 0 0 14px; box-shadow: 0 4px 14px rgba(255,170,0,.45);
    animation: readyPulse 1.4s ease-in-out infinite; cursor: pointer;
  }
  .end-trophy-banner:active { transform: scale(.96); }
  .end-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* ---- Kleedkamer ----
     Opbouw: vaste kop (titel + 💎 + paspop + tabbladen) blijft plakken bovenaan,
     het rek met spulletjes scrollt eronder door, en de actiebalk (passen/kopen)
     zit vast boven de navigatie. Zo is elke tik meteen zichtbaar op de paspop. */
  #screen-dress { padding-bottom: 190px; }
  .hub-sticky {
    position: sticky; top: -12px; z-index: 5;
    display: flex; flex-direction: column; align-items: center;
    width: calc(100% + 24px); margin: -12px 0 12px; padding: 12px 12px 13px;
    background: linear-gradient(180deg, rgba(43,7,71,.96), rgba(43,7,71,.82));
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 2px solid var(--glass-white-14);
    border-radius: 0 0 26px 26px;
    box-shadow: 0 10px 24px rgba(20,0,40,.3);
  }
  .hub-sticky .screen-header { margin-bottom: 4px; }
  /* de rand-/gloedbehandeling zit nu in de gedeelde .stage-frame (zie .stage
     hierboven) -- hier alleen nog de eigen afmeting van de kleedkamer-scène */
  .dress-stage { width: 200px; height: 168px; }
  .dress-stage .deco { font-size: 20px; }
  @media (max-height: 700px) { .dress-stage { width: 170px; height: 132px; } }
  /* 🎲 verras me: trekt een willekeurige outfit uit wat ze al bezit.
     Zit los van .dress-stage (buiten de overflow:hidden), dus overlapt de
     afgeronde hoek fysiek -- de extra buitenste ring in dezelfde lavendel-
     tint als de tegenwoordig dunnere kadervulling laat 'm daar als bewust
     "badge op de rand" ogen i.p.v. een rand die er zomaar stopt. */
  .stage-wrap { position: relative; }
  .shuffle-btn {
    position: absolute; right: -16px; bottom: -4px; width: 46px; height: 46px;
    border-radius: 50%; border: 2px solid rgba(255,255,255,.75); cursor: pointer;
    font-size: 22px; line-height: 1; font-family: inherit;
    background: linear-gradient(180deg, var(--purple-light), var(--purple-mid));
    box-shadow: 0 var(--btn-lip-sm) 0 var(--purple-shadow), 0 6px 12px var(--glass-black-35), 0 0 0 3px var(--glass-white-18);
    transition: transform .15s;
  }
  .shuffle-btn:hover { transform: rotate(20deg) scale(1.06); }
  .shuffle-btn:active { transform: rotate(180deg) scale(.92); box-shadow: 0 1px 0 var(--purple-shadow); }
  /* alle 8 categorieën blijven altijd zichtbaar (geen scroll-carrousel meer) --
     container query i.p.v. een viewport-breakpoint: kijkt naar hoeveel ruimte
     .shop-tabs zelf heeft (via .shop-tabs-wrap), niet naar het schermformaat.
     Onder de drempel: vaste 4x2-grid (8 categorieën, geen scroll nodig).
     Erboven: 1 rij van 8, allemaal even breed. */
  .shop-tabs-wrap { width: 100%; max-width: 960px; margin-top: 10px; container-type: inline-size; }
  .shop-tabs { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; padding: 2px 4px; }
  /* 855px = de gemeten breedte die alle 8 knoppen nodig hebben op hun eigen,
     ongekrompen (content-based) breedte -- pas daarboven schakelt het naar 1
     rij, anders zou "Schoenen" (de breedste) worden afgeknot */
  @container (min-width: 855px) {
    .shop-tabs { grid-template-columns: repeat(8, minmax(0, 1fr)); }
  }
  .tab-btn {
    font-family: inherit; font-size: 14px; font-weight: bold; border: none; cursor: pointer;
    letter-spacing: -.3px; padding: 10px 2px; border-radius: var(--radius-pill); color: var(--c-white); background: var(--glass-white-18);
    transition: transform .07s, background .12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; justify-content: center; gap: 2px; min-height: 44px;
  }
  .tab-btn:active { transform: scale(.95); }
  .tab-btn.active { background: var(--gold-deep); color: var(--purple-shadow); }
  .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; width: 100%; max-width: 680px; }
  .item-card {
    position: relative; background: var(--glass-white-13); border: 2px solid var(--glass-white-35);
    border-radius: var(--radius-md); padding: 10px; text-align: center; cursor: pointer;
    transition: transform .07s, background .12s, border-color .12s, box-shadow .12s;
  }
  .item-card:hover { background: var(--glass-white-22); }
  .item-card:active { transform: scale(.97); }
  /* kaart-staten volgen de prijzenkast: blauw = actief/preview, goud = aan/beloning */
  .item-card.selected { background: rgba(56,189,248,.16); border-color: var(--blue-text); box-shadow: 0 0 0 3px rgba(56,189,248,.22); transform: scale(1.025); }
  .item-card.equipped { border-color: var(--gold-accent); background: rgba(255,214,90,.10); box-shadow: 0 0 12px rgba(255,215,64,.48); }
  .item-card.selected.equipped { border-color: var(--gold-accent); box-shadow: 0 0 0 3px rgba(56,189,248,.20), 0 0 14px rgba(255,215,64,.55); }
  /* .owned and .selected are two plain (non-combined) classes with identical
     specificity, both setting background/border-color -- .owned happened to
     be declared later in the file, so it silently won that tie and previewing
     an owned item showed a half-gray, half-blue card (gray body, blue ring
     only, since .owned doesn't touch box-shadow/transform). Ownership is
     already communicated by the status badge below, so the card itself
     should just show the same full "you're looking at this" blue as any
     other selected item -- this combined selector's higher specificity wins
     outright, no reliance on rule order. */
  .item-card.owned.selected { background: rgba(56,189,248,.16); border-color: var(--blue-text); }
  /* zelfde tie als hierboven, maar dan voor :hover -- .owned/.equipped/.selected
     zetten allemaal hun eigen achtergrond, met dezelfde specificiteit als de
     kale .item-card:hover regel. Die verliest dus stilzwijgend de tie (bron-
     volgorde), en een owned/equipped/selected kaartje reageerde daardoor
     helemaal niet op hover terwijl een niet-bezeten kaartje wél oplichtte.
     Hier expliciet per staat een eigen, iets lichtere hover-tint (in de eigen
     kleur van die staat) zodat ieder kaartje evengoed op hover reageert. */
  .item-card.owned:hover { background: rgba(180,184,196,.18); }
  .item-card.equipped:hover { background: rgba(255,214,90,.18); }
  .item-card.selected:hover, .item-card.owned.selected:hover { background: rgba(56,189,248,.24); }
  .item-card.selected.equipped:hover { background: rgba(255,214,90,.18); }
  .item-card.just-bought { animation: boughtPop .85s ease; }
  @keyframes boughtPop { 0% { transform: scale(1); } 35% { transform: scale(1.08); box-shadow: 0 0 22px rgba(255,215,64,.75); } 100% { transform: scale(1); } }
  .item-swatch { width: 46px; height: 46px; border-radius: 50%; margin: 0 auto 6px; border: 2px solid rgba(255,255,255,.6); font-size: 30px; line-height: 44px; }
  /* podium-bol met een herkennende emoji erin */
  .item-swatch.stage-swatch { display: grid; place-items: center; font-size: 24px; text-shadow: 0 1px 2px rgba(0,0,0,.45); }
  /* getekend item (jurk/haar/schoen/micro) i.p.v. een kleurbolletje */
  .item-thumb { height: 52px; display: flex; align-items: flex-end; justify-content: center; margin: 0 auto 6px; }
  .item-thumb svg { height: 52px; width: auto; display: block; filter: drop-shadow(0 2px 3px var(--glass-black-30)); }
  .item-thumb .thumb-emo { font-size: 34px; line-height: 52px; }
  .item-name { font-size: 14px; font-weight: bold; overflow-wrap: break-word; hyphens: auto; }
  .item-status {
    display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    min-height: 21px; margin-top: 5px; padding: 3px 9px; border-radius: var(--radius-pill);
    font-size: 12px; font-weight: 800; line-height: 1; white-space: nowrap;
    background: var(--glass-black-24); color: var(--muted-text-2);
  }
  .item-status.price { color: var(--gold-light); background: rgba(255,179,0,.16); }
  .item-status.need { color: var(--gold-warm); background: var(--glass-black-30); opacity: .88; }
  .item-status.owned { color: var(--muted-text-3); background: rgba(180,184,196,.25); }
  .item-status.on { color: var(--ink-on-gold); background: linear-gradient(180deg, var(--gold-light), var(--gold-deep)); box-shadow: 0 1px 5px rgba(255,179,0,.35); }
  .item-status.preview { color: var(--blue-text); background: rgba(56,189,248,.16); box-shadow: 0 0 0 1px var(--blue-ring); }
  .item-status.new { color: var(--ink-on-gold); background: linear-gradient(180deg, var(--gold-flash), var(--gold-marigold)); animation: readyPulse 1.4s ease-in-out 2; }
  /* bezit/aan staat op het kaartje via rustige kaartkleur: grijs = hebben, goud = aan. */
  .item-card.owned { border-color: rgba(180,184,196,.64); background: rgba(180,184,196,.10); }
  /* actiebalk: naam + prijs + dé knop, altijd in beeld boven de navigatie */
  .dress-bar {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 92px; z-index: 39;
    display: none; align-items: center; gap: 10px; width: min(94vw, 430px); min-height: 52px;
    background: rgba(30, 4, 52, .86); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1.5px solid var(--glass-white-22); border-radius: var(--radius-lg);
    padding: 10px 14px; box-shadow: 0 10px 26px var(--glass-black-40);
  }
  .dress-bar .db-info { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 6px; text-align: left; white-space: nowrap; overflow: hidden; }
  .dress-bar .db-name { font-size: 16.5px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dress-bar .db-sub { flex: 0 1 auto; min-width: 0; font-size: 13.5px; opacity: .92; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dress-bar .db-sub.warn { color: var(--gold-warm); opacity: 1; }
  .dress-bar .btn.small { white-space: nowrap; flex-shrink: 0; }
  /* wegvliegende diamant bij een aankoop */
  .fly-dia { position: fixed; z-index: 95; font-size: 22px; pointer-events: none; }

  /* ---- Instellingen (ouder-dashboard) ---- */
  .settings-sheet { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 14px; }
  .settings-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .settings-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; opacity: .82; }
  .settings-h1 { font-size: 30px; font-weight: 700; line-height: 1.05; text-shadow: 0 2px 0 var(--glass-black-18); }

  .segmented { display: flex; gap: 4px; padding: 4px; border-radius: var(--radius-md); background: var(--glass-black-26); }
  .segmented button {
    flex: 1; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; color: var(--c-white);
    border: none; background: transparent; border-radius: var(--radius-sm); padding: 10px 8px;
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    transition: background .15s, color .15s, box-shadow .15s;
  }
  .segmented button .who { font-size: 19px; }
  .segmented button.on { background: var(--c-white); color: var(--purple-mid); box-shadow: 0 2px 8px rgba(0,0,0,.22); }
  .segmented.tabs button.on { background: linear-gradient(180deg, var(--c-white), var(--lavender-wash-2)); }

  .settings-panel { display: flex; flex-direction: column; gap: 14px; }
  .set-card { background: var(--c-white); color: var(--c-ink); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: 0 10px 26px rgba(30,0,50,.24); }
  .set-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .set-card-head .ico { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; display: grid; place-items: center; font-size: 18px; background: var(--paper-tint); border: 1px solid var(--paper-border); }
  .set-card-head h2 { font-size: 18px; font-weight: 700; color: var(--purple-mid); }
  .set-card-head .sub { font-size: 12.5px; color: var(--paper-ink-muted); font-weight: 500; margin-top: 1px; }

  .set-field { display: flex; flex-direction: column; gap: 7px; }
  .set-field + .set-field { margin-top: 15px; }
  .set-field .lbl { font-size: 13px; font-weight: 700; color: var(--paper-ink); }
  .set-field .note { font-size: 12px; color: var(--paper-ink-muted); font-weight: 500; }
  /* "Tafels van" only matters once Maal/Delen is on -- dimmed (not disabled: still
     tappable, so a parent can pre-select tables before turning the operation on) */
  .set-field.inactive { opacity: .5; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
  /* Bewerkingen (+ - x :) as a fixed 2x2 grid: +/- (optellen/aftrekken) and x/:
     (vermenigvuldigen/delen) are natural pairs, and the natural flex-wrap on
     narrow screens gave an unbalanced 3-then-1 instead. max-content columns
     keep each chip its own width -- no stretching to fill the grid cell. */
  #set-ops { display: grid; grid-template-columns: repeat(2, max-content); }
  .chip {
    font-family: inherit; font-size: 15.5px; font-weight: 600; cursor: pointer; text-align: center; min-width: 44px;
    border: 2px solid var(--paper-border); background: var(--c-white); color: var(--purple-mid); border-radius: var(--radius-pill); padding: 7px 15px;
    transition: transform .07s, background .12s, border-color .12s, color .12s;
  }
  .chip:hover { border-color: var(--purple-light); }
  .chip:active { transform: scale(.95); }
  .chip.on { background: linear-gradient(180deg, var(--purple-light), var(--purple-mid)); border-color: transparent; color: var(--c-white); box-shadow: 0 3px 9px rgba(var(--purple-mid-rgb), .32); }

  /* de naam is het enige tekstveld in de hele app -- zonder duidelijk signaal
     ziet het eruit als platte tekst i.p.v. iets aantikbaars, dus een potloodje
     maakt "dit kun je wijzigen" expliciet i.p.v. impliciet aan de rand */
  .name-edit-wrap { position: relative; max-width: 220px; }
  .name-edit-wrap .name-edit-ico {
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    font-size: 15px; opacity: .5; pointer-events: none;
  }
  .settings-sheet input[type=text] {
    font-family: inherit; font-size: 17px; font-weight: 600; color: var(--paper-ink);
    border: 2px solid var(--paper-border); border-radius: var(--radius-sm); padding: 9px 34px 9px 13px; width: 100%; background: var(--paper-tint);
  }
  .settings-sheet input[type=text]:focus-visible { outline: none; border-color: var(--purple-light); background: var(--c-white); }
  .data-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .settings-sheet :focus-visible { outline: 3px solid var(--gold-warm); outline-offset: 2px; }

  .danger-zone {
    background: var(--danger-bg); border: 1.5px dashed var(--danger-border); border-radius: var(--radius-lg); padding: 15px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }
  .danger-zone .t { font-size: 14.5px; font-weight: 700; color: var(--danger-title); }
  .danger-zone .d { font-size: 12.5px; color: var(--danger-desc); font-weight: 500; margin-top: 2px; max-width: 42ch; }
  .danger-btn { background: linear-gradient(180deg, var(--red-danger-500), var(--red-danger-shadow)); color: var(--c-white); border: none; border-radius: var(--radius-sm); padding: 10px 16px; font-family: inherit; font-weight: 700; font-size: 14.5px; cursor: pointer; box-shadow: 0 var(--btn-lip-sm) 0 var(--red-danger-shadow); white-space: nowrap; }
  .danger-btn:active { transform: translateY(3px); box-shadow: none; }

  /* ---- Ouder-statistiek (tegels + meter) ---- */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .stat-tile { position: relative; background: var(--paper-tint); border: 1px solid var(--paper-border); border-radius: var(--radius-card-sm); padding: 12px 8px 10px; text-align: center; overflow: hidden; }
  .stat-tile::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--tint, var(--purple-light)); }
  .stat-tile .num { font-size: 26px; font-weight: 700; color: var(--paper-ink); line-height: 1; }
  .stat-tile .cap { font-size: 11.5px; color: var(--paper-ink-muted); margin-top: 5px; font-weight: 500; line-height: 1.2; }
  .stat-line { display: flex; align-items: baseline; justify-content: space-between; margin: 16px 2px 7px; }
  .stat-line .k { font-size: 14px; font-weight: 600; color: var(--paper-ink); }
  .stat-line .v { font-size: 16px; font-weight: 700; color: var(--purple-mid); }
  .stat-bar { height: 13px; background: var(--lavender-wash-3); border-radius: var(--radius-pill); overflow: hidden; }
  .stat-bar > div { height: 100%; border-radius: var(--radius-pill); background: linear-gradient(90deg, var(--purple-light), var(--pink-accent)); }
  .practice-hint { font-size: 12.5px; color: var(--paper-ink-muted); font-weight: 500; margin: 14px 2px 8px; }
  .practice-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .practice-chip { background: var(--practice-bg); border: 1px solid var(--gold-pale); color: var(--practice-text); border-radius: var(--radius-pill); padding: 6px 13px; font-weight: 700; font-size: 15px; }
  .stats-empty { font-size: 13.5px; color: var(--green-deep); font-weight: 600; margin-top: 6px; }
  @media (max-width: 480px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } .settings-h1 { font-size: 25px; } }

  /* ---- Modal (oudervraag) ---- */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--c-white); color: var(--c-ink); border-radius: var(--radius-lg); padding: 24px 28px; text-align: center; max-width: 340px;
  }
  .modal h3 { color: var(--purple-deep); margin-bottom: 10px; }
  .modal input {
    font-family: inherit; font-size: 26px; text-align: center; width: 110px;
    border: 3px solid var(--purple-light); border-radius: var(--radius-sm); padding: 6px; margin: 10px 0;
  }

  .confetti-bit { position: fixed; top: -40px; font-size: 26px; z-index: 90; pointer-events: none; animation: fall linear forwards; }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===== Profielkeuze ===== -->
  <div class="screen active" id="screen-profile">
    <div class="map-sky" aria-hidden="true">
      <div class="map-sky-inner">
        <span style="top:14%;font-size:28px;animation-duration:85s;animation-delay:-20s;opacity:.24">☁️</span>
        <span style="top:36%;font-size:22px;animation-duration:95s;animation-delay:-55s;opacity:.18">☁️</span>
        <span style="top:60%;font-size:32px;animation-duration:75s;animation-delay:-10s;opacity:.3">☁️</span>
        <span style="top:84%;font-size:26px;animation-duration:88s;animation-delay:-42s;opacity:.22">☁️</span>
      </div>
    </div>
    <h1 class="title">🎤 Reken Popsterren 🎶</h1>
    <div class="subtitle">Wie gaat er vandaag schitteren op het podium?</div>
    <div class="profile-row" id="profile-row"></div>
  </div>

  <!-- ===== Kaart / wereldtournee (hoofdscherm) ===== -->
  <div class="screen hub" id="screen-map">
    <div class="map-sky" aria-hidden="true">
      <div class="map-sky-inner">
        <span style="top:8%;font-size:26px;animation-duration:88s;animation-delay:-30s;opacity:.22">☁️</span>
        <span style="top:24%;font-size:34px;animation-duration:70s;animation-delay:-15s;opacity:.3">☁️</span>
        <span style="top:40%;font-size:22px;animation-duration:100s;animation-delay:-70s;opacity:.18">☁️</span>
        <span style="top:58%;font-size:30px;animation-duration:80s;animation-delay:-45s;opacity:.26">☁️</span>
        <span style="top:80%;font-size:36px;animation-duration:65s;animation-delay:-8s;opacity:.32">☁️</span>
        <span style="top:33%;font-size:24px;animation-duration:58s;animation-delay:-12s;opacity:.3">✈️</span>
